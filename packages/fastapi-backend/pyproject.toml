[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prorise-fastapi-backend"
version = "0.1.0"
description = "Epic 0 FastAPI minimum scaffold for Prorise AI Teach Workspace"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115,<1.0",
  "uvicorn[standard]>=0.34,<1.0",
  "pydantic-settings>=2.7,<3.0",
  "dramatiq[redis]>=1.17,<2.0",
  "python-multipart>=0.0.20,<1.0",
  "httpx>=0.28,<1.0"
]

[project.optional-dependencies]
dev = [
  "httpx>=0.28,<1.0",
  "pytest>=8.3,<9.0",
  "pytest-asyncio>=1.2,<2.0",
  "pytest-cov>=6.0,<7.0"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

name: FastAPI Backend Tests

on:
  pull_request:
    paths:
      - "packages/fastapi-backend/**"
      - ".github/workflows/fastapi-backend-tests.yml"
      - "package.json"
  push:
    branches:
      - master
    paths:
      - "packages/fastapi-backend/**"
      - ".github/workflows/fastapi-backend-tests.yml"
      - "package.json"

permissions:
  contents: read

jobs:
  fastapi-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FastAPI backend environment
        run: pnpm setup:fastapi-backend

      - name: Run FastAPI backend layered suite
        run: pnpm test:fastapi-backend:ci

      - name: Run FastAPI backend coverage
        run: pnpm test:fastapi-backend:coverage

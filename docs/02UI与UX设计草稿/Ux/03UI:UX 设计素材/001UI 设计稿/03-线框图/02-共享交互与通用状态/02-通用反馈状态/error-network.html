<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>小麦 - 网络断开</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		* {
			border-radius: 0 !important;
			box-shadow: none !important;
			font-family: monospace, sans-serif;
		}

		.wf-border {
			border: 2px solid #000;
		}

		.bg-grid {
			background-size: 40px 40px;
			background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px), linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
		}
	</style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center bg-grid p-4 relative">

	<!-- 顶部固定警告条 -->
	<div class="fixed top-0 left-0 w-full bg-red-600 text-white font-bold text-xs py-2 text-center z-50">
		当前处于离线状态，请检查网络连接。
	</div>

	<div
		class="w-full max-w-lg bg-white wf-border p-12 flex flex-col items-center justify-center text-center shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
		<div class="text-6xl mb-6">📡<span class="text-red-500 text-4xl absolute ml-[-15px] mt-[15px]">✖</span></div>

		<h2 class="text-2xl font-black mb-2">网络连接已断开</h2>
		<p class="text-sm text-gray-500 mb-8 max-w-sm leading-relaxed">系统无法连接到服务器。您的任务已在后台挂起，恢复网络后将自动同步状态。</p>

		<button
			class="wf-border bg-white px-8 py-3 text-sm font-bold hover:bg-gray-100 border-2 border-black flex items-center gap-2">
			<span>↻</span> 重新连接
		</button>
	</div>

</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>小麦 - 404</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		* {
			border-radius: 0 !important;
			box-shadow: none !important;
			font-family: monospace, sans-serif;
		}

		.wf-border {
			border: 2px solid #000;
		}

		.bg-grid {
			background-size: 40px 40px;
			background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px), linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
		}
	</style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center bg-grid p-4">

	<div class="flex flex-col items-center justify-center text-center">
		<h1 class="text-[120px] leading-none font-black tracking-tighter mb-2 text-black"
			style="text-shadow: 6px 6px 0px #ccc;">404</h1>
		<div class="bg-black text-white px-4 py-1 font-bold tracking-widest uppercase mb-6 text-sm">Page Not Found</div>

		<h2 class="text-2xl font-bold mb-4">页面似乎迷路了</h2>
		<p class="text-sm text-gray-600 mb-8 max-w-md">您访问的链接可能已失效，或页面已被移除。请检查网址是否正确。</p>

		<button
			class="wf-border bg-white px-8 py-3 text-sm font-bold hover:bg-gray-100 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-transform hover:translate-x-1 hover:translate-y-1 hover:shadow-none">
			&larr; 返回工作台
		</button>
	</div>

</body>

</html>

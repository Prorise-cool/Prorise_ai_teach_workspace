<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>认证补充信息对话框占位（成品图）</title>
  <style>
    body { margin: 0; background: #f3f4f6; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; color: #111827; }
    .page { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .dialog { width: min(520px, 100%); background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08); padding: 24px; }
    .title { font-size: 22px; margin: 0 0 8px; }
    .muted { color: #6b7280; margin: 0 0 20px; line-height: 1.6; }
    .field { border: 1px dashed #9ca3af; border-radius: 10px; padding: 14px; margin-bottom: 12px; color: #6b7280; }
    .actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
    .btn { border-radius: 999px; padding: 10px 16px; border: 1px solid #d1d5db; background: #fff; }
    .btn.primary { background: #111827; color: #fff; border-color: #111827; }
  </style>
</head>
<body>
  <div class="page">
    <div class="dialog">
      <h1 class="title">补充你的学习身份</h1>
      <p class="muted">占位目标：承接登录后首次进入平台时的资料补充，包括学校、身份标签与学习方向。</p>
      <div class="field">[ 学校 / 专业输入占位 ]</div>
      <div class="field">[ 学习目标 / 近期关注方向占位 ]</div>
      <div class="field">[ 同意说明 / 偏好项占位 ]</div>
      <div class="actions">
        <button class="btn">稍后再说</button>
        <button class="btn primary">继续进入平台</button>
      </div>
    </div>
  </div>
</body>
</html>

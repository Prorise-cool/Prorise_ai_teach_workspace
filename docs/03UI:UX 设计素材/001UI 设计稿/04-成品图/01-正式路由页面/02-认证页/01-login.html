<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>小麦 XiaoMai - 登录与注册</title>
	<!-- 引入 Remix Icon (包含各种社交图标和 UI 图标) -->
	<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

	<style>
		:root {
			--bg-main: #14110e;
			--bg-panel: #231f1c;
			--bg-input: #191614;
			--border-color: #38322d;
			--text-main: #ffffff;
			--text-muted: #8c857f;
			--brand-yellow: #f5c547;
			--brand-yellow-hover: #e0b236;

			--char-1: #d97736;
			--char-2: #e3d5c8;
			--char-3: #f5c547;
			--char-4: #5c534a;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
		}

		body {
			min-height: 100vh;
			display: flex;
			background: var(--bg-main);
			color: var(--text-main);
			overflow: hidden;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.container {
			width: 100%;
			max-width: 1080px;
			/* 加宽以适应多列布局 */
			height: 700px;
			/* 稍微加高让内容更舒展 */
			display: flex;
			border-radius: 24px;
			overflow: hidden;
			box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
			background: var(--bg-panel);
		}

		/* 自定义滚动条 */
		.right-panel::-webkit-scrollbar {
			width: 6px;
		}

		.right-panel::-webkit-scrollbar-track {
			background: transparent;
		}

		.right-panel::-webkit-scrollbar-thumb {
			background: rgba(255, 255, 255, 0.1);
			border-radius: 4px;
		}

		.right-panel::-webkit-scrollbar-thumb:hover {
			background: rgba(255, 255, 255, 0.2);
		}

		/* ================= 左侧视觉面板 ================= */
		.left-panel {
			flex: 1;
			position: relative;
			background: linear-gradient(135deg, #1c1815 0%, #0a0807 100%);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 40px;
			border-right: 1px solid rgba(255, 255, 255, 0.05);
			overflow: hidden;
			min-width: 400px;
		}

		.hero-text {
			position: absolute;
			bottom: 50px;
			text-align: center;
			z-index: 10;
		}

		.hero-text h3 {
			font-size: 26px;
			font-weight: 600;
			line-height: 1.4;
			letter-spacing: 0.5px;
		}

		.glow {
			position: absolute;
			width: 350px;
			height: 350px;
			background: radial-gradient(circle, rgba(245, 197, 71, 0.12) 0%, transparent 70%);
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			z-index: 0;
		}

		/* ================= 小人容器 ================= */
		.characters-wrapper {
			position: relative;
			width: 300px;
			height: 250px;
			z-index: 5;
			transform: translateY(-36px);
			/* 保持原本悬浮的基准高度，不写动画 */
		}

		.character {
			position: absolute;
			bottom: 0;
			transform-origin: bottom center;
			transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.6s ease;
		}

		.eyes,
		.mouth {
			transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
		}

		.pupil {
			background: #111;
			border-radius: 50%;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
		}

		.eye {
			background: #fff;
			border-radius: 50%;
			position: relative;
			overflow: hidden;
			transition: all 0.3s ease;
		}

		.mouth {
			background: #111;
			border-radius: 2px;
			margin: 0 auto;
		}

		.eyes {
			display: flex;
			justify-content: center;
			align-items: center;
		}

		/* 尺寸与色块 */
		.char-1 {
			width: 100px;
			height: 160px;
			background: var(--char-1);
			border-radius: 50px 50px 0 0;
			left: 0;
			z-index: 2;
		}

		.char-2 {
			width: 110px;
			height: 110px;
			background: var(--char-2);
			border-radius: 55px 55px 0 0;
			left: 70px;
			z-index: 3;
		}

		.char-3 {
			width: 90px;
			height: 210px;
			background: var(--char-3);
			border-radius: 45px 45px 0 0;
			left: 150px;
			z-index: 1;
		}

		.char-4 {
			width: 100px;
			height: 130px;
			background: var(--char-4);
			border-radius: 50px 50px 0 0;
			left: 210px;
			z-index: 4;
		}

		/* 面部排版 */
		.char-1 .eyes {
			gap: 10px;
			margin-top: 40px;
		}

		.char-1 .eye {
			width: 16px;
			height: 16px;
		}

		.char-1 .pupil {
			width: 8px;
			height: 8px;
		}

		.char-1 .mouth {
			width: 16px;
			height: 4px;
			margin-top: 12px;
		}

		.char-2 .eyes {
			gap: 14px;
			margin-top: 40px;
		}

		.char-2 .eye {
			width: 22px;
			height: 22px;
		}

		.char-2 .pupil {
			width: 10px;
			height: 10px;
		}

		.char-2 .mouth {
			width: 20px;
			height: 4px;
			margin-top: 12px;
		}

		.char-3 .eyes {
			gap: 8px;
			margin-top: 50px;
		}

		.char-3 .eye {
			width: 14px;
			height: 14px;
		}

		.char-3 .pupil {
			width: 6px;
			height: 6px;
		}

		.char-3 .mouth {
			width: 14px;
			height: 4px;
			margin-top: 10px;
		}

		.char-4 .eyes {
			gap: 12px;
			margin-top: 40px;
		}

		.char-4 .eye {
			width: 18px;
			height: 18px;
		}

		.char-4 .pupil {
			width: 8px;
			height: 8px;
		}

		.char-4 .mouth {
			background: var(--bg-main);
			width: 16px;
			height: 4px;
			margin-top: 12px;
		}

		/* 眨眼 */
		@keyframes blink {

			0%,
			4%,
			100% {
				transform: scaleY(1);
			}

			2% {
				transform: scaleY(0.1);
			}
		}

		.char-1 .eye {
			animation: blink 4.2s infinite 0.5s;
		}

		.char-2 .eye {
			animation: blink 5.1s infinite 1.2s;
		}

		.char-3 .eye {
			animation: blink 3.8s infinite 2.1s;
		}

		.char-4 .eye {
			animation: blink 4.7s infinite 0.8s;
		}

		/* ================= 交互状态 ================= */

		/* 1. 探头看输入框 */
		.state-peeking .eyes,
		.state-peeking .mouth {
			transform: translateX(12px) translateY(-4px);
		}

		.state-peeking .char-1 {
			transform: skewX(-6deg) scaleY(1.03);
		}

		.state-peeking .char-2 {
			transform: skewX(-10deg) scaleY(1.06);
		}

		.state-peeking .char-3 {
			transform: skewX(-4deg) scaleY(1.01);
		}

		.state-peeking .char-4 {
			transform: skewX(-8deg) scaleY(1.04);
		}

		/* 2. 闭眼优化 (变成向下的弧线，更自然) */
		.state-hidden .eye {
			height: 12px;
			background: transparent;
			border-bottom: 3px solid #111;
			border-radius: 50%;
			margin-top: 6px;
			animation: none;
			/* 停止眨眼 */
		}

		.state-hidden .char-4 .eye {
			border-bottom-color: var(--bg-main);
		}

		.state-hidden .pupil {
			opacity: 0;
		}

		.state-hidden .char-1 {
			transform: scaleY(0.92) scaleX(1.05);
		}

		.state-hidden .char-2 {
			transform: scaleY(0.88) scaleX(1.08);
		}

		.state-hidden .char-3 {
			transform: scaleY(0.96) scaleX(1.02);
		}

		.state-hidden .char-4 {
			transform: scaleY(0.9) scaleX(1.06);
		}

		/* 3. 抬头看头像 */
		.state-looking-up .eyes,
		.state-looking-up .mouth {
			transform: translateY(-12px);
		}

		.state-looking-up .pupil {
			transform: translate(-50%, -100%) !important;
		}

		.state-looking-up .char-1 {
			transform: scaleY(1.08) scaleX(0.95);
		}

		.state-looking-up .char-2 {
			transform: scaleY(1.12) scaleX(0.9);
		}

		.state-looking-up .char-3 {
			transform: scaleY(1.04) scaleX(0.97);
		}

		.state-looking-up .char-4 {
			transform: scaleY(1.1) scaleX(0.93);
		}

		/* 4. 打瞌睡 (彩蛋) */
		.state-sleep .eye {
			height: 4px;
			background: transparent;
			border-bottom: 3px solid #111;
			border-radius: 50%;
			margin-top: 10px;
			animation: none;
		}

		.state-sleep .char-4 .eye {
			border-bottom-color: var(--bg-main);
		}

		.state-sleep .pupil {
			opacity: 0;
		}

		.state-sleep .character {
			transform: translateY(6px) scaleY(0.96);
			transition: all 1.2s ease;
		}

		/* 5. 甩头清醒 (彩蛋) - 改为果冻弹跳拉伸，避免露出底边 */
		@keyframes wakeUpJelly {

			0%,
			100% {
				transform: scaleY(1) scaleX(1);
			}

			20% {
				transform: scaleY(1.15) scaleX(0.9);
			}

			40% {
				transform: scaleY(0.9) scaleX(1.1);
			}

			60% {
				transform: scaleY(1.08) scaleX(0.95);
			}

			80% {
				transform: scaleY(0.95) scaleX(1.05);
			}
		}

		.state-wake-up .character {
			animation: wakeUpJelly 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
		}

		.state-wake-up .eye {
			transform: scale(1.3);
			transition: transform 0.2s;
		}

		/* 眼睛猛然睁大 */

		/* 果冻跳跃 */
		@keyframes jelly-jump {
			0% {
				transform: scaleY(1) scaleX(1) translateY(0);
			}

			20% {
				transform: scaleY(0.85) scaleX(1.15) translateY(0);
			}

			45% {
				transform: scaleY(1.15) scaleX(0.85) translateY(-25px);
			}

			65% {
				transform: scaleY(0.9) scaleX(1.1) translateY(0);
			}

			80% {
				transform: scaleY(1.05) scaleX(0.95) translateY(-6px);
			}

			100% {
				transform: scaleY(1) scaleX(1) translateY(0);
			}
		}

		.state-jumping .character {
			animation: jelly-jump 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
		}

		/* 聚拢阵型 */
		.layout-profile .char-1 {
			left: 40px;
		}

		.layout-profile .char-2 {
			left: 80px;
		}

		.layout-profile .char-3 {
			left: 140px;
		}

		.layout-profile .char-4 {
			left: 170px;
		}


		/* ================= 右侧表单面板 ================= */
		.right-panel {
			flex: 1.2;
			padding: 50px 70px;
			/* 增加内边距让排版不挤 */
			position: relative;
			display: flex;
			flex-direction: column;
			overflow-y: auto;
		}

		.brand-header {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-bottom: 30px;
			font-size: 18px;
			font-weight: 600;
		}

		.brand-icon {
			width: 24px;
			height: 24px;
			background: #fff;
			border-radius: 4px;
		}

		/* 视图系统 */
		.view-section {
			display: none;
			flex-direction: column;
			flex: 1;
			animation: fadeIn 0.4s ease;
		}

		.view-section.active {
			display: flex;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.view-title {
			font-size: 30px;
			font-weight: 700;
			margin-bottom: 8px;
		}

		.view-subtitle {
			color: var(--text-muted);
			font-size: 14px;
			margin-bottom: 28px;
			line-height: 1.5;
		}

		/* 登录方式 Tabs */
		.auth-modes {
			display: flex;
			gap: 24px;
			margin-bottom: 28px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.05);
		}

		.auth-mode {
			padding-bottom: 12px;
			color: var(--text-muted);
			cursor: pointer;
			font-size: 15px;
			font-weight: 600;
			position: relative;
			transition: color 0.2s;
		}

		.auth-mode:hover {
			color: #d1cbc5;
		}

		.auth-mode.active {
			color: var(--text-main);
		}

		.auth-mode.active::after {
			content: '';
			position: absolute;
			bottom: -1px;
			left: 0;
			right: 0;
			height: 2px;
			background: var(--brand-yellow);
			border-radius: 2px;
		}

		.sub-form {
			display: none;
			animation: fadeIn 0.3s ease;
		}

		.sub-form.active {
			display: block;
		}

		/* 表单控件库 */
		.form-row {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 16px;
			margin-bottom: 20px;
		}

		.form-group {
			margin-bottom: 20px;
		}

		.form-row .form-group {
			margin-bottom: 0;
		}

		.form-label {
			display: block;
			font-size: 13px;
			font-weight: 600;
			margin-bottom: 8px;
			color: #d1cbc5;
		}

		.input-wrapper {
			display: flex;
			align-items: center;
			background: var(--bg-input);
			border: 1px solid var(--border-color);
			border-radius: 10px;
			padding: 0 16px;
			height: 48px;
			transition: border-color 0.2s, box-shadow 0.2s;
		}

		.input-wrapper:focus-within {
			border-color: var(--brand-yellow);
			box-shadow: 0 0 0 2px rgba(245, 197, 71, 0.1);
		}

		.prefix {
			color: var(--text-muted);
			font-size: 18px;
			padding-right: 12px;
			border-right: 1px solid var(--border-color);
			margin-right: 12px;
			display: flex;
			align-items: center;
		}

		.suffix-btn {
			background: none;
			border: none;
			color: var(--brand-yellow);
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
			padding-left: 12px;
			border-left: 1px solid var(--border-color);
			white-space: nowrap;
		}

		.suffix-icon-btn {
			background: none;
			border: none;
			color: var(--text-muted);
			font-size: 18px;
			cursor: pointer;
			padding: 0 4px;
			transition: color 0.2s;
		}

		.suffix-icon-btn:hover {
			color: var(--text-main);
		}

		/* 限制 input 样式仅在输入框容器内生效，防止污染 checkbox */
		.input-wrapper input {
			flex: 1;
			background: transparent;
			border: none;
			color: var(--text-main);
			font-size: 14px;
			outline: none;
			width: 100%;
		}

		.input-wrapper input::placeholder {
			color: var(--text-muted);
		}

		/* 按钮与辅助元素 */
		.btn-primary {
			width: 100%;
			height: 48px;
			background: var(--brand-yellow);
			color: #111;
			border: none;
			border-radius: 10px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			margin-top: 10px;
			margin-bottom: 24px;
			transition: background 0.2s, transform 0.1s;
		}

		.btn-primary:active {
			transform: scale(0.98);
		}

		.btn-primary:hover {
			background: var(--brand-yellow-hover);
		}

		.helper-text {
			text-align: center;
			font-size: 14px;
			color: var(--text-muted);
			padding-top: 20px;
		}

		.link {
			color: var(--text-main);
			text-decoration: none;
			font-weight: 600;
			cursor: pointer;
		}

		.link:hover {
			text-decoration: underline;
		}

		.skip-link {
			position: absolute;
			top: 50px;
			right: 70px;
			color: var(--text-muted);
			font-size: 14px;
			text-decoration: none;
			cursor: pointer;
		}

		.divider {
			display: flex;
			align-items: center;
			text-align: center;
			color: var(--text-muted);
			font-size: 12px;
			margin: 0 0 24px 0;
		}

		.divider::before,
		.divider::after {
			content: '';
			flex: 1;
			border-bottom: 1px solid var(--border-color);
		}

		.divider:not(:empty)::before {
			margin-right: 15px;
		}

		.divider:not(:empty)::after {
			margin-left: 15px;
		}

		/* 社交按钮 (使用 Remix Icon) */
		.social-login {
			display: flex;
			justify-content: center;
			gap: 20px;
			margin-bottom: 20px;
		}

		.social-btn {
			width: 46px;
			height: 46px;
			border-radius: 50%;
			background: transparent;
			border: 1px solid var(--border-color);
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			color: var(--text-muted);
			font-size: 22px;
			transition: all 0.2s;
		}

		.social-btn:hover {
			border-color: var(--text-muted);
			color: var(--text-main);
		}

		.social-btn:hover .ri-wechat-fill {
			color: #07c160;
		}

		.social-btn:hover .ri-qq-fill {
			color: #12b7f5;
		}

		/* 优化自动登录复选框排版 */
		.checkbox-label {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-size: 13px;
			color: var(--text-muted);
			margin-bottom: 20px;
			cursor: pointer;
			user-select: none;
		}

		.checkbox-label input {
			accent-color: var(--brand-yellow);
			flex: none;
			/* 强制覆盖潜在的 flex 拉伸 */
			width: 16px;
			height: 16px;
			margin: 0;
			cursor: pointer;
		}

		/* 完善信息页特有 */
		.avatar-upload {
			display: flex;
			flex-direction: column;
			align-items: center;
			margin-bottom: 24px;
			cursor: pointer;
		}

		.avatar-circle {
			width: 86px;
			height: 86px;
			border-radius: 50%;
			background: var(--bg-input);
			border: 1px solid var(--border-color);
			display: flex;
			align-items: center;
			justify-content: center;
			position: relative;
			color: var(--text-muted);
			font-size: 12px;
			margin-bottom: 10px;
		}

		.camera-icon {
			position: absolute;
			bottom: 0;
			right: 0;
			width: 30px;
			height: 30px;
			background: #fff;
			color: #111;
			border-radius: 50%;
			display: flex;
			align-items: center;
			justify-content: center;
			border: 3px solid var(--bg-panel);
			font-size: 15px;
		}

		.role-selector {
			display: flex;
			gap: 16px;
			margin-bottom: 34px;
		}

		.role-btn {
			flex: 1;
			height: 44px;
			background: transparent;
			border: 1px solid var(--border-color);
			border-radius: 8px;
			color: var(--text-muted);
			font-size: 14px;
			cursor: pointer;
			transition: all 0.2s;
		}

		.role-btn.active {
			border-color: var(--brand-yellow);
			color: var(--brand-yellow);
			background: rgba(245, 197, 71, 0.05);
		}

		/* ================= 响应式适配 (移动端) ================= */
		@media (max-width: 850px) {
			body {
				padding: 0;
			}

			.container {
				flex-direction: column;
				height: 100vh;
				border-radius: 0;

			.left-panel {

		}
	</style>
</head>

	<script>
		const charactersWrapper = document.getElementById('characters');
		let isAnimatingJump = false;
		let idleTimer; // 用于睡眠彩蛋

		// 1. 顶层大视图切换逻辑
		function switchView(viewId) {
			document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
			document.getElementById(viewId).classList.add('active');

			if (viewId === 'view-profile') {
				charactersWrapper.classList.add('layout-profile');
			} else {
				charactersWrapper.classList.remove('layout-profile');
			}
			clearStates();
			resetIdleTimer();
		}

		// 2. 登录面板内部 Tab 切换
		function switchSubForm(viewType, formType, clickedElement) {
			const parent = clickedElement.parentElement;
			parent.querySelectorAll('.auth-mode').forEach(el => el.classList.remove('active'));
			clickedElement.classList.add('active');

			const section = document.getElementById(`view-${viewType}`);
			section.querySelectorAll('.sub-form').forEach(el => el.classList.remove('active'));
			document.getElementById(`${viewType}-form-${formType}`).classList.add('active');

			clearStates();
		}

		// 清除常规小人交互状态
		function clearStates() {
			charactersWrapper.classList.remove('state-peeking', 'state-hidden', 'state-looking-up', 'state-sleep', 'state-wake-up');
			resetPupils();
		}

		// 眼球追踪逻辑
		document.addEventListener('mousemove', (e) => {
			if (charactersWrapper.classList.contains('state-hidden') ||
				charactersWrapper.classList.contains('state-looking-up') ||
				charactersWrapper.classList.contains('state-sleep')) return;

			document.querySelectorAll('.eye').forEach(eye => {
				const rect = eye.getBoundingClientRect();
				const eyeCenterX = rect.left + rect.width / 2;
				const eyeCenterY = rect.top + rect.height / 2;
				const deltaX = e.clientX - eyeCenterX;
				const deltaY = e.clientY - eyeCenterY;
				const angle = Math.atan2(deltaY, deltaX);
				const maxDistance = eye.clientWidth / 2 - 4;
				const distance = Math.min(Math.hypot(deltaX, deltaY) / 30, maxDistance);

				const pupil = eye.querySelector('.pupil');
				if (pupil) {
					const tx = Math.cos(angle) * distance;
					const ty = Math.sin(angle) * distance;
					pupil.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
				}
			});
		});

		function resetPupils() {
			document.querySelectorAll('.pupil').forEach(p => p.style.transform = 'translate(-50%, -50%)');
		}

		// ================= 睡眠彩蛋逻辑 =================
		function resetIdleTimer() {
			clearTimeout(idleTimer);

			// 如果处于睡眠中被打断，触发“甩头清醒”彩蛋
			if (charactersWrapper.classList.contains('state-sleep')) {
				charactersWrapper.classList.remove('state-sleep');
				charactersWrapper.classList.add('state-wake-up');
				setTimeout(() => charactersWrapper.classList.remove('state-wake-up'), 500);
			}

			// 5秒无操作进入打瞌睡
			idleTimer = setTimeout(() => {
				const hasFocusState = charactersWrapper.classList.contains('state-peeking') ||
					charactersWrapper.classList.contains('state-hidden') ||
					charactersWrapper.classList.contains('state-looking-up');
				// 只有在没被交互绑架时才打瞌睡
				if (!hasFocusState) {
					charactersWrapper.classList.add('state-sleep');
				}
			}, 5000);
		}

		['mousemove', 'mousedown', 'keydown', 'touchstart'].forEach(evt => {
			document.addEventListener(evt, resetIdleTimer);
		});
		resetIdleTimer();

		// ================= 绑定输入交互 =================

		// 1. 探头交互 (普通账号输入)
		document.querySelectorAll('.interact-account').forEach(el => {
			el.addEventListener('focus', () => { clearStates(); charactersWrapper.classList.add('state-peeking'); });
			el.addEventListener('blur', clearStates);
		});

		// 2. 闭眼挤压交互 (敏感信息：验证码、密码)
		document.querySelectorAll('.interact-hidden').forEach(el => {
			el.addEventListener('focus', () => {
				clearStates();
				// 如果密码被设置为可见(text)，则睁眼探头；否则闭眼
				if (el.type === 'text') {
					charactersWrapper.classList.add('state-peeking');
				} else {
					charactersWrapper.classList.add('state-hidden');
				}
			});
			el.addEventListener('blur', clearStates);
		});

		// 3. 密码可见性切换
		document.querySelectorAll('.toggle-pwd').forEach(btn => {
			btn.addEventListener('click', function (e) {
				e.preventDefault();
				const input = this.previousElementSibling;
				const icon = this.querySelector('i');

				if (input.type === 'password') {
					input.type = 'text';
					icon.className = 'ri-eye-line'; // 换睁眼图标

					// 如果当前正在输入该密码框，触发小人睁眼探头
					if (document.activeElement === input) {
						charactersWrapper.classList.remove('state-hidden');
						charactersWrapper.classList.add('state-peeking');
					}
				} else {
					input.type = 'password';
					icon.className = 'ri-eye-off-line'; // 换闭眼图标

					if (document.activeElement === input) {
						charactersWrapper.classList.remove('state-peeking');
						charactersWrapper.classList.add('state-hidden');
					}
				}
			});
		});

		// 4. 抬头拉长交互 (头像)
		const avatarArea = document.querySelector('.interact-avatar');
		avatarArea.addEventListener('mouseenter', () => { clearStates(); charactersWrapper.classList.add('state-looking-up'); });
		avatarArea.addEventListener('mouseleave', clearStates);

		// 5. 果冻跳跃交互
		document.querySelectorAll('.interact-role').forEach(el => {
			el.addEventListener('click', function () {
				document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
				this.classList.add('active');

				if (!isAnimatingJump) {
					isAnimatingJump = true;
					charactersWrapper.classList.add('state-jumping');
					setTimeout(() => {
						charactersWrapper.classList.remove('state-jumping');
						isAnimatingJump = false;
					}, 800);
				}
			});
		});

	</script>
</body>

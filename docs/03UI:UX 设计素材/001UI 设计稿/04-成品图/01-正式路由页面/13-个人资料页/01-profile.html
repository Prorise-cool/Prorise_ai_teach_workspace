<!DOCTYPE html>
<html lang="zh" class="light">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>小麦 XiaoMai - 个人资料设置</title>

	<!-- 引入 Google Fonts 提升字体质感 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
		rel="stylesheet">

	<!-- 引入 Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>
	<!-- 引入 Lucide 图标库 -->
	<script src="https://unpkg.com/lucide@latest"></script>

	<!-- 严格配置 Tailwind，注入设计系统规范 -->
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						brand: { DEFAULT: '#f5c547', dark: '#e6b841' },
						secondary: { DEFAULT: '#f5ede1', dark: '#2a2420' },
						decorative: '#3b1701',
						bg: { light: '#f5ede1', dark: '#110e0d' },
						surface: { light: '#ffffff', dark: '#1f1a18' },
						text: {
							primary: '#3b1701', 'primary-dark': '#f5ede1',
							secondary: '#6b4421', 'secondary-dark': '#a89f91'
						},
						bordercolor: { light: '#e6dcc8', dark: '#302824' },
						agent: { efficient: '#6D5DF4', humorous: '#FFB020', patient: '#00C48C', serious: '#0091FF' },
						success: { DEFAULT: '#52c41a', dark: '#51d712' },
						warning: { DEFAULT: '#ff6700', dark: '#f34700' },
						error: { DEFAULT: '#f82834', dark: '#bf0004' }
					},
					fontFamily: {
						sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
						mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
					},
					borderRadius: {
						'sm': '4px', 'md': '8px', 'lg': '16px', 'xl': '24px', '2xl': '32px', 'full': '9999px',
					},
					boxShadow: {
						'sm': '0 2px 8px rgba(0, 0, 0, 0.04)',
						'md': '0 8px 24px rgba(0, 0, 0, 0.08)',
						'lg': '0 20px 40px -8px rgba(0, 0, 0, 0.12)',
						'dock': '0 20px 40px -10px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0,0,0,0.04)',
						'island': '0 10px 30px -5px rgba(0, 0, 0, 0.2)',
					}
				}
			}
		}
	</script>

	<style>
		/* ================= 基础主题与 CSS 变量 ================= */
		html.light {
			background-color: #f5ede1;
			color: #3b1701;
		}

		html.dark {
			background-color: #110e0d;
			color: #f5ede1;
		}

		body {
			transition: background-color 0.4s ease, color 0.4s ease;
			-webkit-font-smoothing: antialiased;
		}

		.custom-scroll::-webkit-scrollbar {
			width: 4px;
			height: 4px;
		}

		.custom-scroll::-webkit-scrollbar-track {
			background: transparent;
		}

		.custom-scroll::-webkit-scrollbar-thumb {
			background: #e6dcc8;
			border-radius: 4px;
		}

		html.dark .custom-scroll::-webkit-scrollbar-thumb {
			background: #302824;
		}

		.no-scrollbar::-webkit-scrollbar {
			display: none;
		}

		.no-scrollbar {
			-ms-overflow-style: none;
			scrollbar-width: none;
		}

		/* 统一的高级背景修饰 (网格) */
		.bg-grid-pattern {
			background-image:
				linear-gradient(to right, rgba(59, 23, 1, 0.04) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(59, 23, 1, 0.04) 1px, transparent 1px);
			background-size: 32px 32px;
			mask-image: linear-gradient(to bottom, black 0%, black 30%, transparent 100%);
			-webkit-mask-image: linear-gradient(to bottom, black 0%, black 30%, transparent 100%);
		}

		html.dark .bg-grid-pattern {
			background-image:
				linear-gradient(to right, rgba(245, 237, 225, 0.03) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(245, 237, 225, 0.03) 1px, transparent 1px);
		}

		/* 视图入场动画 */
		@keyframes fadeSlideUp {
			from {
				opacity: 0;
				transform: translateY(15px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.view-enter {
			animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
			opacity: 0;
		}

		.stagger-1 {
			animation-delay: 0.05s;
		}

		.stagger-2 {
			animation-delay: 0.10s;
		}

		.stagger-3 {
			animation-delay: 0.15s;
		}

		/* 克制的交互过渡 */
		.btn-transition {
			transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
		}

		/* 表单控件统一样式 */
		.form-input {
			width: 100%;
			background-color: transparent;
			border: 1px solid var(--tw-border-opacity);
			border-radius: 12px;
			padding: 0.75rem 1rem;
			font-size: 0.875rem;
			transition: all 0.2s ease;
			outline: none;
		}

		.form-input:focus {
			border-color: #f5c547;
			box-shadow: 0 0 0 3px rgba(245, 197, 71, 0.15);
		}

		html.dark .form-input:focus {
			border-color: #e6b841;
			box-shadow: 0 0 0 3px rgba(230, 184, 65, 0.15);
		}

		/* Dock Icon 悬停动效 */
		.dock-container {
			overflow: visible !important;
		}

		.dock-icon-wrapper {
			position: relative;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: flex-end;
		}

		.dock-icon {
			transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), background-color 0.2s ease;
			transform-origin: bottom center;
		}

		.dock-icon-wrapper:hover .dock-icon {
			transform: translateY(-3px);
		}

		/* Mac 风格 Tooltip */
		.dock-tooltip {
			position: absolute;
			top: -36px;
			left: 50%;
			transform: translateX(-50%) translateY(4px);
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.15s ease, transform 0.15s ease;
			white-space: nowrap;
		}

		.dock-icon-wrapper:hover .dock-tooltip {
			opacity: 1;
			transform: translateX(-50%) translateY(0);
		}
	</style>
</head>

<body class="min-h-screen flex flex-col relative overflow-y-auto custom-scroll overflow-x-hidden">

	<!-- ==================== 0. 全局背景层 ==================== -->
	<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
		<div class="absolute inset-0 bg-grid-pattern opacity-100"></div>
		<div
			class="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[80vw] max-w-[1200px] h-[400px] rounded-[100%] bg-brand/10 dark:bg-brand/5 blur-[120px] mix-blend-multiply dark:mix-blend-screen transition-colors duration-500">
		</div>
	</div>

	<!-- ==================== 1. 顶部：独立 Logo & 返回按钮 ==================== -->
	<header
		class="w-full max-w-6xl mx-auto mt-6 px-6 z-40 relative flex justify-between items-start pointer-events-none">
		<!-- 独立 Logo -->
		<a href="../01-首页与入口/02-home.html"
			class="font-bold text-lg flex items-center gap-3 pointer-events-auto hover:opacity-80 transition-opacity">
			<div
				class="w-9 h-9 bg-text-primary dark:bg-text-primary-dark rounded-xl flex items-center justify-center shadow-sm">
				<i data-lucide="leaf" class="w-4.5 h-4.5 text-bg-light dark:text-bg-dark"></i>
			</div>
			<span
				class="tracking-tight text-text-primary dark:text-text-primary-dark hidden sm:block text-xl">XiaoMai</span>
		</a>

		<!-- 顶部返回工作台按钮 -->
		<div class="absolute left-1/2 -translate-x-1/2 top-0 pointer-events-auto">
			<a href="learning.html"
				class="bg-surface-light dark:bg-surface-dark text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark rounded-full px-5 py-2.5 flex items-center gap-2 shadow-sm border border-bordercolor-light dark:border-bordercolor-dark transition-all duration-200 hover:-translate-y-0.5">
				<i data-lucide="arrow-left" class="w-4 h-4"></i>
				<span class="text-sm font-bold">返回工作台</span>
			</a>
		</div>
	</header>

	<!-- ==================== 2. 主内容区 (SaaS 账号设置布局) ==================== -->
	<!-- 优化：将 pb-32 改为 pb-40，确保划到底部时，保存栏完全坐立在 Dock 栏上方 -->
	<main
		class="w-[94%] max-w-6xl mx-auto mt-12 mb-12 pb-40 grid grid-cols-1 lg:grid-cols-[240px_1fr] gap-8 md:gap-12 relative z-10">

		<!-- ================= 左侧：设置域导航 (Sidebar) ================= -->
		<aside class="flex flex-col gap-2 view-enter stagger-1 lg:sticky lg:top-24 self-start">
			<h2
				class="text-[11px] font-black tracking-widest text-text-secondary dark:text-text-secondary-dark mb-3 px-4 uppercase">
				User Settings
			</h2>

			<div class="flex flex-col gap-1">
				<!-- 当前激活项 -->
				<a href="01-profile.html"
					class="bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark text-text-primary dark:text-text-primary-dark rounded-xl px-4 py-3 font-bold text-[14px] flex justify-between items-center transition-colors shadow-sm">
					<span class="flex items-center gap-2.5"><i data-lucide="user" class="w-4 h-4"></i> 个人资料</span>
				</a>

				<!-- 未激活项 -->
				<a href="#"
					class="border border-transparent text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark hover:bg-surface-light dark:hover:bg-surface-dark rounded-xl px-4 py-3 font-bold text-[14px] flex items-center gap-2.5 btn-transition">
					<i data-lucide="shield-check" class="w-4 h-4"></i> 账号与安全
				</a>

				<a href="#"
					class="border border-transparent text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark hover:bg-surface-light dark:hover:bg-surface-dark rounded-xl px-4 py-3 font-bold text-[14px] flex items-center gap-2.5 btn-transition">
					<i data-lucide="settings-2" class="w-4 h-4"></i> 平台偏好
				</a>
			</div>
		</aside>

		<!-- ================= 右侧：资料表单区 ================= -->
		<div class="flex flex-col gap-8 view-enter stagger-2 relative">

			<!-- 页头 -->
			<div class="mb-2">
				<h1
					class="text-[28px] md:text-3xl font-black mb-2 text-text-primary dark:text-text-primary-dark tracking-tight">
					个人资料</h1>
				<p class="text-[14px] font-medium text-text-secondary dark:text-text-secondary-dark">
					管理您在小麦平台的基础公开信息与教育背景。</p>
			</div>

			<!-- 区块 1：头像设置 -->
			<section
				class="bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark rounded-2xl p-6 md:p-8 flex flex-col sm:flex-row items-start sm:items-center gap-6 shadow-sm">

				<div
					class="w-24 h-24 rounded-full bg-secondary dark:bg-[#1a1614] border border-bordercolor-light dark:border-bordercolor-dark flex items-center justify-center overflow-hidden relative group cursor-pointer shrink-0 shadow-sm">
					<img src="https://i.pravatar.cc/150?img=68" alt="Current Avatar" class="w-full h-full object-cover">
					<!-- 纯黑底白字蒙层 -->
					<div
						class="absolute inset-0 bg-black opacity-0 group-hover:opacity-80 btn-transition flex flex-col items-center justify-center text-white">
						<i data-lucide="camera" class="w-6 h-6 mb-1"></i>
						<span class="text-[10px] font-bold tracking-wider">更换</span>
					</div>
				</div>

				<div class="flex flex-col gap-3">
					<div class="flex gap-3">
						<button
							class="border border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] text-text-primary dark:text-text-primary-dark px-5 py-2.5 rounded-xl text-[13px] font-bold hover:bg-bordercolor-light dark:hover:bg-bordercolor-dark btn-transition shadow-sm">上传新图片</button>
						<button
							class="border border-transparent text-text-secondary dark:text-text-secondary-dark px-4 py-2.5 rounded-xl text-[13px] font-bold hover:bg-surface-light dark:hover:bg-surface-dark btn-transition">移除</button>
					</div>
					<p class="text-[11px] text-text-secondary/80 dark:text-text-secondary-dark/80 font-medium">支持 JPG,
						PNG 或 GIF 格式。图片最大不超过 2MB。</p>
				</div>
			</section>

			<!-- 区块 2：基础信息表单 -->
			<section
				class="bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark rounded-2xl p-6 md:p-8 shadow-sm">
				<h2
					class="text-lg font-black mb-6 border-b border-bordercolor-light dark:border-bordercolor-dark pb-4 text-text-primary dark:text-text-primary-dark">
					基础信息</h2>

				<div class="flex flex-col gap-6">
					<div class="flex flex-col gap-2.5 max-w-lg">
						<label
							class="text-[13px] font-bold text-text-primary dark:text-text-primary-dark flex justify-between">
							<span>用户昵称 <span class="text-error">*</span></span>
						</label>
						<input type="text" value="王小麦"
							class="form-input bg-bg-light dark:bg-bg-dark border-bordercolor-light dark:border-bordercolor-dark text-text-primary dark:text-text-primary-dark"
							placeholder="请输入昵称">
						<p class="text-[11px] text-text-secondary dark:text-text-secondary-dark font-medium">
							这是您在课堂讨论和公开场景中显示的称呼。</p>
					</div>

					<!-- 账号不可编辑态 -->
					<div class="flex flex-col gap-2.5 max-w-lg">
						<label class="text-[13px] font-bold text-text-primary dark:text-text-primary-dark">登录账号</label>
						<div
							class="w-full bg-secondary dark:bg-[#1a1614] border border-bordercolor-light dark:border-bordercolor-dark rounded-xl px-4 py-3 text-sm text-text-secondary dark:text-text-secondary-dark flex justify-between items-center cursor-not-allowed">
							<span class="font-mono">user_789456</span>
							<div
								class="flex items-center gap-1.5 text-[10px] font-bold bg-surface-light dark:bg-surface-dark px-2 py-0.5 rounded shadow-sm border border-bordercolor-light dark:border-bordercolor-dark">
								<i data-lucide="lock" class="w-3 h-3"></i> 不可修改
							</div>
						</div>
					</div>

					<div class="flex flex-col gap-2.5 max-w-lg">
						<label class="text-[13px] font-bold text-text-primary dark:text-text-primary-dark">个人简介</label>
						<textarea
							class="form-input bg-bg-light dark:bg-bg-dark border-bordercolor-light dark:border-bordercolor-dark text-text-primary dark:text-text-primary-dark h-28 resize-none"
							placeholder="一句话介绍一下自己（选填）">高等数学狂热爱好者，正在努力攻克微积分与线性代数。</textarea>
					</div>
				</div>
			</section>

			<!-- 区块 3：教育背景表单 -->
			<section
				class="bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark rounded-2xl p-6 md:p-8 shadow-sm">
				<div
					class="flex justify-between items-center border-b border-bordercolor-light dark:border-bordercolor-dark pb-4 mb-6">
					<h2 class="text-lg font-black text-text-primary dark:text-text-primary-dark">教育背景</h2>
					<span
						class="text-[10px] font-bold text-text-secondary dark:text-text-secondary-dark bg-secondary dark:bg-[#2c2522] px-2 py-1 rounded">可选填</span>
				</div>

				<div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl">
					<div class="flex flex-col gap-2.5">
						<label class="text-[13px] font-bold text-text-primary dark:text-text-primary-dark">所在学校</label>
						<input type="text" value="示例职业技术学院"
							class="form-input bg-bg-light dark:bg-bg-dark border-bordercolor-light dark:border-bordercolor-dark text-text-primary dark:text-text-primary-dark"
							placeholder="请输入学校名称">
					</div>

					<div class="flex flex-col gap-2.5">
						<label class="text-[13px] font-bold text-text-primary dark:text-text-primary-dark">院系 /
							专业</label>
						<input type="text" value="机电工程系"
							class="form-input bg-bg-light dark:bg-bg-dark border-bordercolor-light dark:border-bordercolor-dark text-text-primary dark:text-text-primary-dark"
							placeholder="例如：软件工程">
					</div>

					<div class="flex flex-col gap-2.5">
						<label class="text-[13px] font-bold text-text-primary dark:text-text-primary-dark">当前身份</label>
						<div class="relative">
							<select
								class="form-input bg-bg-light dark:bg-bg-dark border-bordercolor-light dark:border-bordercolor-dark text-text-primary dark:text-text-primary-dark appearance-none cursor-pointer pr-10">
								<option>请选择身份</option>
								<option selected>高职学生</option>
								<option>高职教师</option>
								<option>自学者</option>
							</select>
							<i data-lucide="chevron-down"
								class="w-4 h-4 text-text-secondary dark:text-text-secondary-dark absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none"></i>
						</div>
					</div>

					<div class="flex flex-col gap-2.5">
						<label class="text-[13px] font-bold text-text-primary dark:text-text-primary-dark">当前学段</label>
						<div class="relative">
							<select
								class="form-input bg-bg-light dark:bg-bg-dark border-bordercolor-light dark:border-bordercolor-dark text-text-primary dark:text-text-primary-dark appearance-none cursor-pointer pr-10">
								<option>请选择学段</option>
								<option selected>大一</option>
								<option>大二</option>
								<option>大三</option>
								<option>毕业生/社会人员</option>
							</select>
							<i data-lucide="chevron-down"
								class="w-4 h-4 text-text-secondary dark:text-text-secondary-dark absolute right-4 top-1/2 transform -translate-y-1/2 pointer-events-none"></i>
						</div>
					</div>
				</div>
			</section>

			<!-- ================= 优化：底部常规操作区 (取消 Sticky，完美融入文档流) ================= -->
			<div class="mt-4 mb-4 view-enter stagger-3">
				<div
					class="bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark p-4 md:px-6 rounded-2xl flex flex-col sm:flex-row sm:justify-between items-center gap-4 shadow-sm">
					<div
						class="flex items-center gap-2 text-[12px] font-medium text-text-secondary dark:text-text-secondary-dark">
						<i data-lucide="info" class="w-4 h-4"></i> 资料修改后将在所有公开场景生效
					</div>
					<div class="flex gap-3 w-full sm:w-auto justify-end">
						<button
							class="border border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark hover:bg-bordercolor-light dark:hover:bg-bordercolor-dark px-6 py-2.5 rounded-xl text-[13px] font-bold btn-transition shadow-sm">
							取消更改
						</button>
						<button
							class="bg-text-primary dark:bg-text-primary-dark text-surface-light dark:text-surface-dark px-8 py-2.5 rounded-xl text-[13px] font-bold hover:opacity-90 btn-transition flex items-center gap-2 shadow-sm">
							<span
								class="w-1.5 h-1.5 rounded-full bg-success animate-pulse shadow-[0_0_8px_rgba(82,196,26,0.8)]"></span>
							保存个人资料
						</button>
					</div>
				</div>
			</div>

		</div>

	</main>

	<!-- ==================== 3. 底部：macOS 风格专属 Dock ==================== -->
	<div class="fixed bottom-6 md:bottom-8 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
		<div
			class="pointer-events-auto bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark px-3 py-2 rounded-[24px] shadow-dock flex items-end gap-1 dock-container">

			<!-- App Icon: 单题讲解 (未激活态) -->
			<div class="dock-icon-wrapper w-10">
				<div
					class="dock-tooltip bg-text-primary dark:bg-surface-dark text-surface-light dark:text-text-primary-dark px-2.5 py-1 rounded shadow-md border border-transparent dark:border-bordercolor-dark text-[11px] font-bold">
					单题讲解
				</div>
				<a href="#"
					class="dock-icon w-10 h-10 rounded-[12px] bg-transparent flex items-center justify-center text-text-secondary dark:text-text-secondary-dark hover:bg-text-primary hover:text-surface-light dark:hover:bg-text-primary-dark dark:hover:text-surface-dark transition-colors">
					<i data-lucide="play-square" class="w-5 h-5"></i>
				</a>
			</div>

			<!-- App Icon: 主题课堂 (未激活态) -->
			<div class="dock-icon-wrapper w-10">
				<div
					class="dock-tooltip bg-text-primary dark:bg-surface-dark text-surface-light dark:text-text-primary-dark px-2.5 py-1 rounded shadow-md border border-transparent dark:border-bordercolor-dark text-[11px] font-bold">
					主题课堂
				</div>
				<a href="#"
					class="dock-icon w-10 h-10 rounded-[12px] bg-transparent flex items-center justify-center text-text-secondary dark:text-text-secondary-dark hover:bg-text-primary hover:text-surface-light dark:hover:bg-text-primary-dark dark:hover:text-surface-dark transition-colors">
					<i data-lucide="layout-template" class="w-5 h-5"></i>
				</a>
			</div>

			<!-- App Icon: 学习中心 (未激活态) -->
			<div class="dock-icon-wrapper w-10">
				<div
					class="dock-tooltip bg-text-primary dark:bg-surface-dark text-surface-light dark:text-text-primary-dark px-2.5 py-1 rounded shadow-md border border-transparent dark:border-bordercolor-dark text-[11px] font-bold">
					学习中心
				</div>
				<a href="learning.html"
					class="dock-icon w-10 h-10 rounded-[12px] bg-transparent flex items-center justify-center text-text-secondary dark:text-text-secondary-dark hover:bg-text-primary hover:text-surface-light dark:hover:bg-text-primary-dark dark:hover:text-surface-dark transition-colors">
					<i data-lucide="book-open" class="w-5 h-5"></i>
				</a>
			</div>

			<!-- 分割线 -->
			<div class="w-px h-8 bg-bordercolor-light dark:bg-bordercolor-dark mx-1 self-center mb-1"></div>

			<!-- 工具图标: 中/EN 多语言切换 (未激活态) -->
			<div class="dock-icon-wrapper w-10">
				<div class="dock-tooltip bg-text-primary dark:bg-surface-dark text-surface-light dark:text-text-primary-dark px-2.5 py-1 rounded shadow-md border border-transparent dark:border-bordercolor-dark text-[11px] font-bold"
					id="lang-tooltip">
					中 / EN
				</div>
				<button id="dockLangToggle"
					class="dock-icon w-10 h-10 rounded-[12px] bg-transparent flex items-center justify-center text-text-secondary dark:text-text-secondary-dark hover:bg-bordercolor-light dark:hover:bg-bordercolor-dark transition-colors">
					<i data-lucide="globe" class="w-5 h-5"></i>
				</button>
			</div>

			<!-- 工具图标: 亮暗色切换 (未激活态) -->
			<div class="dock-icon-wrapper w-10">
				<div
					class="dock-tooltip bg-text-primary dark:bg-surface-dark text-surface-light dark:text-text-primary-dark px-2.5 py-1 rounded shadow-md border border-transparent dark:border-bordercolor-dark text-[11px] font-bold">
					切换主题
				</div>
				<button id="dockThemeToggle"
					class="dock-icon w-10 h-10 rounded-[12px] bg-transparent flex items-center justify-center text-text-secondary dark:text-text-secondary-dark hover:bg-bordercolor-light dark:hover:bg-bordercolor-dark transition-colors">
					<i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
					<i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
				</button>
			</div>

			<!-- 工具图标: 用户设置 (已激活态) -->
			<div class="dock-icon-wrapper w-10 relative">
				<div
					class="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-[3px] h-[3px] rounded-full bg-text-primary dark:bg-text-primary-dark">
				</div>
				<div
					class="dock-tooltip bg-text-primary dark:bg-surface-dark text-surface-light dark:text-text-primary-dark px-2.5 py-1 rounded shadow-md border border-transparent dark:border-bordercolor-dark text-[11px] font-bold">
					设置
				</div>
				<a href="#"
					class="w-10 h-10 rounded-[12px] bg-text-primary dark:bg-text-primary-dark flex items-center justify-center text-surface-light dark:text-surface-dark shadow-sm overflow-hidden p-0.5">
					<img src="https://i.pravatar.cc/150?img=68" alt="User"
						class="w-full h-full object-cover rounded-[10px] opacity-90">
				</a>
			</div>

		</div>
	</div>

	<script>
		// 初始化图标
		lucide.createIcons();

		// 亮暗色切换
		const themeToggleBtn = document.getElementById('dockThemeToggle');
		const html = document.documentElement;
		function applyTheme(theme) {
			html.classList.toggle('dark', theme === 'dark');
			html.classList.toggle('light', theme !== 'dark');
			localStorage.setItem('xiaomai-theme', theme);
		}
		applyTheme(localStorage.getItem('xiaomai-theme') || 'light');
		themeToggleBtn.addEventListener('click', () => {
			applyTheme(html.classList.contains('dark') ? 'light' : 'dark');
		});

		// 语言切换演示
		const langToggleBtn = document.getElementById('dockLangToggle');
		const langTooltip = document.getElementById('lang-tooltip');
		if (langToggleBtn && langTooltip) {
			langToggleBtn.addEventListener('click', () => {
				langTooltip.innerText = langTooltip.innerText.includes('EN') ? 'EN / 中' : '中 / EN';
			});
		}
	</script>
</body>

</html>

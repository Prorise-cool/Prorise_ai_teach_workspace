<!DOCTYPE html>
<html lang="zh" class="light">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>小麦 XiaoMai - 智能课堂交互 V4 (悬浮灵动版)</title>

	<!-- 引入 Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">

	<!-- 引入 Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>
	<!-- 引入 Lucide 图标库 -->
	<script src="https://unpkg.com/lucide@latest"></script>

	<!-- 严格配置 Tailwind -->
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						brand: { DEFAULT: '#f5c547', dark: '#e6b841' },
						secondary: { DEFAULT: '#f5ede1', dark: '#2a2420' },
						bg: { light: '#f5ede1', dark: '#1a1614' },
						surface: { light: '#ffffff', dark: '#2a2420' },
						text: { primary: '#3b1701', 'primary-dark': '#f5ede1', secondary: '#6b4421', 'secondary-dark': '#c4b8a8' },
						bordercolor: { light: '#e6dcc8', dark: '#3d3630' },
						agent: { efficient: '#6D5DF4', humorous: '#FFB020', patient: '#00C48C', serious: '#0091FF' }
					},
					fontFamily: { sans: ['Inter', 'Noto Sans SC', 'sans-serif'] }
				}
			}
		}
	</script>

	<style>
		html.light { background-color: #f5ede1; color: #3b1701; }
		html.dark { background-color: #1a1614; color: #f5ede1; }
		body { transition: none; }
		.bg-grid-pattern {
			background-image: linear-gradient(to right, rgba(59, 23, 1, 0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(59, 23, 1, 0.04) 1px, transparent 1px);
			background-size: 40px 40px;
		}
		html.dark .bg-grid-pattern {
			background-image: linear-gradient(to right, rgba(245, 237, 225, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(245, 237, 225, 0.03) 1px, transparent 1px);
		}
		.glass-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
		html.dark .glass-nav { background: rgba(42, 36, 32, 0.4); }
		.dash-border {
			background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='32' ry='32' stroke='%23f5c547' stroke-width='4' stroke-dasharray='10%2c 14' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
			border-radius: 32px;
			animation: dash 20s linear infinite;
		}
		@keyframes dash { to { stroke-dashoffset: 1000; } }
		.btn-hover-scale { transition: transform 0.2s ease, box-shadow 0.2s ease; }
		.btn-hover-scale:hover { transform: scale(1.03); }
		.btn-hover-scale:active { transform: scale(0.97); }
		.dropdown-open { opacity: 1 !important; transform: scale(1) translateY(0) !important; pointer-events: auto !important; }
	</style>
</head>

<body class="min-h-screen flex flex-col relative overflow-y-auto selection:bg-brand selection:text-white overflow-x-hidden">

	<!-- 背景层 -->
	<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
		<div class="absolute inset-0 bg-grid-pattern"></div>
		<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-orange-300/40 dark:bg-orange-900/20 blur-[100px] mix-blend-multiply dark:mix-blend-screen"></div>
		<div class="absolute top-[5%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-blue-200/40 dark:bg-blue-900/20 blur-[100px] mix-blend-multiply dark:mix-blend-screen"></div>
		<div class="absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] rounded-full bg-brand/30 dark:bg-brand-dark/15 blur-[120px] mix-blend-multiply dark:mix-blend-screen"></div>
	</div>

	<!-- 悬浮全局导航 -->
	<header class="w-[94%] max-w-7xl mx-auto mt-6 sticky top-6 z-50 rounded-full flex justify-between items-center p-3 px-4 glass-nav border border-bordercolor-light dark:border-bordercolor-dark shadow-sm">
		<a href="#" class="font-bold text-lg flex items-center gap-3">
			<div class="w-8 h-8 bg-text-primary dark:bg-text-primary-dark rounded-md flex items-center justify-center shadow-sm">
				<i data-lucide="leaf" class="w-4 h-4 text-bg-light dark:text-bg-dark"></i>
			</div>
			<span class="tracking-tight text-text-primary dark:text-text-primary-dark">XiaoMai</span>
		</a>
		<nav class="hidden md:flex gap-1 p-1 rounded-full bg-secondary/80 dark:bg-secondary-dark/80 border border-bordercolor-light dark:border-bordercolor-dark">
			<a href="#" class="flex items-center gap-1.5 px-6 py-1.5 text-sm font-bold rounded-full bg-surface-light dark:bg-surface-dark text-text-primary dark:text-text-primary-dark shadow-sm"><i data-lucide="play-square" class="w-4 h-4"></i> 单题讲解</a>
			<a href="#" class="flex items-center gap-1.5 px-6 py-1.5 text-sm font-bold rounded-full text-text-secondary hover:bg-surface-light/50 transition-colors"><i data-lucide="layout-template" class="w-4 h-4"></i> 主题课堂</a>
			<a href="#" class="flex items-center gap-1.5 px-6 py-1.5 text-sm font-bold rounded-full text-text-secondary hover:bg-surface-light/50 transition-colors"><i data-lucide="book-open" class="w-4 h-4"></i> 学习中心</a>
		</nav>
		<div class="flex items-center gap-3">
			<button id="langToggle" class="flex items-center gap-1 px-3 py-1.5 text-xs font-bold rounded-full border border-bordercolor-light text-text-secondary hover:bg-surface-light transition-colors"><i data-lucide="globe" class="w-3.5 h-3.5"></i><span id="langText">中/EN</span></button>
			<button id="themeToggle" class="p-2 rounded-full border border-bordercolor-light text-text-secondary hover:bg-surface-light transition-colors"><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i></button>
			<div class="w-px h-5 bg-bordercolor-light mx-1"></div>
			<button class="w-8 h-8 rounded-full border border-bordercolor-light overflow-hidden hover:ring-2 hover:ring-brand transition-all shadow-sm shrink-0"><img src="https://i.pravatar.cc/150?img=68" class="w-full h-full object-cover"></button>
		</div>
	</header>

	<main class="flex-1 w-full max-w-4xl mx-auto flex flex-col items-center justify-start px-4 pt-[10vh] pb-12 relative z-20">
		<div class="text-center mb-8 space-y-4">
			<span class="inline-flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-full bg-brand/20 text-text-primary dark:text-brand border border-brand/30 shadow-sm uppercase tracking-widest"><i data-lucide="sparkles" class="w-3 h-3"></i> Video Engine</span>
			<h1 class="text-4xl md:text-[2.75rem] font-extrabold tracking-tight leading-tight text-text-primary dark:text-text-primary-dark">输入或拍题，<br class="md:hidden" /><span class="bg-gradient-to-r from-brand to-[#ff8c00] bg-clip-text text-transparent">5分钟生成动画讲解</span></h1>
		</div>

		<!-- ================= 方向一：悬浮灵动岛 (Floating Smart Dock) ================= -->
		<div id="dropContainer" class="w-full max-w-[800px] relative group flex flex-col gap-3">

			<!-- 抽离的悬浮配置胶囊 (Floating Pills) -->
			<div class="flex items-center justify-between px-2 w-full z-30">
				<!-- 左侧语境胶囊 -->
				<div class="relative">
					<button id="userDropdownBtn" class="flex items-center gap-2 cursor-pointer transition-all duration-300 rounded-full px-3 py-1.5 bg-surface-light/80 dark:bg-surface-dark/80 backdrop-blur-md border border-white/60 dark:border-white/10 shadow-sm hover:shadow-md active:scale-95 group/pill">
						<div class="size-6 rounded-full overflow-hidden ring-[1.5px] ring-brand/50 group-hover/pill:ring-brand transition-all">
							<img src="https://i.pravatar.cc/150?img=68" class="size-full object-cover">
						</div>
						<span class="text-sm font-bold text-text-primary dark:text-text-primary-dark">我遇到了难题</span>
						<i data-lucide="chevron-down" class="size-3.5 text-text-secondary/60"></i>
					</button>
					<!-- 菜单保持原有 ID 确保业务逻辑不断 -->
					<div id="userDropdownMenu" class="absolute left-0 top-[calc(100%+0.5rem)] w-48 rounded-xl border border-white/40 dark:border-white/10 bg-surface-light/90 dark:bg-surface-dark/90 backdrop-blur-xl shadow-xl opacity-0 scale-95 -translate-y-2 pointer-events-none transition-all duration-200 origin-top-left p-1.5 z-50">
						<div class="px-3 py-2 text-xs font-bold text-text-secondary dark:text-text-secondary-dark">选择语境</div>
						<a href="#" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-text-primary hover:bg-secondary rounded-lg"><i data-lucide="help-circle" class="w-4 h-4 text-brand"></i> 我遇到了难题</a>
						<a href="#" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-text-primary hover:bg-secondary rounded-lg"><i data-lucide="lightbulb" class="w-4 h-4 text-agent-efficient"></i> 我想系统学习</a>
					</div>
				</div>

				<!-- 右侧老师胶囊 -->
				<div class="relative">
					<button id="teacherDropdownBtn" class="flex items-center gap-2 cursor-pointer transition-all duration-300 rounded-full px-3 py-1.5 bg-surface-light/80 dark:bg-surface-dark/80 backdrop-blur-md border border-white/60 dark:border-white/10 shadow-sm hover:shadow-md active:scale-95 group/pill">
						<div class="size-6 rounded-full overflow-hidden shrink-0">
							<img id="selectedTeacherAvatar" src="https://i.pravatar.cc/150?img=58" class="w-full h-full object-cover">
						</div>
						<span class="text-sm font-bold bg-gradient-to-r from-brand to-orange-500 bg-clip-text text-transparent" id="selectedTeacherName">风趣老师</span>
						<i data-lucide="chevron-down" class="size-3.5 text-text-secondary"></i>
					</button>
					<div id="teacherDropdownMenu" class="absolute right-0 top-[calc(100%+0.5rem)] w-56 rounded-xl border border-white/40 dark:border-white/10 bg-surface-light/90 dark:bg-surface-dark/90 backdrop-blur-xl shadow-xl opacity-0 scale-95 -translate-y-2 pointer-events-none transition-all duration-200 origin-top-right p-1.5 z-50">
						<div class="px-3 py-2 text-xs font-bold text-text-secondary dark:text-text-secondary-dark mb-1">选择辅导风格</div>
						<!-- 选择老师选项保持不变 -->
						<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-secondary dark:hover:bg-secondary-dark transition-colors text-left" onclick="selectTeacher(this, '32', '严谨教授')"><div class="w-3 h-3 rounded-full bg-agent-serious"></div><div class="flex flex-col"><span class="text-sm font-bold text-text-primary">严谨教授</span><span class="text-[10px] text-text-secondary">结构清晰，适合考前冲刺</span></div></button>
						<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-secondary dark:hover:bg-secondary-dark transition-colors text-left" onclick="selectTeacher(this, '58', '风趣老师')"><div class="w-3 h-3 rounded-full bg-agent-humorous"></div><div class="flex flex-col"><span class="text-sm font-bold text-text-primary">风趣老师</span><span class="text-[10px] text-text-secondary">擅长比喻，适合概念入门</span></div></button>
						<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-secondary dark:hover:bg-secondary-dark transition-colors text-left" onclick="selectTeacher(this, '47', '温和导师')"><div class="w-3 h-3 rounded-full bg-agent-patient"></div><div class="flex flex-col"><span class="text-sm font-bold text-text-primary">温和导师</span><span class="text-[10px] text-text-secondary">步骤详尽，适合难点攻克</span></div></button>
					</div>
				</div>
			</div>

			<!-- 纯粹的发光毛玻璃输入框 -->
			<div class="relative w-full rounded-[32px] border border-white/60 dark:border-white/10 bg-surface-light/50 dark:bg-surface-dark/40 backdrop-blur-2xl shadow-[0_8px_32px_rgba(0,0,0,0.08)] transition-all duration-500 focus-within:shadow-[0_0_40px_rgba(245,197,71,0.2)] focus-within:bg-surface-light/80 dark:focus-within:bg-surface-dark/80 flex flex-col min-h-[220px] p-6 pb-16">

				<!-- 拖拽覆盖层，配合更大的圆角 -->
				<div id="dropOverlay" class="absolute inset-0 z-50 p-2 hidden">
					<div class="w-full h-full dash-border bg-surface-light/95 dark:bg-surface-dark/95 backdrop-blur-md flex flex-col items-center justify-center rounded-[24px] shadow-2xl">
						<div class="w-16 h-16 rounded-full bg-brand/10 flex items-center justify-center mb-3 animate-bounce"><i data-lucide="image-plus" class="w-8 h-8 text-brand-dark dark:text-brand"></i></div>
						<h3 class="text-xl font-bold text-text-primary dark:text-text-primary-dark">松开鼠标上传图片</h3>
					</div>
				</div>

				<!-- 文本输入区 -->
				<textarea placeholder="粘贴题目文本，或描述具体要求... (支持拖拽文件)&#10;&#10;例如：「求函数 f(x) = x^3 - 3x 的极值点并画出变化趋势」" class="w-full flex-1 resize-none border-0 bg-transparent text-lg md:text-xl leading-relaxed placeholder:text-text-secondary/40 dark:placeholder:text-text-secondary-dark/40 text-text-primary dark:text-text-primary-dark font-medium focus:ring-0 focus:outline-none" rows="3"></textarea>

				<!-- 底部内部悬浮操作栏 -->
				<div class="absolute bottom-4 left-6 flex items-center gap-2">
					<button class="w-10 h-10 rounded-full bg-white/50 dark:bg-black/50 hover:bg-white dark:hover:bg-black flex items-center justify-center text-text-secondary hover:text-brand-dark transition-all shadow-sm backdrop-blur-sm" title="上传图片"><i data-lucide="image" class="w-4.5 h-4.5"></i></button>
					<button class="w-10 h-10 rounded-full bg-white/50 dark:bg-black/50 hover:bg-white dark:hover:bg-black flex items-center justify-center text-text-secondary hover:text-brand-dark transition-all shadow-sm backdrop-blur-sm" title="截图"><i data-lucide="scissors" class="w-4.5 h-4.5"></i></button>
					<button class="hidden sm:flex items-center gap-1.5 px-4 py-2 rounded-full bg-white/50 dark:bg-black/50 hover:bg-white dark:hover:bg-black text-xs font-bold text-text-secondary transition-all shadow-sm backdrop-blur-sm">
						<i data-lucide="clock" class="w-3.5 h-3.5"></i> <span>~2分钟</span> <i data-lucide="chevron-down" class="w-3 h-3"></i>
					</button>
				</div>

				<!-- 独立发光的生成大按钮 -->
				<div class="absolute bottom-4 right-4">
					<button class="flex items-center gap-2 px-6 py-3 rounded-full bg-gradient-to-r from-brand to-[#ff8c00] text-white font-bold shadow-[0_4px_20px_rgba(245,197,71,0.4)] btn-hover-scale hover:shadow-[0_8px_30px_rgba(245,197,71,0.6)] group/send shrink-0">
						<span class="text-sm tracking-wide">施展魔法</span>
						<i data-lucide="wand-2" class="w-4 h-4 group-hover/send:rotate-12 transition-transform"></i>
					</button>
				</div>
			</div>
		</div>

		<!-- 灵感快捷指令 -->
		<div class="flex flex-wrap justify-center items-center gap-3 mt-8">
			<button class="px-4 py-1.5 rounded-full border border-white/40 dark:border-white/10 bg-surface-light/50 backdrop-blur-md text-xs font-bold text-text-primary hover:border-brand transition-colors shadow-sm flex items-center gap-1.5"><i data-lucide="sparkles" class="w-3.5 h-3.5 text-brand"></i> 证明洛必达法则</button>
			<button class="px-4 py-1.5 rounded-full border border-white/40 dark:border-white/10 bg-surface-light/50 backdrop-blur-md text-xs font-bold text-text-primary hover:border-brand transition-colors shadow-sm flex items-center gap-1.5"><i data-lucide="sparkles" class="w-3.5 h-3.5 text-brand"></i> 求解经典偏导数方程</button>
		</div>
	</main>

	<!-- ==================== 瀑布流画廊保持原样 ==================== -->
	<section class="w-full max-w-7xl mx-auto px-6 pb-24 relative z-10">
		<div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b-2 border-text-primary dark:border-text-primary-dark pb-4">
			<div><h2 class="text-2xl font-black mb-1 text-text-primary">热门题目讲解视频</h2></div>
		</div>
		<div id="feedContainer" class="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6">
			<!-- 真实卡片 1 -->
			<div class="break-inside-avoid bg-surface-light rounded-lg border border-bordercolor-light overflow-hidden shadow-sm"><div class="w-full aspect-video bg-secondary relative"><img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&q=80&w=400" class="absolute inset-0 w-full h-full object-cover opacity-60"></div><div class="p-4"><h3 class="font-bold text-[15px] mb-3 line-clamp-2">求极限 lim(x->0) (sinx/x) 的推导</h3></div></div>
		</div>
		<div class="flex justify-center mt-10"><button id="loadMoreBtn" class="border border-bordercolor-light bg-surface-light px-6 py-2.5 rounded-md font-bold hover:bg-secondary btn-hover-scale">加载更多</button></div>
	</section>

	<script>
		lucide.createIcons();
		document.getElementById('themeToggle').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); document.documentElement.classList.toggle('light'); });
		document.getElementById('langToggle').addEventListener('click', () => { const t = document.getElementById('langText'); t.innerText = t.innerText === '中/EN' ? 'EN/中' : '中/EN'; });

		// 拖拽逻辑
		const dropContainer = document.getElementById('dropContainer');
		const dropOverlay = document.getElementById('dropOverlay');
		dropContainer.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.classList.remove('hidden'); });
		dropOverlay.addEventListener('dragleave', (e) => { e.preventDefault(); dropOverlay.classList.add('hidden'); });
		dropOverlay.addEventListener('drop', (e) => { e.preventDefault(); dropOverlay.classList.add('hidden'); });

		// 下拉菜单逻辑
		function setupDropdown(btnId, menuId) {
			const btn = document.getElementById(btnId);
			const menu = document.getElementById(menuId);
			btn.addEventListener('click', (e) => {
				e.stopPropagation();
				document.querySelectorAll('.dropdown-open').forEach(el => { if (el !== menu) el.classList.remove('dropdown-open'); });
				menu.classList.toggle('dropdown-open');
			});
			menu.addEventListener('click', (e) => e.stopPropagation());
		}
		setupDropdown('userDropdownBtn', 'userDropdownMenu');
		setupDropdown('teacherDropdownBtn', 'teacherDropdownMenu');
		document.addEventListener('click', () => { document.querySelectorAll('.dropdown-open').forEach(m => m.classList.remove('dropdown-open')); });

		// 老师选择逻辑 (保持业务逻辑不变)
		function selectTeacher(btnElement, avatarId, teacherName) {
			document.getElementById('selectedTeacherAvatar').src = `https://i.pravatar.cc/150?img=${avatarId}`;
			document.getElementById('selectedTeacherName').innerText = teacherName;
			document.getElementById('teacherDropdownMenu').classList.remove('dropdown-open');
		}

		// 简单处理瀑布流占位
		document.getElementById('loadMoreBtn').addEventListener('click', function() {
			this.parentElement.classList.add('hidden');
			setTimeout(() => { this.parentElement.classList.remove('hidden'); }, 1500);
		});
	</script>
</body>
</html>

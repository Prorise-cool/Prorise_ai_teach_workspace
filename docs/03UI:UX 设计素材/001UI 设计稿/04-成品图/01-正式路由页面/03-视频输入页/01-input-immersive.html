<!DOCTYPE html>
<html lang="zh" class="light">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>小麦 XiaoMai - 智能课堂交互 V4 (沉浸式极简版)</title>

	<!-- 引入 Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

	<!-- 引入 Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>
	<!-- 引入 Lucide 图标库 -->
	<script src="https://unpkg.com/lucide@latest"></script>

	<!-- 严格配置 Tailwind -->
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						brand: { DEFAULT: '#f5c547', dark: '#e6b841' },
						secondary: { DEFAULT: '#f5ede1', dark: '#2a2420' },
						bg: { light: '#f5ede1', dark: '#1a1614' },
						surface: { light: '#ffffff', dark: '#2a2420' },
						text: { primary: '#3b1701', 'primary-dark': '#f5ede1', secondary: '#6b4421', 'secondary-dark': '#c4b8a8' },
						bordercolor: { light: '#e6dcc8', dark: '#3d3630' },
						agent: { efficient: '#6D5DF4', humorous: '#FFB020', patient: '#00C48C', serious: '#0091FF' }
					},
					fontFamily: { sans: ['Inter', 'Noto Sans SC', 'sans-serif'] }
				}
			}
		}
	</script>

	<style>
		html.light { background-color: #f5ede1; color: #3b1701; }
		html.dark { background-color: #1a1614; color: #f5ede1; }
		body { transition: none; }

		/* 沉浸式背景：聚焦输入时的渐晕黑底 */
		.bg-overlay {
			position: fixed; inset: 0; z-index: 10; pointer-events: none;
			background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.05) 100%);
			transition: background 0.6s ease;
		}
		body.focus-mode .bg-overlay { background: radial-gradient(circle at center, rgba(0,0,0,0.1) 20%, rgba(0,0,0,0.6) 100%); backdrop-filter: blur(4px); }
		html.dark body.focus-mode .bg-overlay { background: radial-gradient(circle at center, rgba(0,0,0,0.4) 20%, rgba(0,0,0,0.85) 100%); backdrop-filter: blur(8px); }

		.bg-grid-pattern {
			background-image: linear-gradient(to right, rgba(59, 23, 1, 0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(59, 23, 1, 0.04) 1px, transparent 1px);
			background-size: 40px 40px;
		}
		html.dark .bg-grid-pattern {
			background-image: linear-gradient(to right, rgba(245, 237, 225, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(245, 237, 225, 0.03) 1px, transparent 1px);
		}

		.glass-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
		html.dark .glass-nav { background: rgba(42, 36, 32, 0.4); }

		/* 极简输入框展开动画 */
		.auto-expand-textarea {
			transition: min-height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
		}
		body.focus-mode .auto-expand-textarea {
			min-height: 180px;
		}

		/* 隐藏非关键内容 */
		.fade-on-focus { transition: opacity 0.5s ease; }
		body.focus-mode .fade-on-focus { opacity: 0.1; pointer-events: none; }

		.dropdown-open { opacity: 1 !important; transform: scale(1) translateY(0) !important; pointer-events: auto !important; }

		/* 巨型输入文字发光 */
		.glowing-text {
			text-shadow: 0 0 0 transparent;
			transition: text-shadow 0.3s ease;
		}
		body.focus-mode .glowing-text {
			text-shadow: 0 0 16px rgba(245, 197, 71, 0.3);
		}
		html.dark body.focus-mode .glowing-text {
			text-shadow: 0 0 24px rgba(255, 255, 255, 0.2);
		}
	</style>
</head>

<body class="min-h-screen flex flex-col relative overflow-y-auto selection:bg-brand selection:text-white overflow-x-hidden">

	<!-- 沉浸遮罩层 -->
	<div class="bg-overlay"></div>

	<!-- 背景层 -->
	<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden fade-on-focus">
		<div class="absolute inset-0 bg-grid-pattern"></div>
		<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-orange-300/40 dark:bg-orange-900/20 blur-[100px] mix-blend-multiply dark:mix-blend-screen"></div>
		<div class="absolute top-[5%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-blue-200/40 dark:bg-blue-900/20 blur-[100px] mix-blend-multiply dark:mix-blend-screen"></div>
		<div class="absolute bottom-[-20%] left-[20%] w-[60vw] h-[60vw] rounded-full bg-brand/30 dark:bg-brand-dark/15 blur-[120px] mix-blend-multiply dark:mix-blend-screen"></div>
	</div>

	<!-- 悬浮全局导航 -->
	<header class="w-[94%] max-w-7xl mx-auto mt-6 sticky top-6 z-50 rounded-full flex justify-between items-center p-3 px-4 glass-nav border border-bordercolor-light dark:border-bordercolor-dark shadow-sm fade-on-focus">
		<a href="#" class="font-bold text-lg flex items-center gap-3">
			<div class="w-8 h-8 bg-text-primary dark:bg-text-primary-dark rounded-md flex items-center justify-center shadow-sm">
				<i data-lucide="leaf" class="w-4 h-4 text-bg-light dark:text-bg-dark"></i>
			</div>
			<span class="tracking-tight text-text-primary dark:text-text-primary-dark">XiaoMai</span>
		</a>
		<div class="flex items-center gap-3">
			<button id="themeToggle" class="p-2 rounded-full border border-bordercolor-light text-text-secondary hover:bg-surface-light transition-colors"><i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i><i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i></button>
			<button class="w-8 h-8 rounded-full border border-bordercolor-light overflow-hidden hover:ring-2 hover:ring-brand transition-all shadow-sm shrink-0"><img src="https://i.pravatar.cc/150?img=68" class="w-full h-full object-cover"></button>
		</div>
	</header>

	<main class="flex-1 w-full max-w-4xl mx-auto flex flex-col items-center justify-start px-4 pt-[20vh] pb-12 relative z-30">
		<div class="text-center mb-12 space-y-4 fade-on-focus">
			<h1 class="text-5xl md:text-[3.5rem] font-black tracking-tight leading-tight text-text-primary dark:text-text-primary-dark">
				What are you creating?
			</h1>
		</div>

		<!-- ================= 方向二：极简沉浸台 (Minimalist Creator) ================= -->
		<!-- 去除了所有的外框，只剩一条底线或纯文字感 -->
		<div id="dropContainer" class="w-full max-w-[850px] relative group flex flex-col items-center">

			<!-- 极简配置胶囊：默认只显示选中的老师，点击展开 -->
			<div class="relative w-full max-w-[800px] mb-4 flex justify-start opacity-60 hover:opacity-100 transition-opacity z-40">
				<!-- 把两个配置合并到一行 -->
				<div class="flex items-center gap-4 bg-transparent">
					<!-- 语境 -->
					<div class="relative">
						<button id="userDropdownBtn" class="flex items-center gap-1.5 cursor-pointer text-sm font-bold text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark transition-colors">
							<span class="w-2 h-2 rounded-full bg-brand"></span> 我遇到了难题 <i data-lucide="chevron-down" class="size-3"></i>
						</button>
						<div id="userDropdownMenu" class="absolute left-0 top-[calc(100%+0.5rem)] w-48 rounded-xl bg-surface-light dark:bg-surface-dark shadow-xl opacity-0 scale-95 -translate-y-2 pointer-events-none transition-all duration-200 p-1.5 z-50">
							<a href="#" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-text-primary hover:bg-secondary rounded-lg">我遇到了难题</a>
							<a href="#" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-text-primary hover:bg-secondary rounded-lg">我想系统学习</a>
						</div>
					</div>

					<div class="w-px h-4 bg-text-secondary/30"></div>

					<!-- 老师 -->
					<div class="relative">
						<button id="teacherDropdownBtn" class="flex items-center gap-1.5 cursor-pointer text-sm font-bold text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark transition-colors">
							<img id="selectedTeacherAvatar" src="https://i.pravatar.cc/150?img=58" class="size-5 rounded-full object-cover grayscale opacity-80 group-hover:grayscale-0">
							<span id="selectedTeacherName">风趣老师</span> <i data-lucide="chevron-down" class="size-3"></i>
						</button>
						<div id="teacherDropdownMenu" class="absolute left-0 top-[calc(100%+0.5rem)] w-56 rounded-xl bg-surface-light dark:bg-surface-dark shadow-xl opacity-0 scale-95 -translate-y-2 pointer-events-none transition-all duration-200 p-1.5 z-50">
							<!-- 选择老师选项保持不变 -->
							<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-secondary text-left" onclick="selectTeacher(this, '32', '严谨教授')"><span class="text-sm font-bold text-text-primary">严谨教授</span></button>
							<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-secondary text-left" onclick="selectTeacher(this, '58', '风趣老师')"><span class="text-sm font-bold text-text-primary">风趣老师</span></button>
							<button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-secondary text-left" onclick="selectTeacher(this, '47', '温和导师')"><span class="text-sm font-bold text-text-primary">温和导师</span></button>
						</div>
					</div>
				</div>
			</div>

			<!-- 极简核心输入框 -->
			<div class="relative w-full border-b-2 border-text-secondary/20 dark:border-text-secondary-dark/20 focus-within:border-brand dark:focus-within:border-brand transition-colors duration-500 pb-4">

				<!-- 拖拽覆盖层，全屏发光 -->
				<div id="dropOverlay" class="fixed inset-4 z-[999] pointer-events-none hidden">
					<div class="w-full h-full border-4 border-dashed border-brand rounded-[40px] bg-brand/5 backdrop-blur-sm flex flex-col items-center justify-center shadow-[0_0_100px_rgba(245,197,71,0.2)]">
						<div class="w-24 h-24 rounded-full bg-brand/20 flex items-center justify-center mb-6 animate-bounce"><i data-lucide="upload-cloud" class="w-12 h-12 text-brand"></i></div>
						<h3 class="text-3xl font-black text-text-primary dark:text-text-primary-dark">任意位置松开上传</h3>
					</div>
				</div>

				<!-- 超大文本输入区 -->
				<textarea id="mainInput" placeholder="描述你想要生成的视频..." class="w-full resize-none border-0 bg-transparent text-3xl md:text-4xl font-extrabold leading-tight placeholder:text-text-secondary/30 dark:placeholder:text-text-secondary-dark/20 text-text-primary dark:text-text-primary-dark focus:ring-0 focus:outline-none auto-expand-textarea min-h-[60px] glowing-text overflow-hidden" rows="1"></textarea>

				<!-- 悬浮在输入区域下方的隐藏工具 -->
				<div class="absolute bottom-[-50px] left-0 right-0 flex justify-between items-center opacity-0 transform translate-y-4 group-focus-within:opacity-100 group-focus-within:translate-y-0 transition-all duration-500 z-40">
					<div class="flex items-center gap-4 text-text-secondary/60">
						<button class="hover:text-text-primary hover:scale-110 transition-all" title="添加附件"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
						<button class="hover:text-text-primary hover:scale-110 transition-all" title="语音描述"><i data-lucide="mic" class="w-5 h-5"></i></button>
					</div>
					<!-- 极简黑/白发光按钮 -->
					<button class="flex items-center justify-center w-12 h-12 rounded-full bg-text-primary dark:bg-text-primary-dark text-bg-light dark:text-bg-dark shadow-xl hover:scale-110 transition-transform">
						<i data-lucide="arrow-up" class="w-6 h-6"></i>
					</button>
				</div>
			</div>
		</div>

		<!-- 灵感快捷指令 -->
		<div class="flex flex-wrap justify-center items-center gap-4 mt-24 fade-on-focus">
			<button class="text-lg font-bold text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark hover:-translate-y-1 transition-all">证明洛必达法则</button>
			<span class="text-text-secondary/30">&bull;</span>
			<button class="text-lg font-bold text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark hover:-translate-y-1 transition-all">求解偏导数方程</button>
		</div>
	</main>

	<!-- ==================== 瀑布流画廊保持原样 ==================== -->
	<section class="w-full max-w-7xl mx-auto px-6 pb-24 relative z-10 fade-on-focus">
		<div class="flex flex-col md:flex-row justify-between items-end mb-8 border-b border-text-secondary/20 pb-4">
			<div><h2 class="text-2xl font-black mb-1 text-text-primary">近期热门</h2></div>
		</div>
		<div id="feedContainer" class="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6">
			<!-- 真实卡片 1 -->
			<div class="break-inside-avoid bg-surface-light rounded-2xl overflow-hidden shadow-sm"><div class="w-full aspect-video bg-secondary relative"><img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&q=80&w=400" class="absolute inset-0 w-full h-full object-cover opacity-60"></div><div class="p-6"><h3 class="font-bold text-lg mb-3 leading-snug line-clamp-2">求极限 lim(x->0) (sinx/x) 的几何动画推导</h3></div></div>
		</div>
	</section>

	<script>
		lucide.createIcons();
		document.getElementById('themeToggle').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); document.documentElement.classList.toggle('light'); });

		// 沉浸模式逻辑
		const mainInput = document.getElementById('mainInput');
		mainInput.addEventListener('focus', () => { document.body.classList.add('focus-mode'); });
		mainInput.addEventListener('blur', () => {
			if(mainInput.value.trim() === '') { document.body.classList.remove('focus-mode'); }
		});
		// 自动扩展 Textarea 高度
		mainInput.addEventListener('input', function() {
			this.style.height = 'auto';
			this.style.height = (this.scrollHeight) + 'px';
		});

		// 拖拽逻辑 (全局)
		const dropOverlay = document.getElementById('dropOverlay');
		document.body.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.classList.remove('hidden'); });
		dropOverlay.addEventListener('dragleave', (e) => { e.preventDefault(); dropOverlay.classList.add('hidden'); });
		dropOverlay.addEventListener('drop', (e) => { e.preventDefault(); dropOverlay.classList.add('hidden'); document.body.classList.add('focus-mode'); mainInput.focus(); });

		// 下拉菜单逻辑
		function setupDropdown(btnId, menuId) {
			const btn = document.getElementById(btnId);
			const menu = document.getElementById(menuId);
			btn.addEventListener('click', (e) => {
				e.stopPropagation();
				document.querySelectorAll('.dropdown-open').forEach(el => { if (el !== menu) el.classList.remove('dropdown-open'); });
				menu.classList.toggle('dropdown-open');
			});
			menu.addEventListener('click', (e) => e.stopPropagation());
		}
		setupDropdown('userDropdownBtn', 'userDropdownMenu');
		setupDropdown('teacherDropdownBtn', 'teacherDropdownMenu');
		document.addEventListener('click', () => { document.querySelectorAll('.dropdown-open').forEach(m => m.classList.remove('dropdown-open')); });

		function selectTeacher(btnElement, avatarId, teacherName) {
			document.getElementById('selectedTeacherAvatar').src = `https://i.pravatar.cc/150?img=${avatarId}`;
			document.getElementById('selectedTeacherName').innerText = teacherName;
			document.getElementById('teacherDropdownMenu').classList.remove('dropdown-open');
		}
	</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>小麦 XiaoMai - 视频生成中</title>
	<!-- 引入 Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>
	<!-- 引入 Remix Icon -->
	<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
	<!-- 引入 Inter 字体 -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">

	<!-- Tailwind 配置 & XiaoMai Design Tokens -->
	<script>
		tailwind.config = {
			darkMode: 'class', // 开启基于 class 的暗色模式
			theme: {
				extend: {
					fontFamily: {
						sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'PingFang SC', 'sans-serif'],
						mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
					},
					colors: {
						brand: {
							primary: '#f5c547',
							'primary-dark': '#e6b841',
							secondary: '#f5ede1',
							'secondary-dark': '#2a2420',
							decorative: '#3b1701',
							// 亮色模式表面
							'bg-light': '#fdfaf6', /* 稍微提亮基础背景色，更显干净 */
							'surface-light': '#ffffff',
							'text-primary': '#3b1701',
							'text-secondary': '#6b4421',
							'border-light': '#e6dcc8',
							// 暗色模式表面
							'bg-dark': '#12100e', /* 加深暗色背景，凸显光晕 */
							'surface-dark': '#1e1a17',
							'text-primary-dark': '#f5ede1',
							'text-secondary-dark': '#a39788',
							'border-dark': '#302a25',
							// 语义色
							success: '#52c41a',
							warning: '#ff6700',
							error: '#f82834',
						}
					},
					spacing: {
						'1': '4px', '2': '8px', '3': '12px', '4': '16px', '5': '20px', '6': '24px', '8': '32px', '10': '40px',
					},
					borderRadius: {
						'sm': '4px', 'md': '8px', 'lg': '16px', 'full': '9999px',
					}
				}
			}
		}
	</script>

	<!-- 主题初始化脚本 (防止闪烁) -->
	<script>
		if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
			document.documentElement.classList.add('dark')
		} else {
			document.documentElement.classList.remove('dark')
		}
	</script>

	<style>
		/* ================= CSS 变量定义 (适配亮/暗色高级质感) ================= */
		:root {
			--grid-color: rgba(59, 23, 1, 0.04);
			--glow-color: rgba(245, 197, 71, 0.15);
			/* 亮色下的微弱主色光晕 */
			--loader-text: #3b1701;
			--log-mask-gradient: linear-gradient(180deg, transparent 0%, black 15%, black 85%, transparent 100%);
			--glass-bg: rgba(255, 255, 255, 0.4);
			--glass-border: rgba(255, 255, 255, 0.6);
		}

		.dark {
			--grid-color: rgba(245, 237, 225, 0.03);
			--glow-color: rgba(245, 197, 71, 0.08);
			/* 暗色下的深邃环境光 */
			--loader-text: #f5ede1;
			--glass-bg: rgba(30, 26, 23, 0.4);
			--glass-border: rgba(245, 237, 225, 0.05);
		}

		body {
			transition: background-color 0.6s ease, color 0.6s ease;
		}

		/* ================= 高级空间感背景 ================= */
		.bg-grid {
			background-image:
				linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
				linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
			background-size: 32px 32px;
			/* 边缘羽化，中间清晰 */
			mask-image: radial-gradient(circle at 50% 50%, black 20%, transparent 80%);
			-webkit-mask-image: radial-gradient(circle at 50% 50%, black 20%, transparent 80%);
		}

		.bg-ambient-glow {
			position: absolute;
			top: 40%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 80vw;
			height: 80vw;
			max-width: 800px;
			max-height: 800px;
			background: radial-gradient(circle, var(--glow-color) 0%, transparent 60%);
			pointer-events: none;
			z-index: 0;
			transition: background 0.6s ease;
		}

		/* ================= 纯净的 GENERATING 流光文字 ================= */
		.loader-wrapper {
			position: relative;
			display: inline-flex;
			font-size: 3rem;
			font-weight: 900;
			user-select: none;
			letter-spacing: 0.15em;
			text-transform: uppercase;
		}

		/* 流光扫过效果 */
		.loader-wrapper::before {
			content: "GENERATING";
			position: absolute;
			inset: 0;
			background: linear-gradient(90deg, transparent 0%, rgba(245, 197, 71, 0.8) 50%, transparent 100%);
			background-size: 200% auto;
			color: transparent;
			-webkit-background-clip: text;
			background-clip: text;
			animation: shine 3s linear infinite;
			z-index: 3;
			pointer-events: none;
		}

		.loader-letter {
			color: var(--loader-text);
			opacity: 0.15;
			display: inline-block;
			animation: loader-letter-anim 4s infinite linear;
			transition: color 0.6s ease;
		}

		/* 字母波浪延迟 */
		.loader-letter:nth-child(1) {
			animation-delay: 0.1s;
		}

		.loader-letter:nth-child(2) {
			animation-delay: 0.2s;
		}

		.loader-letter:nth-child(3) {
			animation-delay: 0.3s;
		}

		.loader-letter:nth-child(4) {
			animation-delay: 0.4s;
		}

		.loader-letter:nth-child(5) {
			animation-delay: 0.5s;
		}

		.loader-letter:nth-child(6) {
			animation-delay: 0.6s;
		}

		.loader-letter:nth-child(7) {
			animation-delay: 0.7s;
		}

		.loader-letter:nth-child(8) {
			animation-delay: 0.8s;
		}

		.loader-letter:nth-child(9) {
			animation-delay: 0.9s;
		}

		.loader-letter:nth-child(10) {
			animation-delay: 1.0s;
		}

		/* ================= 进度条发光动效 ================= */
		.progress-fill {
			background-image: linear-gradient(-45deg,
					rgba(255, 255, 255, 0.4) 25%, transparent 25%, transparent 50%,
					rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0.4) 75%, transparent 75%, transparent);
			background-size: 32px 32px;
			animation: progress-pan 1.5s linear infinite;
			transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
			box-shadow: 0 0 16px rgba(245, 197, 71, 0.6);
			/* 核心发光点 */
		}

		/* ================= 玻璃态日志面板 ================= */
		.glass-panel {
			background-color: var(--glass-bg);
			border: 1px solid var(--glass-border);
			backdrop-filter: blur(12px);
			-webkit-backdrop-filter: blur(12px);
			transition: background-color 0.6s ease, border-color 0.6s ease;
		}

		.log-container {
			-webkit-mask-image: var(--log-mask-gradient);
			mask-image: var(--log-mask-gradient);
		}

		.log-scroll::-webkit-scrollbar {
			width: 0px;
		}

		.log-item {
			animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
		}

		/* ================= 动画 Keyframes ================= */
		@keyframes shine {
			0% {
				background-position: -100% center;
			}

			100% {
				background-position: 200% center;
			}
		}

		@keyframes loader-letter-anim {

			0%,
			100% {
				opacity: 0.15;
				filter: blur(1px);
				transform: translateY(0);
			}

			10% {
				opacity: 1;
				filter: blur(0);
				transform: translateY(-3px) scale(1.02);
			}

			30% {
				opacity: 0.3;
				transform: translateY(0);
			}
		}

		@keyframes progress-pan {
			0% {
				background-position: 0 0;
			}

			100% {
				background-position: 32px 0;
			}
		}

		@keyframes blink {

			0%,
			100% {
				opacity: 1;
			}

			50% {
				opacity: 0;
			}
		}

		@keyframes slideUpFade {
			from {
				opacity: 0;
				transform: translateY(12px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.cursor-blink {
			display: inline-block;
			width: 6px;
			height: 14px;
			background-color: #f5c547;
			animation: blink 1s step-end infinite;
			vertical-align: middle;
			margin-left: 6px;
			border-radius: 2px;
		}

		/* 提示词渐隐 */
		.tip-transition {
			transition: opacity 0.5s ease, transform 0.5s ease;
		}

		.tip-hidden {
			opacity: 0;
			transform: translateY(5px);
		}

		.tip-visible {
			opacity: 1;
			transform: translateY(0);
		}
	</style>
</head>

<body
	class="bg-brand-bg-light dark:bg-brand-bg-dark text-brand-text-primary dark:text-brand-text-primary-dark min-h-screen flex flex-col relative overflow-hidden">

	<!-- 环境层：居中光晕与超细网格，消除黑线感 -->
	<div class="bg-ambient-glow"></div>
	<div class="fixed inset-0 bg-grid pointer-events-none z-0"></div>

	<!-- 顶部导航：极简透明 -->
	<header class="w-full px-6 py-6 flex items-center justify-between relative z-20">
		<a href="#"
			class="group flex items-center gap-2 text-sm font-medium text-brand-text-secondary dark:text-brand-text-secondary-dark hover:text-brand-text-primary dark:hover:text-brand-text-primary-dark transition-colors">
			<div
				class="w-8 h-8 rounded-full border border-brand-border-light dark:border-brand-border-dark flex items-center justify-center group-hover:bg-brand-border-light/50 dark:group-hover:bg-brand-border-dark/50 transition-colors backdrop-blur-md">
				<i class="ri-arrow-left-line text-lg"></i>
			</div>
			返回工作台
		</a>

		<!-- 亮暗色切换 & 状态 -->
		<div class="flex items-center gap-6">
			<div class="flex items-center gap-2">
				<span class="relative flex h-2 w-2">
					<span
						class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-primary opacity-75"></span>
					<span class="relative inline-flex rounded-full h-2 w-2 bg-brand-primary"></span>
				</span>
				<span
					class="text-xs font-semibold text-brand-text-secondary dark:text-brand-text-secondary-dark tracking-widest uppercase opacity-80">Engine
					Active</span>
			</div>

			<button id="theme-toggle"
				class="w-8 h-8 rounded-full border border-brand-border-light dark:border-brand-border-dark flex items-center justify-center text-brand-text-secondary dark:text-brand-text-secondary-dark hover:bg-brand-border-light/50 dark:hover:bg-brand-border-dark/50 transition-colors backdrop-blur-md">
				<i id="theme-icon" class="ri-moon-line text-lg"></i>
			</button>
		</div>
	</header>

	<!-- 主体内空区：沉浸、呼吸感 -->
	<main class="flex-1 flex flex-col items-center justify-center w-full max-w-3xl mx-auto px-6 relative z-10 -mt-8">

		<!-- 炫酷文本：已移除遮罩引起的怪异线条，改为全息流光 -->
		<div class="mb-14 md:scale-105">
			<div class="loader-wrapper" aria-label="Generating">
				<span class="loader-letter">G</span><span class="loader-letter">E</span><span
					class="loader-letter">N</span><span class="loader-letter">E</span><span
					class="loader-letter">R</span><span class="loader-letter">A</span><span
					class="loader-letter">T</span><span class="loader-letter">I</span><span
					class="loader-letter">N</span><span class="loader-letter">G</span>
			</div>
		</div>

		<!-- 进度与信息展示区 -->
		<div class="w-full max-w-2xl mb-10">
			<div class="flex justify-between items-end mb-4 px-1">
				<div class="flex flex-col gap-1.5">
					<span class="text-xl font-bold tracking-wide" id="status-title">正在渲染动画帧</span>
					<span
						class="text-sm text-brand-text-secondary dark:text-brand-text-secondary-dark opacity-80 font-medium"
						id="eta-text">预计还需要 2 分 30 秒，后台会自动完成</span>
				</div>
				<span id="progress-text"
					class="text-4xl font-black font-mono tracking-tighter text-brand-primary drop-shadow-[0_0_16px_rgba(245,197,71,0.4)]">50%</span>
			</div>

			<!-- 发光进度条 -->
			<div
				class="h-2 w-full bg-brand-border-light/60 dark:bg-brand-border-dark/60 rounded-full overflow-hidden backdrop-blur-sm">
				<div class="progress-fill h-full w-1/2 bg-brand-primary rounded-full relative" id="progress-bar"></div>
			</div>
		</div>

		<!-- 玻璃态日志面板：提供微微的承托感，不再完全凌乱 -->
		<div class="w-full max-w-2xl h-36 glass-panel rounded-2xl relative font-mono text-[13px] shadow-sm">
			<div class="log-container h-full w-full">
				<div
					class="log-scroll h-full overflow-y-auto px-6 pb-6 pt-8 space-y-4 relative flex flex-col justify-end">

					<!-- Normal Log -->
					<div class="log-normal space-y-4">
						<div
							class="log-item flex items-start gap-3 text-brand-text-secondary dark:text-brand-text-secondary-dark opacity-70">
							<i class="ri-check-line text-brand-success mt-0.5 font-bold"></i>
							<span>题目语义解析完成 <span
									class="text-[10px] ml-2 px-1.5 py-0.5 rounded border border-current opacity-40">Understanding</span></span>
						</div>
						<div class="log-item flex items-start gap-3 text-brand-text-secondary dark:text-brand-text-secondary-dark opacity-70"
							style="animation-delay: 0.1s;">
							<i class="ri-check-line text-brand-success mt-0.5 font-bold"></i>
							<span>分镜脚本与 Manim 代码生成完毕 <span
									class="text-[10px] ml-2 px-1.5 py-0.5 rounded border border-current opacity-40">Code
									Gen</span></span>
						</div>
						<div class="log-item flex items-start gap-3 font-medium text-brand-text-primary dark:text-brand-text-primary-dark"
							style="animation-delay: 0.2s;">
							<i
								class="ri-loader-4-line animate-spin text-brand-primary mt-0.5 drop-shadow-[0_0_8px_rgba(245,197,71,0.6)]"></i>
							<span>沙箱环境运行中：正在渲染 Manim 动画帧<span class="cursor-blink"></span></span>
						</div>
					</div>

					<!-- Fix Log -->
					<div class="log-fix hidden space-y-4">
						<div
							class="log-item flex items-start gap-3 text-brand-text-secondary dark:text-brand-text-secondary-dark opacity-70">
							<i class="ri-check-line text-brand-success mt-0.5 font-bold"></i>
							<span>分镜脚本与 Manim 代码生成完毕</span>
						</div>
						<div class="log-item flex items-start gap-3 text-brand-warning">
							<i class="ri-error-warning-line mt-0.5 font-bold"></i>
							<span>沙箱渲染异常，触发自动修复链 <span
									class="text-[10px] ml-2 px-1.5 py-0.5 rounded border border-current opacity-60">Auto-Fix
									1/2</span></span>
						</div>
						<div
							class="log-item flex items-start gap-3 font-medium text-brand-text-primary dark:text-brand-text-primary-dark mt-1">
							<i
								class="ri-loader-4-line animate-spin text-brand-primary mt-0.5 drop-shadow-[0_0_8px_rgba(245,197,71,0.6)]"></i>
							<span>正在重新编译代码并渲染...<span class="cursor-blink"></span></span>
						</div>
					</div>

					<!-- TTS Log -->
					<div class="log-tts hidden space-y-4">
						<div
							class="log-item flex items-start gap-3 text-brand-text-secondary dark:text-brand-text-secondary-dark opacity-70">
							<i class="ri-check-line text-brand-success mt-0.5 font-bold"></i>
							<span>沙箱渲染 Manim 动画帧成功</span>
						</div>
						<div class="log-item flex items-start gap-3 text-brand-text-secondary dark:text-brand-text-secondary-dark opacity-70"
							style="animation-delay: 0.1s;">
							<i class="ri-check-line text-brand-success mt-0.5 font-bold"></i>
							<span>TTS 语音轨道合成完毕</span>
						</div>
						<div class="log-item flex items-start gap-3 font-medium text-brand-text-primary dark:text-brand-text-primary-dark"
							style="animation-delay: 0.2s;">
							<i
								class="ri-loader-4-line animate-spin text-brand-primary mt-0.5 drop-shadow-[0_0_8px_rgba(245,197,71,0.6)]"></i>
							<span>正在合成最终视频并推送到云端...<span class="cursor-blink"></span></span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<!-- 极简 Tips -->
		<div
			class="mt-10 flex items-center justify-center gap-2.5 text-sm text-brand-text-secondary dark:text-brand-text-secondary-dark/80 font-medium h-6">
			<i class="ri-sparkling-fill text-brand-primary animate-pulse"></i>
			<div id="tip-text" class="tip-transition tip-visible">小麦提示：生成完毕后，您还可以通过自然语言二次修改画面。</div>
		</div>

	</main>

	<!-- 演示控制栏 (用于开发/演示环境测试，浮动于左下角) -->
	<div class="fixed bottom-6 left-6 z-50 flex flex-col gap-2 opacity-20 hover:opacity-100 transition-opacity">
		<div
			class="text-[10px] font-mono text-brand-text-secondary dark:text-brand-text-secondary-dark uppercase tracking-widest">
			Dev Controls</div>
		<div class="flex gap-2 glass-panel p-1.5 rounded-lg">
			<button onclick="simulateSSE('normal')"
				class="text-xs px-3 py-1.5 rounded hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Normal
				(50%)</button>
			<button onclick="simulateSSE('fix')"
				class="text-xs px-3 py-1.5 rounded text-brand-warning hover:bg-black/5 dark:hover:bg-white/5 transition-colors">Fix
				(60%)</button>
			<button onclick="simulateSSE('tts')"
				class="text-xs px-3 py-1.5 rounded text-brand-success hover:bg-black/5 dark:hover:bg-white/5 transition-colors">TTS
				(90%)</button>
		</div>
	</div>

	<!-- 交互脚本 -->
	<script>
		// --- 亮暗色切换逻辑 ---
		const themeToggleBtn = document.getElementById('theme-toggle');
		const themeIcon = document.getElementById('theme-icon');

		if (document.documentElement.classList.contains('dark')) {
			themeIcon.className = 'ri-sun-line text-lg';
		}

		themeToggleBtn.addEventListener('click', () => {
			document.documentElement.classList.toggle('dark');
			const isDark = document.documentElement.classList.contains('dark');
			themeIcon.className = isDark ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
			localStorage.theme = isDark ? 'dark' : 'light';
		});

		window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
			if (!('theme' in localStorage)) {
				if (e.matches) {
					document.documentElement.classList.add('dark');
					themeIcon.className = 'ri-sun-line text-lg';
				} else {
					document.documentElement.classList.remove('dark');
					themeIcon.className = 'ri-moon-line text-lg';
				}
			}
		});

		// --- Tips 轮播逻辑 ---
		const tips = [
			"小麦提示：生成完毕后，您还可以通过自然语言二次修改画面。",
			"复杂的数学公式推导，小麦会自动为您添加高亮引导。",
			"视频渲染过程需要在云端进行大量计算，感谢您的耐心等待。",
			"您可以随时切换板书风格、讲师音色和教学节奏。",
			"生成历史会自动保存在您的工作台，随时可以回来查看。"
		];

		let currentTipIndex = 0;
		const tipElement = document.getElementById('tip-text');

		setInterval(() => {
			tipElement.classList.remove('tip-visible');
			tipElement.classList.add('tip-hidden');

			setTimeout(() => {
				currentTipIndex = (currentTipIndex + 1) % tips.length;
				tipElement.innerText = tips[currentTipIndex];

				tipElement.classList.remove('tip-hidden');
				tipElement.classList.add('tip-visible');
			}, 500);
		}, 6000);

		// --- 状态切换逻辑 (演示用) ---
		function simulateSSE(stage) {
			const progressBar = document.getElementById('progress-bar');
			const progressText = document.getElementById('progress-text');
			const etaText = document.getElementById('eta-text');
			const statusTitle = document.getElementById('status-title');

			document.querySelector('.log-normal').classList.add('hidden');
			document.querySelector('.log-fix').classList.add('hidden');
			document.querySelector('.log-tts').classList.add('hidden');

			if (stage === 'normal') {
				progressBar.style.width = '50%';
				progressText.innerText = '50%';
				statusTitle.innerText = '正在渲染动画帧';
				statusTitle.className = 'text-xl font-bold tracking-wide';
				document.querySelector('.log-normal').classList.remove('hidden');
				etaText.innerText = '预计还需要 2 分 30 秒，后台会自动完成';
			}
			else if (stage === 'fix') {
				progressBar.style.width = '60%';
				progressText.innerText = '60%';
				statusTitle.innerText = '自动优化代码逻辑';
				statusTitle.className = 'text-xl font-bold tracking-wide text-brand-warning drop-shadow-[0_0_8px_rgba(255,103,0,0.4)]';
				document.querySelector('.log-fix').classList.remove('hidden');
				etaText.innerText = '系统正在尝试自动修复动画 (1/2)，请稍作等待';
			}
			else if (stage === 'tts') {
				progressBar.style.width = '90%';
				progressText.innerText = '90%';
				statusTitle.innerText = '视频合成中';
				statusTitle.className = 'text-xl font-bold tracking-wide';
				document.querySelector('.log-tts').classList.remove('hidden');
				etaText.innerText = '马上就好！即将为您展现最终内容...';
			}
		}
	</script>
</body>

</html>

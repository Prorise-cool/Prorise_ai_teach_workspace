<!DOCTYPE html>
<html lang="zh" class="dark">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>导航栏提取 - XiaoMai</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://unpkg.com/lucide@latest"></script>
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				container: { center: true, padding: "1.5rem", screens: { "2xl": "1400px" } },
				extend: {
					colors: {
						border: "hsl(var(--border))",
						input: "hsl(var(--input))",
						ring: "hsl(var(--ring))",
						background: "hsl(var(--background))",
						foreground: "hsl(var(--foreground))",
						primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
						secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
						destructive: { DEFAULT: "hsl(var(--destructive))", foreground: "hsl(var(--destructive-foreground))" },
						muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
						accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
						popover: { DEFAULT: "hsl(var(--popover))", foreground: "hsl(var(--popover-foreground))" },
						card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
					},
					borderRadius: {
						xl: "calc(var(--radius) + 4px)",
						lg: "var(--radius)",
						md: "calc(var(--radius) - 2px)",
						sm: "calc(var(--radius) - 4px)",
					},
				},
			},
		};
	</script>
	<style>
		/* ---------------------------------
		 * 原始核心变量与样式提取
		 * --------------------------------- */
		:root {
			--background: 36 50% 92%;
			--foreground: 23 97% 12%;
			--card: 0 0% 100%;
			--card-foreground: 23 97% 12%;
			--popover: 0 0% 100%;
			--popover-foreground: 23 97% 12%;
			--primary: 43 90% 62%;
			--primary-foreground: 23 97% 12%;
			--secondary: 0 0% 100%;
			--secondary-foreground: 23 97% 12%;
			--muted: 36 50% 92%;
			--muted-foreground: 28 53% 27%;
			--accent: 36 50% 92%;
			--accent-foreground: 23 97% 12%;
			--destructive: 359 100% 65%;
			--destructive-foreground: 36 50% 92%;
			--border: 40 37% 84%;
			--input: 40 37% 84%;
			--ring: 43 90% 62%;
			--radius: 0.75rem;
			--brand-glow: 245 197 71;
			--shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
			--shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
			--shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
		}

		.dark {
			--background: 20 13% 9%;
			--foreground: 36 50% 92%;
			--card: 24 14% 15%;
			--card-foreground: 36 50% 92%;
			--popover: 20 13% 9%;
			--popover-foreground: 36 50% 92%;
			--primary: 43 77% 58%;
			--primary-foreground: 36 50% 92%;
			--secondary: 24 14% 15%;
			--secondary-foreground: 36 50% 92%;
			--muted: 24 14% 15%;
			--muted-foreground: 34 19% 71%;
			--accent: 24 14% 15%;
			--accent-foreground: 36 50% 92%;
			--destructive: 1 100% 73%;
			--destructive-foreground: 36 50% 92%;
			--border: 28 12% 21%;
			--input: 28 12% 21%;
			--ring: 43 77% 58%;
			--brand-glow: 230 184 65;
		}

		* {
			border-color: hsl(var(--border));
			box-sizing: border-box;
		}

		body {
			min-height: 200vh;
			/* 增加高度以演示 Nav 的 sticky 效果 */
			background: hsl(var(--background));
			color: hsl(var(--foreground));
			font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
			position: relative;
			overflow-x: hidden;
		}

		/* 背景光效：用来凸显玻璃拟态 */
		body::before,
		body::after {
			content: "";
			position: fixed;
			width: 24rem;
			height: 24rem;
			border-radius: 9999px;
			filter: blur(110px);
			opacity: 0.18;
			pointer-events: none;
			animation: pulseGlow 3.6s ease-in-out infinite alternate;
			z-index: -1;
		}

		body::before {
			top: -8rem;
			left: -4rem;
			background: rgb(var(--brand-glow) / 0.72);
		}

		body::after {
			right: -6rem;
			bottom: 10rem;
			background: rgb(var(--brand-glow) / 0.38);
		}

		@keyframes pulseGlow {
			from {
				transform: scale(0.95);
				opacity: 0.12;
			}

			to {
				transform: scale(1.08);
				opacity: 0.22;
			}
		}

		/* ---------------------------------
		 * 导航栏具体组件样式
		 * --------------------------------- */
		.glass-nav {
			background: rgb(255 255 255 / 0.78);
			backdrop-filter: blur(16px);
		}

		.dark .glass-nav {
			background: rgb(42 36 32 / 0.66);
			backdrop-filter: blur(16px);
		}

		.brand-mark {
			width: 2.5rem;
			height: 2.5rem;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
			overflow: hidden;
		}

		.brand-mark img {
			width: 100%;
			height: 100%;
			display: block;
			object-fit: contain;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 0.25rem;
			border-radius: var(--radius);
			font-size: 0.875rem;
			font-weight: 600;
			padding: 0.5rem 1rem;
			transition: all 0.2s ease-in-out;
			cursor: pointer;
			border: none;
			outline: none;
			text-decoration: none;
		}

		.btn:hover {
			transform: translateY(-2px);
			box-shadow: var(--shadow-md);
		}

		.btn:active {
			transform: scale(0.97);
		}

		.btn-ghost {
			background: transparent;
			color: hsl(var(--foreground));
		}

		.btn-ghost:hover {
			background: hsl(var(--accent));
		}

		.btn-sm {
			height: 2.25rem;
			padding: 0 0.75rem;
			font-size: 0.8rem;
		}

		.shadow-nav-light {
			box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.085);
		}

		.shadow-nav-dark {
			box-shadow: inset 0 0 5px rgba(255, 255, 255, 0.141);
		}

		/* ---------------------------------
		 * 下拉菜单 (Flyout) & 分隔线
		 * --------------------------------- */
		.nav-flyout {
			position: absolute;
			top: calc(100% + 0.75rem);
			left: 50%;
			transform: translateX(-50%) translateY(8px);
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.2s ease, transform 0.2s ease;
			border-radius: 1.25rem;
			border: 1px solid hsl(var(--border));
			background: hsl(var(--card));
			box-shadow: var(--shadow-lg);
		}

		.group:hover .nav-flyout {
			opacity: 1;
			pointer-events: auto;
			transform: translateX(-50%) translateY(0);
		}

		.separator {
			height: 1px;
			width: 100%;
			background: hsl(var(--border));
		}

		/* ---------------------------------
		 * 移动端抽屉 (Sheet)
		 * --------------------------------- */
		.sheet-overlay {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.5);
			z-index: 50;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.3s;
		}

		.sheet-overlay.open {
			opacity: 1;
			pointer-events: auto;
		}

		.sheet-panel {
			position: fixed;
			top: 0;
			left: 0;
			bottom: 0;
			width: 75%;
			max-width: 320px;
			background: hsl(var(--card));
			z-index: 51;
			transform: translateX(-100%);
			transition: transform 0.3s;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			border-radius: 0 1.5rem 1.5rem 0;
			padding: 1.5rem;
			box-shadow: var(--shadow-lg);
		}

		.sheet-overlay.open .sheet-panel {
			transform: translateX(0);
		}

		/* ---------------------------------
		 * 其他小组件 (Lang Toggle, Icons)
		 * --------------------------------- */
		.lang-toggle {
			cursor: pointer;
			font-size: 0.8rem;
			padding: 0.35rem 0.65rem;
			border-radius: 9999px;
			border: 1px solid hsl(var(--border));
			background: transparent;
			color: hsl(var(--foreground));
		}

		.lang-toggle:hover {
			background: hsl(var(--accent));
		}

		.svg-icon {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			line-height: 0;
			color: currentColor;
		}

		.svg-icon svg {
			width: 1.125rem;
			height: 1.125rem;
			fill: currentColor;
		}
	</style>
</head>

<body>

	<!-- ================= Navbar Component ================= -->
	<header
		class="w-[94%] md:w-[82%] lg:w-[76%] lg:max-w-screen-xl top-5 mx-auto sticky border z-40 rounded-full flex justify-between items-center p-2 glass-nav shadow-nav-dark">
		<a href="/" class="font-bold text-lg flex items-center gap-3 px-3 py-2">
			<span class="brand-mark">
				<!-- 原图片路径，如缺失会显示alt内容，为演示美观此处用默认形状兜底，你可换回原 ./assets/logo.png -->
				<div
					class="w-full h-full bg-primary rounded flex items-center justify-center text-primary-foreground text-xs">
					Logo</div>
			</span>
			<span>小麦 XiaoMai</span>
		</a>

		<div class="hidden lg:flex items-center gap-2">
			<div class="relative group">
				<button class="btn btn-ghost text-base rounded-full px-4">
					<span data-i18n="nav.featureLabel">产品亮点</span>
					<i data-lucide="chevron-down" class="size-4 ml-2" aria-hidden="true"></i>
				</button>
				<div class="nav-flyout">
					<div class="grid w-[620px] grid-cols-2 gap-5 p-4">
						<div
							class="rounded-2xl overflow-hidden border border-border/60 bg-card flex items-center justify-center bg-muted">
							<!-- 原图片路径：./assets/demo-img.jpg -->
							<span class="text-muted-foreground text-sm">Demo Image</span>
						</div>
						<ul class="flex flex-col gap-2">
							<li class="rounded-2xl p-4 text-sm hover:bg-muted/70 transition-colors cursor-pointer">
								<p class="mb-1 font-semibold leading-none text-foreground"
									data-i18n="nav.featurePreview.0.title">首页双入口</p>
								<p class="line-clamp-2 text-muted-foreground"
									data-i18n="nav.featurePreview.0.description">默认进入 Home 首页，再分别进入主题课堂或单题讲解链路。</p>
							</li>
							<li class="rounded-2xl p-4 text-sm hover:bg-muted/70 transition-colors cursor-pointer">
								<p class="mb-1 font-semibold leading-none text-foreground"
									data-i18n="nav.featurePreview.1.title">任务进度可恢复</p>
								<p class="line-clamp-2 text-muted-foreground"
									data-i18n="nav.featurePreview.1.description">等待页统一展示阶段进度、失败重试与断线恢复提示。</p>
							</li>
							<li class="rounded-2xl p-4 text-sm hover:bg-muted/70 transition-colors cursor-pointer">
								<p class="mb-1 font-semibold leading-none text-foreground"
									data-i18n="nav.featurePreview.2.title">结果页继续学习</p>
								<p class="line-clamp-2 text-muted-foreground"
									data-i18n="nav.featurePreview.2.description">生成完成后回到结果页继续追问、回看与查看依据。</p>
							</li>
						</ul>
					</div>
				</div>
			</div>

			<a href="/" class="btn btn-ghost text-base rounded-full px-4">首页</a>
			<a href="/classroom/input" class="btn btn-ghost text-base rounded-full px-4">主题课堂</a>
			<a href="/video/input" class="btn btn-ghost text-base rounded-full px-4">单题讲解</a>
			<a href="/learning" class="btn btn-ghost text-base rounded-full px-4">学习中心</a>
		</div>

		<div class="hidden lg:flex items-center gap-2">
			<button type="button" class="btn btn-ghost btn-sm rounded-full" data-theme-toggle
				data-i18n-aria="common.themeLight" aria-label="切到浅色">
				<span class="theme-light hidden"><i data-lucide="moon" class="size-5" aria-hidden="true"></i></span>
				<span class="theme-dark"><i data-lucide="sun" class="size-5" aria-hidden="true"></i></span>
			</button>
			<button type="button" class="lang-toggle" data-lang-toggle>EN</button>
			<a href="/profile" class="btn btn-ghost btn-sm rounded-full" aria-label="进入个人中心">
				<i data-lucide="user-round" class="size-5" aria-hidden="true"></i>
			</a>
		</div>

		<div class="flex items-center gap-2 lg:hidden pr-2">
			<button type="button" class="lang-toggle" data-lang-toggle>EN</button>
			<button type="button" class="btn btn-ghost btn-sm rounded-full" data-sheet-open
				data-i18n-aria="common.openMenu" aria-label="打开菜单">
				<i data-lucide="menu" class="size-5" aria-hidden="true"></i>
			</button>
		</div>
	</header>

	<!-- ================= Mobile Sheet Component ================= -->
	<div class="sheet-overlay" data-sheet-overlay>
		<div class="sheet-panel">
			<div>
				<div class="flex items-center justify-between mb-6">
					<a href="/" class="flex items-center gap-3 font-semibold" data-sheet-close>
						<span class="brand-mark">
							<div
								class="w-full h-full bg-primary rounded flex items-center justify-center text-primary-foreground text-[10px]">
								Logo</div>
						</span>
						<span>小麦 XiaoMai</span>
					</a>
					<button type="button" class="btn btn-ghost btn-sm rounded-full" data-sheet-close
						data-i18n-aria="common.close" aria-label="关闭">
						<i data-lucide="x" class="size-5" aria-hidden="true"></i>
					</button>
				</div>
				<div class="flex flex-col gap-2">
					<a href="/" class="btn btn-ghost justify-start text-base rounded-2xl" data-sheet-close>首页</a>
					<a href="/classroom/input" class="btn btn-ghost justify-start text-base rounded-2xl"
						data-sheet-close>主题课堂</a>
					<a href="/video/input" class="btn btn-ghost justify-start text-base rounded-2xl"
						data-sheet-close>单题讲解</a>
					<a href="/learning" class="btn btn-ghost justify-start text-base rounded-2xl"
						data-sheet-close>学习中心</a>
				</div>
			</div>

			<div class="flex flex-col gap-3">
				<div class="separator"></div>
				<button type="button" class="btn btn-ghost justify-start rounded-2xl" data-theme-toggle
					data-i18n-aria="common.themeLight" aria-label="切换主题">
					<span class="theme-light flex gap-2 items-center">
						<i data-lucide="moon" class="size-5" aria-hidden="true"></i>
						<span class="block">Dark</span>
					</span>
					<span class="theme-dark hidden gap-2 items-center">
						<i data-lucide="sun" class="size-5" aria-hidden="true"></i>
						<span class="block">Light</span>
					</span>
				</button>
			</div>
		</div>
	</div>

	<!-- 交互逻辑 -->
	<script>
		// 初始化 Lucide 图标
		lucide.createIcons();

		// 移动端菜单逻辑
		const overlay = document.querySelector("[data-sheet-overlay]");
		const openSheet = () => overlay.classList.add("open");
		const closeSheet = () => overlay.classList.remove("open");

		document.querySelectorAll("[data-sheet-open]").forEach(btn => btn.addEventListener("click", openSheet));
		document.querySelectorAll("[data-sheet-close]").forEach(btn => btn.addEventListener("click", closeSheet));
		overlay.addEventListener("click", (e) => { if (e.target === overlay) closeSheet(); });
		document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSheet(); });

		// 主题切换逻辑
		let isDark = document.documentElement.classList.contains("dark");
		function syncThemeUI() {
			document.querySelectorAll("[data-theme-toggle]").forEach((btn) => {
				btn.querySelector(".theme-light")?.classList.toggle("hidden", isDark);
				btn.querySelector(".theme-dark")?.classList.toggle("hidden", !isDark);
			});
			const nav = document.querySelector('.glass-nav');
			if (isDark) {
				nav.classList.remove('shadow-nav-light');
				nav.classList.add('shadow-nav-dark');
			} else {
				nav.classList.add('shadow-nav-light');
				nav.classList.remove('shadow-nav-dark');
			}
		}
		syncThemeUI(); // 初始化状态

		document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
			button.addEventListener("click", () => {
				isDark = !isDark;
				document.documentElement.classList.toggle("dark", isDark);
				syncThemeUI();
			});
		});

		// 多语言切换仅供演示
		document.querySelectorAll("[data-lang-toggle]").forEach(btn => {
			btn.addEventListener("click", () => {
				btn.textContent = btn.textContent === "EN" ? "中" : "EN";
			})
		});
	</script>
</body>

</html>

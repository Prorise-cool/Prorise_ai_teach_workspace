    <!--
    ============================================================
    线框图骨架文件 - 课后小测答题页
    ============================================================

    页面路径: /quiz/:sessionId/question/:questionId

    功能定位:
    - 展示测验题目
    - 用户选择答案
    - 提交答案

    后端依赖: FastAPI + 腾讯云工作流

    设计要点:
    1. 顶部：题号进度（第 X 题 / 共 Y 题）
    2. 中部：题目展示区
       - 题目文本（支持数学公式）
       - 选项：单选按钮，大号可点击区域
    3. 底部：提交答案按钮

    选项状态设计:
    - 未作答：灰色边框
    - 已选择：主色边框 + 选中图标
    - 正确：绿色背景 + ✓
    - 错误：红色背景 + ✗ + 正确答案提示

    关键组件:
    - 题目卡片组件
    - 选项组件
    - 进度指示器组件

    TODO: 请在此骨架基础上设计线框图
    ============================================================
    -->

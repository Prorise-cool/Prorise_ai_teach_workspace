    <!--
    ============================================================
    线框图骨架文件 - 学习路径展示页
    ============================================================

    页面路径: /path/:pathId

    功能定位:
    - 展示生成的学习路径
    - 时间轴形式展示每周内容
    - 支持开始学习和调整计划

    后端依赖: FastAPI + 腾讯云 Multi-Agent

    设计要点:
    1. 路径展示区
       - 时间轴形式：周 → 内容
       - 每周内容：学习节点列表
       - 节点状态：未开始 / 进行中 / 已完成
    2. 学习节点类型
       - 📖 知识点学习
       - 📝 小测验
       - 🎯 里程碑
    3. 进度指示
       - 整体进度条
       - 当前周高亮
    4. 操作按钮
       - 开始学习
       - 调整计划
       - 保存路径

    关键组件:
    - 时间轴组件
    - 学习节点组件
    - 进度条组件

    TODO: 请在此骨架基础上设计线框图
    ============================================================
    -->

<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>小麦 - 确认对话框</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		* {
			border-radius: 0 !important;
			box-shadow: none !important;
			font-family: monospace, sans-serif;
		}

		.wf-border {
			border: 2px solid #000;
		}

		.bg-grid {
			background-size: 40px 40px;
			background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px), linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
		}
	</style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center bg-grid p-4 relative">
	<!-- 背景层 (模拟底层页面) -->
	<div class="absolute inset-0 opacity-20 pointer-events-none">
		<div class="w-full h-16 wf-border bg-white mb-4"></div>
		<div class="w-full h-64 wf-border bg-white"></div>
	</div>

	<!-- 遮罩层与弹窗 -->
	<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
		<div class="bg-white wf-border p-8 max-w-md w-full shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
			<h2 class="text-2xl font-black mb-4">确认删除该记录？</h2>
			<p class="text-sm text-gray-600 mb-8 leading-relaxed">删除后该记录将从历史列表和错题本中移除，且无法恢复。您确定要继续吗？</p>

			<div class="flex justify-end gap-4">
				<button
					class="wf-border px-6 py-2 text-sm font-bold bg-white hover:bg-gray-100 transition-colors">取消</button>
				<button
					class="wf-border border-red-600 bg-red-600 text-white px-6 py-2 text-sm font-bold hover:bg-red-700 transition-colors">确认删除</button>
			</div>
		</div>
	</div>
</body>

</html>

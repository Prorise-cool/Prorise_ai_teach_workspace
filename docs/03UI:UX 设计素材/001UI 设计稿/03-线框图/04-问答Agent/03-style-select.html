<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 问答 Agent - 风格选择</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif;
    background-color:#f5ede1;
    color:#3b1701;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:'';position:absolute;
    top:-100px;left:50%;transform:translateX(-50%);
    width:700px;height:700px;
    background:radial-gradient(circle,rgba(245,197,71,.25) 0%,rgba(245,197,71,.05) 50%,transparent 70%);
    pointer-events:none;z-index:0;
  }

  .container{
    position:relative;z-index:1;
    width:100%;max-width:960px;
    padding:0 24px;
    text-align:center;
  }

  /* Step indicator */
  .step-indicator{
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin-bottom:32px;
    font-size:14px;color:#b8a88a;
  }
  .step{
    display:flex;align-items:center;gap:6px;
    font-weight:600;
  }
  .step.done{color:#52c41a}
  .step.active{color:#3b1701}
  .step-dot{
    width:24px;height:24px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:#fff;
    background:#e6dcc8;
  }
  .step.done .step-dot{background:#52c41a}
  .step.active .step-dot{background:linear-gradient(135deg,#f5c547,#e6b030)}
  .step-line{width:32px;height:2px;background:#e6dcc8;border-radius:1px}
  .step-line.done{background:#52c41a}

  .page-title{
    font-size:36px;font-weight:800;
    margin-bottom:8px;color:#3b1701;
  }
  .page-subtitle{
    font-size:16px;color:#6b4421;
    margin-bottom:40px;
  }

  /* Style cards grid */
  .style-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:16px;
    margin-bottom:32px;
  }

  .style-card{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:16px;
    padding:24px 16px;
    box-shadow:0 4px 20px rgba(59,23,1,.06);
    border:2px solid transparent;
    cursor:pointer;
    transition:all .3s;
    position:relative;
    text-align:center;
  }
  .style-card:hover{
    transform:translateY(-4px);
    box-shadow:0 8px 28px rgba(59,23,1,.1);
    border-color:#f5c547;
  }
  .style-card.selected{
    border-color:#f5c547;
    background:rgba(245,197,71,.08);
    box-shadow:0 0 0 3px rgba(245,197,71,.18),0 8px 28px rgba(59,23,1,.1);
  }

  .recommend-badge{
    position:absolute;
    top:-8px;right:-8px;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    color:#fff;
    font-size:11px;font-weight:700;
    padding:4px 10px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(245,197,71,.35);
    display:none;
  }
  .style-card.recommended .recommend-badge{display:block}

  .style-icon{
    width:56px;height:56px;
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
    margin:0 auto 14px;
  }
  .style-name{
    font-size:16px;font-weight:700;
    margin-bottom:6px;color:#3b1701;
  }
  .style-desc{
    font-size:13px;color:#6b4421;
    line-height:1.5;
  }

  /* Style specific colors */
  .style-card:nth-child(1) .style-icon{background:rgba(100,149,237,.12);color:#6495ed}
  .style-card:nth-child(2) .style-icon{background:rgba(245,197,71,.15);color:#e6b030}
  .style-card:nth-child(3) .style-icon{background:rgba(82,196,26,.12);color:#52c41a}
  .style-card:nth-child(4) .style-icon{background:rgba(147,112,219,.12);color:#9370db}

  /* Check mark on selected */
  .check-mark{
    position:absolute;
    top:12px;left:12px;
    width:24px;height:24px;
    border-radius:50%;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:14px;
    opacity:0;
    transform:scale(.5);
    transition:all .3s;
  }
  .style-card.selected .check-mark{
    opacity:1;
    transform:scale(1);
  }

  /* Skip link */
  .skip-link{
    display:inline-block;
    margin-bottom:24px;
    font-size:14px;color:#6b4421;
    text-decoration:none;
    transition:color .2s;
  }
  .skip-link:hover{color:#e6b030;text-decoration:underline}

  /* Confirm button */
  .confirm-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    width:100%;max-width:320px;height:52px;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border:none;border-radius:12px;
    color:#fff;font-size:17px;font-weight:700;
    cursor:pointer;font-family:inherit;
    transition:opacity .2s,transform .1s,box-shadow .2s;
    box-shadow:0 4px 14px rgba(245,197,71,.3);
  }
  .confirm-btn:hover{opacity:.92;box-shadow:0 6px 20px rgba(245,197,71,.35)}
  .confirm-btn:active{transform:scale(.985)}
  .confirm-btn:disabled{
    background:#e6dcc8;color:#b8a88a;
    cursor:not-allowed;box-shadow:none;
  }

  /* Demo panel */
  .demo-panel{
    position:fixed;top:16px;right:16px;z-index:99;
    background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
    border-radius:12px;padding:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
    font-size:12px;color:#6b4421;
  }
  .demo-panel h4{margin-bottom:10px;font-size:13px;color:#3b1701}
  .demo-panel button{
    display:block;width:100%;
    margin-bottom:6px;padding:7px 12px;
    border:1px solid #e6dcc8;border-radius:6px;
    background:#fff;font-size:12px;color:#3b1701;
    cursor:pointer;font-family:inherit;text-align:left;
    transition:background .15s;
  }
  .demo-panel button:hover{background:#f5ede1}
  .demo-panel button:last-child{margin-bottom:0}
</style>
</head>
<body>

<div class="container">
  <!-- Step indicator -->
  <div class="step-indicator">
    <div class="step done">
      <div class="step-dot">&#10003;</div>
      <span>输入题目</span>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-dot">2</div>
      <span>选择风格</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot">3</div>
      <span>生成视频</span>
    </div>
  </div>

  <h1 class="page-title">选择讲解风格</h1>
  <p class="page-subtitle">AI 将根据你选择的风格生成个性化的讲解视频</p>

  <!-- Style cards -->
  <div class="style-grid">
    <div class="style-card recommended" onclick="selectStyle(this)">
      <div class="recommend-badge">推荐</div>
      <div class="check-mark">&#10003;</div>
      <div class="style-icon">&#128218;</div>
      <div class="style-name">循序渐进</div>
      <div class="style-desc">由浅入深，逐步推导，适合初学者理解</div>
    </div>

    <div class="style-card" onclick="selectStyle(this)">
      <div class="check-mark">&#10003;</div>
      <div class="style-icon">&#9889;</div>
      <div class="style-name">直击要点</div>
      <div class="style-desc">快速切入核心，高效解题，适合考前突击</div>
    </div>

    <div class="style-card" onclick="selectStyle(this)">
      <div class="check-mark">&#10003;</div>
      <div class="style-icon">&#127795;</div>
      <div class="style-name">生活类比</div>
      <div class="style-desc">用生活实例解释抽象概念，轻松好懂</div>
    </div>

    <div class="style-card" onclick="selectStyle(this)">
      <div class="check-mark">&#10003;</div>
      <div class="style-icon">&#128300;</div>
      <div class="style-name">深度探究</div>
      <div class="style-desc">深入原理推导，拓展知识面，适合进阶学习</div>
    </div>
  </div>

  <a href="#" class="skip-link">跳过，使用上次风格（循序渐进）</a>
  <br><br>

  <button class="confirm-btn" id="confirmBtn" disabled onclick="confirmStyle()">
    <span>确认选择</span>
    <span style="font-size:20px">&#8594;</span>
  </button>
</div>

<!-- Demo panel -->
<div class="demo-panel">
  <h4>状态演示</h4>
  <button onclick="showState('default')">默认未选择</button>
  <button onclick="showState('selected')">已选择风格</button>
  <button onclick="showState('hover')">悬浮预览</button>
</div>

<script>
  function selectStyle(el) {
    var cards = document.querySelectorAll('.style-card');
    for (var i = 0; i < cards.length; i++) {
      cards[i].classList.remove('selected');
    }
    el.classList.add('selected');
    document.getElementById('confirmBtn').disabled = false;
  }

  function confirmStyle() {
    var selected = document.querySelector('.style-card.selected .style-name');
    if (selected) {
      alert('已选择风格: ' + selected.textContent);
    }
  }

  function showState(state) {
    var cards = document.querySelectorAll('.style-card');
    for (var i = 0; i < cards.length; i++) {
      cards[i].classList.remove('selected');
    }
    document.getElementById('confirmBtn').disabled = true;

    switch (state) {
      case 'default':
        break;
      case 'selected':
        cards[0].classList.add('selected');
        document.getElementById('confirmBtn').disabled = false;
        break;
      case 'hover':
        break;
    }
  }
</script>
</body>
</html>

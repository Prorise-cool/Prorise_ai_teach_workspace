<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 问答 Agent - 题目输入</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif;
    background-color:#f5ede1;
    color:#3b1701;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:absolute;
    top:-120px;left:50%;transform:translateX(-50%);
    width:700px;height:700px;
    background:radial-gradient(circle,rgba(245,197,71,.30) 0%,rgba(245,197,71,.06) 50%,transparent 70%);
    pointer-events:none;z-index:0;
  }

  /* Breadcrumb */
  .breadcrumb{
    position:relative;z-index:1;
    padding:20px 40px;
    font-size:14px;color:#6b4421;
  }
  .breadcrumb a{color:#e6b030;text-decoration:none;font-weight:500}
  .breadcrumb a:hover{text-decoration:underline}
  .breadcrumb span{margin:0 8px;color:#b8a88a}

  /* Main container */
  .main{
    position:relative;z-index:1;
    max-width:800px;
    margin:40px auto 60px;
    padding:0 24px;
  }

  .page-title{
    font-size:48px;font-weight:800;
    text-align:center;
    margin-bottom:8px;
    background:linear-gradient(135deg,#3b1701,#6b4421);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .page-subtitle{
    font-size:18px;color:#6b4421;
    text-align:center;
    margin-bottom:40px;
  }

  /* Tab switcher */
  .tab-switcher{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-bottom:32px;
    background:rgba(255,255,255,.5);
    border-radius:12px;
    padding:4px;
    width:fit-content;
    margin-left:auto;margin-right:auto;
  }
  .tab-btn{
    padding:10px 32px;
    border:none;border-radius:10px;
    font-size:15px;font-weight:600;
    cursor:pointer;
    font-family:inherit;
    background:transparent;
    color:#6b4421;
    transition:all .25s;
  }
  .tab-btn.active{
    background:#fff;
    color:#3b1701;
    box-shadow:0 2px 8px rgba(59,23,1,.08);
  }
  .tab-btn:hover:not(.active){background:rgba(255,255,255,.4)}

  /* Input card */
  .input-card{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 8px 32px rgba(59,23,1,.08);
    margin-bottom:24px;
  }

  /* Text mode */
  .text-mode{}
  .text-area{
    width:100%;
    height:120px;
    border:2px solid #e6dcc8;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-family:inherit;
    color:#3b1701;
    background:#fff;
    resize:vertical;
    transition:border-color .25s,box-shadow .25s;
    line-height:1.6;
  }
  .text-area::placeholder{color:#b8a88a}
  .text-area:focus{
    outline:none;
    border-color:#f5c547;
    box-shadow:0 0 0 3px rgba(245,197,71,.18);
  }
  .text-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    font-size:13px;color:#b8a88a;
  }
  .latex-hint{
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 10px;
    background:rgba(245,197,71,.12);
    border-radius:6px;
    font-size:12px;color:#6b4421;
  }

  /* Image mode */
  .image-mode{display:none}
  .upload-zone{
    border:2px dashed #e6dcc8;
    border-radius:16px;
    padding:48px 24px;
    text-align:center;
    cursor:pointer;
    transition:border-color .25s,background .25s;
    background:rgba(255,255,255,.4);
  }
  .upload-zone:hover{
    border-color:#f5c547;
    background:rgba(245,197,71,.06);
  }
  .upload-icon{
    width:56px;height:56px;
    margin:0 auto 16px;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;color:#fff;
    box-shadow:0 4px 12px rgba(245,197,71,.25);
  }
  .upload-text{font-size:16px;font-weight:600;color:#3b1701;margin-bottom:6px}
  .upload-hint{font-size:13px;color:#b8a88a}

  /* Image preview (hidden by default) */
  .image-preview{display:none;margin-top:20px}
  .image-preview.show{display:block}
  .preview-img{
    width:100%;max-height:200px;
    object-fit:contain;
    border-radius:12px;
    border:2px solid #e6dcc8;
    background:#fff;
  }
  .ocr-result{
    margin-top:16px;
    border:2px solid #e6dcc8;
    border-radius:12px;
    padding:16px;
    background:#fff;
    min-height:60px;
  }
  .ocr-label{
    font-size:13px;font-weight:600;color:#6b4421;
    margin-bottom:8px;
    display:flex;align-items:center;gap:6px;
  }
  .ocr-text{font-size:15px;color:#3b1701;line-height:1.6}

  /* OCR skeleton */
  .skeleton{display:none}
  .skeleton.show{display:block}
  .skeleton-line{
    height:14px;
    background:linear-gradient(90deg,#e6dcc8 25%,#f0e8d8 50%,#e6dcc8 75%);
    background-size:200% 100%;
    border-radius:7px;
    margin-bottom:10px;
    animation:shimmer 1.5s ease-in-out infinite;
  }
  .skeleton-line:nth-child(1){width:90%}
  .skeleton-line:nth-child(2){width:75%}
  .skeleton-line:nth-child(3){width:60%}
  @keyframes shimmer{
    0%{background-position:200% 0}
    100%{background-position:-200% 0}
  }
  .skeleton-hint{
    display:flex;align-items:center;gap:8px;
    font-size:13px;color:#b8a88a;
    margin-top:12px;
  }
  .spinner-small{
    width:14px;height:14px;
    border:2px solid #e6dcc8;
    border-top-color:#f5c547;
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Understanding preview */
  .understand-preview{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:20px;
    padding:28px 40px;
    box-shadow:0 8px 32px rgba(59,23,1,.08);
    margin-bottom:32px;
    display:none;
  }
  .understand-preview.show{display:block;animation:fadeUp .4s ease}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(12px)}
    to{opacity:1;transform:translateY(0)}
  }
  .preview-title{
    font-size:15px;font-weight:700;color:#3b1701;
    margin-bottom:16px;
    display:flex;align-items:center;gap:8px;
  }
  .preview-title::before{
    content:'';display:block;
    width:4px;height:18px;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border-radius:2px;
  }

  .tag-row{
    display:flex;flex-wrap:wrap;gap:8px;
    margin-bottom:14px;
  }
  .tag{
    padding:6px 14px;
    border-radius:8px;
    font-size:13px;font-weight:600;
    cursor:default;
  }
  .tag-type{background:rgba(245,197,71,.15);color:#b8860b}
  .tag-knowledge{background:rgba(107,68,33,.08);color:#6b4421}
  .tag-editable{
    cursor:pointer;
    border:1px dashed #e6dcc8;
    transition:border-color .2s;
  }
  .tag-editable:hover{border-color:#f5c547}

  .difficulty{
    display:flex;align-items:center;gap:6px;
    font-size:14px;color:#6b4421;
  }
  .star{color:#f5c547;font-size:18px}
  .star.empty{color:#e6dcc8}

  /* Next button */
  .next-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;max-width:320px;height:52px;
    margin:0 auto;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border:none;border-radius:12px;
    color:#fff;font-size:17px;font-weight:700;
    cursor:pointer;font-family:inherit;
    transition:opacity .2s,transform .1s,box-shadow .2s;
    box-shadow:0 4px 14px rgba(245,197,71,.3);
  }
  .next-btn:hover{opacity:.92;box-shadow:0 6px 20px rgba(245,197,71,.35)}
  .next-btn:active{transform:scale(.985)}
  .next-btn:disabled{
    background:#e6dcc8;color:#b8a88a;
    cursor:not-allowed;box-shadow:none;
  }
  .next-arrow{font-size:20px;transition:transform .2s}
  .next-btn:hover .next-arrow{transform:translateX(3px)}

  /* Demo panel */
  .demo-panel{
    position:fixed;top:16px;right:16px;z-index:99;
    background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
    border-radius:12px;padding:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
    font-size:12px;color:#6b4421;
  }
  .demo-panel h4{margin-bottom:10px;font-size:13px;color:#3b1701}
  .demo-panel button{
    display:block;width:100%;
    margin-bottom:6px;padding:7px 12px;
    border:1px solid #e6dcc8;border-radius:6px;
    background:#fff;font-size:12px;color:#3b1701;
    cursor:pointer;font-family:inherit;text-align:left;
    transition:background .15s;
  }
  .demo-panel button:hover{background:#f5ede1}
  .demo-panel button:last-child{margin-bottom:0}
</style>
</head>
<body>

<nav class="breadcrumb">
  <a href="#">首页</a>
  <span>></span>
  <strong>问答 Agent</strong>
</nav>

<div class="main">
  <h1 class="page-title">有问题？我来帮你讲解</h1>
  <p class="page-subtitle">输入题目或上传图片，AI 生成专属讲解视频</p>

  <!-- Tab switcher -->
  <div class="tab-switcher">
    <button class="tab-btn active" id="tabText" onclick="switchTab('text')">文本</button>
    <button class="tab-btn" id="tabImage" onclick="switchTab('image')">图片</button>
  </div>

  <!-- Input card -->
  <div class="input-card">
    <!-- Text mode -->
    <div class="text-mode" id="textMode">
      <textarea class="text-area" id="textInput" placeholder="粘贴或输入题目..." oninput="handleTextInput()"></textarea>
      <div class="text-meta">
        <span class="latex-hint">Tip: 支持 LaTeX 语法，如 $\int_0^1 x^2 dx$</span>
        <span id="charCount">0 / 2000</span>
      </div>
    </div>

    <!-- Image mode -->
    <div class="image-mode" id="imageMode">
      <div class="upload-zone" id="uploadZone" onclick="simulateUpload()">
        <div class="upload-icon">&#128247;</div>
        <div class="upload-text">点击或拖拽上传图片</div>
        <div class="upload-hint">支持 JPG / PNG 格式，大小不超过 5MB</div>
      </div>

      <!-- Image preview -->
      <div class="image-preview" id="imagePreview">
        <div style="background:#e6dcc8;border-radius:12px;height:180px;display:flex;align-items:center;justify-content:center;color:#6b4421;font-size:14px;margin-bottom:16px">
          [题目图片预览区域]
        </div>
        <div class="ocr-result">
          <div class="ocr-label">
            <span>OCR 识别结果</span>
          </div>
          <!-- Skeleton loading -->
          <div class="skeleton" id="ocrSkeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-hint">
              <div class="spinner-small"></div>
              <span>正在识别...</span>
            </div>
          </div>
          <!-- OCR result text -->
          <div class="ocr-text" id="ocrText" style="display:none">
            已知函数 f(x) = x^3 - 3x + 1，求 f(x) 在区间 [-2, 2] 上的最大值和最小值。
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Understanding preview -->
  <div class="understand-preview" id="understandPreview">
    <div class="preview-title">题目理解</div>
    <div class="tag-row">
      <span class="tag tag-type">计算题</span>
      <span class="tag tag-knowledge tag-editable">微积分</span>
      <span class="tag tag-knowledge tag-editable">极值问题</span>
      <span class="tag tag-knowledge tag-editable" style="border-style:dashed;color:#b8a88a">+ 添加标签</span>
    </div>
    <div class="difficulty">
      <span>难度评估：</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star empty">&#9733;</span>
      <span class="star empty">&#9733;</span>
    </div>
  </div>

  <!-- Next button -->
  <button class="next-btn" id="nextBtn" disabled>
    <span>下一步</span>
    <span class="next-arrow">&#8594;</span>
  </button>
</div>

<!-- Demo panel -->
<div class="demo-panel">
  <h4>状态演示</h4>
  <button onclick="showState('default')">默认空状态</button>
  <button onclick="showState('text-input')">文本已输入</button>
  <button onclick="showState('image-upload')">图片上传中</button>
  <button onclick="showState('ocr-loading')">OCR 识别中</button>
  <button onclick="showState('ocr-done')">OCR 识别完成</button>
  <button onclick="showState('preview')">题目理解完成</button>
</div>

<script>
  function switchTab(mode) {
    document.getElementById('tabText').classList.toggle('active', mode === 'text');
    document.getElementById('tabImage').classList.toggle('active', mode === 'image');
    document.getElementById('textMode').style.display = mode === 'text' ? 'block' : 'none';
    document.getElementById('imageMode').style.display = mode === 'image' ? 'block' : 'none';
  }

  function handleTextInput() {
    var val = document.getElementById('textInput').value;
    var len = val.length;
    document.getElementById('charCount').textContent = len + ' / 2000';
    document.getElementById('nextBtn').disabled = len < 5;
  }

  function simulateUpload() {
    var preview = document.getElementById('imagePreview');
    var skeleton = document.getElementById('ocrSkeleton');
    var ocrText = document.getElementById('ocrText');
    var zone = document.getElementById('uploadZone');

    zone.style.display = 'none';
    preview.classList.add('show');
    skeleton.classList.add('show');
    ocrText.style.display = 'none';

    setTimeout(function() {
      skeleton.classList.remove('show');
      ocrText.style.display = 'block';
      document.getElementById('nextBtn').disabled = false;
    }, 2500);
  }

  function showState(state) {
    // Reset
    document.getElementById('textMode').style.display = 'block';
    document.getElementById('imageMode').style.display = 'none';
    document.getElementById('tabText').classList.add('active');
    document.getElementById('tabImage').classList.remove('active');
    document.getElementById('imagePreview').classList.remove('show');
    document.getElementById('ocrSkeleton').classList.remove('show');
    document.getElementById('ocrText').style.display = 'none';
    document.getElementById('uploadZone').style.display = 'block';
    document.getElementById('understandPreview').classList.remove('show');
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('textInput').value = '';
    document.getElementById('charCount').textContent = '0 / 2000';

    switch (state) {
      case 'default':
        break;
      case 'text-input':
        document.getElementById('textInput').value = '已知函数 f(x) = x^3 - 3x + 1，求 f(x) 在区间 [-2, 2] 上的最大值和最小值。';
        handleTextInput();
        break;
      case 'image-upload':
        switchTab('image');
        break;
      case 'ocr-loading':
        switchTab('image');
        document.getElementById('uploadZone').style.display = 'none';
        document.getElementById('imagePreview').classList.add('show');
        document.getElementById('ocrSkeleton').classList.add('show');
        break;
      case 'ocr-done':
        switchTab('image');
        document.getElementById('uploadZone').style.display = 'none';
        document.getElementById('imagePreview').classList.add('show');
        document.getElementById('ocrText').style.display = 'block';
        document.getElementById('nextBtn').disabled = false;
        break;
      case 'preview':
        document.getElementById('textInput').value = '已知函数 f(x) = x^3 - 3x + 1，求 f(x) 在区间 [-2, 2] 上的最大值和最小值。';
        handleTextInput();
        document.getElementById('understandPreview').classList.add('show');
        break;
    }
  }
</script>
</body>
</html>

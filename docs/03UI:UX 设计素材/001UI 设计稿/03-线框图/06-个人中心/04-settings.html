<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小麦 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif;
      background-color: #f5ede1;
      color: #3b1701;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 6vh 20px;
    }

    .page-container {
      width: 100%;
      max-width: 800px;
    }

    /* -- Header -- */
    .page-header {
      display: flex;
      align-items: center;
      margin-bottom: 28px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: #3b1701;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(59, 23, 1, 0.06);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.95);
      transform: translateY(-1px);
    }

    .page-title {
      font-size: 36px;
      font-weight: 700;
      flex: 1;
      text-align: center;
      padding-right: 40px;
    }

    /* -- Settings Card -- */
    .settings-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(59, 23, 1, 0.06);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      cursor: pointer;
      transition: background 0.2s ease;
      border-bottom: 1px solid rgba(230, 220, 200, 0.4);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-item:hover {
      background: rgba(245, 197, 71, 0.05);
    }

    .settings-item:active {
      background: rgba(245, 197, 71, 0.1);
    }

    .settings-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .settings-icon.profile { background: rgba(74, 111, 165, 0.1); }
    .settings-icon.security { background: rgba(82, 196, 26, 0.1); }
    .settings-icon.language { background: rgba(114, 46, 209, 0.1); }
    .settings-icon.theme { background: rgba(245, 197, 71, 0.1); }
    .settings-icon.notify { background: rgba(255, 149, 0, 0.1); }
    .settings-icon.about { background: rgba(107, 68, 33, 0.1); }
    .settings-icon.logout { background: rgba(255, 77, 79, 0.08); }

    .settings-label {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
    }

    .settings-value {
      font-size: 14px;
      color: #6b4421;
      margin-right: 8px;
    }

    .settings-arrow {
      font-size: 14px;
      color: #b8a88a;
    }

    /* -- Toggle Switch -- */
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #d4c4a8;
      border-radius: 28px;
      transition: all 0.3s ease;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: #ffffff;
      border-radius: 50%;
      transition: all 0.3s ease;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    .toggle-switch input:checked + .toggle-slider {
      background-color: #f5c547;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(22px);
    }

    /* -- Logout Item -- */
    .settings-item.logout-item {
      justify-content: center;
      border-bottom: none;
    }

    .settings-item.logout-item .settings-label {
      flex: none;
      color: #ff4d4f;
      font-weight: 600;
      text-align: center;
    }

    .settings-item.logout-item:hover {
      background: rgba(255, 77, 79, 0.04);
    }

    /* -- Language Modal -- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(59, 23, 1, 0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 16px 48px rgba(59, 23, 1, 0.15);
      transform: translateY(20px);
      transition: transform 0.25s ease;
    }

    .modal-overlay.visible .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .lang-option {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-bottom: 8px;
    }

    .lang-option:hover {
      background: rgba(245, 197, 71, 0.08);
    }

    .lang-option.selected {
      background: rgba(245, 197, 71, 0.12);
    }

    .lang-radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #d4c4a8;
      margin-right: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .lang-option.selected .lang-radio {
      border-color: #f5c547;
    }

    .lang-radio-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f5c547;
      transform: scale(0);
      transition: transform 0.2s ease;
    }

    .lang-option.selected .lang-radio-dot {
      transform: scale(1);
    }

    .lang-name {
      font-size: 16px;
      font-weight: 500;
    }

    .lang-sub {
      font-size: 13px;
      color: #6b4421;
      margin-left: auto;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-btn {
      padding: 10px 24px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .modal-btn.cancel {
      background: transparent;
      color: #6b4421;
    }

    .modal-btn.cancel:hover {
      background: rgba(245, 237, 225, 0.5);
    }

    .modal-btn.confirm {
      background: #f5c547;
      color: #3b1701;
    }

    .modal-btn.confirm:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(245, 197, 71, 0.3);
    }

    /* -- Version Info -- */
    .version-info {
      text-align: center;
      font-size: 12px;
      color: #b8a88a;
      margin-top: 32px;
      padding-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="page-container">

    <!-- Header -->
    <div class="page-header">
      <a class="back-btn" href="01-profile.html">&larr;</a>
      <h1 class="page-title">设置</h1>
    </div>

    <!-- Settings List -->
    <div class="settings-card">

      <!-- Profile -->
      <div class="settings-item">
        <div class="settings-icon profile">&#128100;</div>
        <div class="settings-label">个人信息</div>
        <div class="settings-value">小明同学</div>
        <div class="settings-arrow">&rsaquo;</div>
      </div>

      <!-- Security -->
      <div class="settings-item">
        <div class="settings-icon security">&#128274;</div>
        <div class="settings-label">账号安全</div>
        <div class="settings-value">138****0000</div>
        <div class="settings-arrow">&rsaquo;</div>
      </div>

      <!-- Language -->
      <div class="settings-item" id="langItem">
        <div class="settings-icon language">&#127760;</div>
        <div class="settings-label">语言切换</div>
        <div class="settings-value">中文</div>
        <div class="settings-arrow">&rsaquo;</div>
      </div>

      <!-- Theme -->
      <div class="settings-item">
        <div class="settings-icon theme">&#127912;</div>
        <div class="settings-label">主题切换</div>
        <label class="toggle-switch">
          <input type="checkbox" id="themeToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Notifications -->
      <div class="settings-item">
        <div class="settings-icon notify">&#128276;</div>
        <div class="settings-label">通知设置</div>
        <label class="toggle-switch">
          <input type="checkbox" id="notifyToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- About -->
      <div class="settings-item">
        <div class="settings-icon about">&#8505;</div>
        <div class="settings-label">关于小麦</div>
        <div class="settings-value">v1.0.0</div>
        <div class="settings-arrow">&rsaquo;</div>
      </div>

    </div>

    <!-- Logout (separate card) -->
    <div class="settings-card">
      <div class="settings-item logout-item">
        <div class="settings-label">退出登录</div>
      </div>
    </div>

    <!-- Version -->
    <div class="version-info">小麦 AI 教学视频智能体 v1.0.0</div>

  </div>

  <!-- Language Modal -->
  <div class="modal-overlay" id="langModal">
    <div class="modal">
      <div class="modal-title">选择语言</div>

      <div class="lang-option selected" data-lang="zh">
        <div class="lang-radio"><div class="lang-radio-dot"></div></div>
        <div class="lang-name">中文</div>
        <div class="lang-sub">简体中文</div>
      </div>

      <div class="lang-option" data-lang="en">
        <div class="lang-radio"><div class="lang-radio-dot"></div></div>
        <div class="lang-name">English</div>
        <div class="lang-sub">英语</div>
      </div>

      <div class="modal-actions">
        <button class="modal-btn cancel" id="langCancelBtn">取消</button>
        <button class="modal-btn confirm">确定</button>
      </div>
    </div>
  </div>

  <script>
    // Language modal
    var langModal = document.getElementById('langModal');

    document.getElementById('langItem').addEventListener('click', function() {
      langModal.classList.add('visible');
    });

    document.getElementById('langCancelBtn').addEventListener('click', function() {
      langModal.classList.remove('visible');
    });

    langModal.addEventListener('click', function(e) {
      if (e.target === langModal) langModal.classList.remove('visible');
    });

    // Language option selection
    var langOptions = document.querySelectorAll('.lang-option');
    langOptions.forEach(function(option) {
      option.addEventListener('click', function() {
        langOptions.forEach(function(o) { o.classList.remove('selected'); });
        option.classList.add('selected');
      });
    });

    // Toggle switches - prevent event bubbling to settings-item
    document.querySelectorAll('.toggle-switch').forEach(function(toggle) {
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
      });
    });
  </script>
</body>
</html>

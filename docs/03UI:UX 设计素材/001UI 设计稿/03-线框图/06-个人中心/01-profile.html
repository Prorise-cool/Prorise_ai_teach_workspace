<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小麦 - 个人资料</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif;
      background-color: #f5ede1;
      color: #3b1701;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 6vh 20px;
    }

    .page-container {
      width: 100%;
      max-width: 800px;
    }

    /* -- Page Title -- */
    .page-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
    }

    /* -- User Info Card -- */
    .user-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(59, 23, 1, 0.06);
      margin-bottom: 28px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f5c547 0%, #e6a817 100%);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #fff;
      box-shadow: 0 4px 16px rgba(245, 197, 71, 0.3);
    }

    .user-name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .user-school {
      font-size: 16px;
      color: #6b4421;
      margin-bottom: 12px;
    }

    .role-tag {
      display: inline-block;
      background: rgba(245, 197, 71, 0.15);
      color: #b8860b;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .edit-btn {
      display: inline-block;
      background: transparent;
      border: 2px solid #f5c547;
      color: #3b1701;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 28px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .edit-btn:hover {
      background: #f5c547;
      color: #3b1701;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(245, 197, 71, 0.3);
    }

    .edit-btn:active {
      transform: scale(0.97);
    }

    /* -- Stats Card -- */
    .stats-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 4px 24px rgba(59, 23, 1, 0.06);
      margin-bottom: 28px;
    }

    .stats-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      padding-left: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .stat-item {
      text-align: center;
      padding: 16px 8px;
      border-radius: 14px;
      background: rgba(245, 197, 71, 0.06);
      transition: all 0.25s ease;
    }

    .stat-item:hover {
      background: rgba(245, 197, 71, 0.12);
      transform: translateY(-2px);
    }

    .stat-number {
      font-size: 36px;
      font-weight: 700;
      color: #f5c547;
      line-height: 1.1;
    }

    .stat-unit {
      font-size: 14px;
      color: #6b4421;
      margin-top: 2px;
    }

    .stat-label {
      font-size: 13px;
      color: #6b4421;
      margin-top: 8px;
    }

    /* -- Quick Entry -- */
    .quick-entry {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .entry-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 28px 16px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(59, 23, 1, 0.06);
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #3b1701;
    }

    .entry-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(59, 23, 1, 0.1);
      background: rgba(255, 255, 255, 0.9);
    }

    .entry-card:active {
      transform: scale(0.97);
    }

    .entry-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }

    .entry-label {
      font-size: 16px;
      font-weight: 500;
    }

    .entry-desc {
      font-size: 12px;
      color: #6b4421;
      margin-top: 6px;
    }

    /* -- Responsive -- */
    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .stat-number {
        font-size: 28px;
      }

      .quick-entry {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">

    <!-- Page Title -->
    <h1 class="page-title">个人中心</h1>

    <!-- User Info Card -->
    <div class="user-card">
      <div class="avatar">明</div>
      <div class="user-name">小明同学</div>
      <div class="user-school">清华大学</div>
      <div class="role-tag">学生</div>
      <br>
      <button class="edit-btn">编辑资料</button>
    </div>

    <!-- Learning Stats Card -->
    <div class="stats-card">
      <div class="stats-title">学习统计</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-number">12.5</div>
          <div class="stat-unit">小时</div>
          <div class="stat-label">学习时长（本周）</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">8</div>
          <div class="stat-unit">个</div>
          <div class="stat-label">课堂完成</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">15</div>
          <div class="stat-unit">个</div>
          <div class="stat-label">视频观看</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">87</div>
          <div class="stat-unit">分</div>
          <div class="stat-label">测验平均分</div>
        </div>
      </div>
    </div>

    <!-- Quick Entry -->
    <div class="quick-entry">
      <a class="entry-card" href="02-history.html">
        <span class="entry-icon">&#128203;</span>
        <div class="entry-label">历史记录</div>
        <div class="entry-desc">查看学习足迹</div>
      </a>
      <a class="entry-card" href="03-favorites.html">
        <span class="entry-icon">&#11088;</span>
        <div class="entry-label">收藏夹</div>
        <div class="entry-desc">管理收藏内容</div>
      </a>
      <a class="entry-card" href="04-settings.html">
        <span class="entry-icon">&#9881;</span>
        <div class="entry-label">设置</div>
        <div class="entry-desc">偏好与账号</div>
      </a>
    </div>

  </div>
</body>
</html>

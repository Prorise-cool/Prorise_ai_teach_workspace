<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小麦 Teacher Style Panel Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { border-radius: 0 !important; box-shadow: none !important; }
    .wf { border: 1px solid #000; }
    .wf-strong { border: 2px solid #000; }
    .wf-dash { border: 1px dashed #000; }
  </style>
</head>
<body class="bg-white text-black">
  <main class="mx-auto max-w-5xl p-8">
    <header class="wf-strong mb-6 p-4">
      <h1 class="text-xl font-bold">共享老师风格面板</h1>
      <p class="mt-2 text-sm">用于 `/video/input` 与 `/classroom/input` 中的局部会话配置展开态，不代表独立页面。</p>
    </header>

    <section class="grid gap-6 lg:grid-cols-[3fr_2fr]">
      <div class="wf p-6">
        <div class="mb-4 flex items-center justify-between">
          <div>
            <p class="text-sm">输入区局部交互</p>
            <h2 class="text-lg font-semibold">核心输入框 + 老师风格触发器</h2>
          </div>
          <div class="wf px-3 py-2 text-sm">当前老师：耐心型</div>
        </div>

        <div class="wf-dash min-h-[240px] p-4">
          <div class="wf mb-3 p-3">题目 / 主题输入框</div>
          <div class="wf p-3">主 CTA：开始生成</div>
          <p class="mt-4 text-sm">说明：头像 / 胶囊触发器附着在输入框附近，不打断主任务流。</p>
        </div>
      </div>

      <aside class="wf p-4">
        <div class="mb-4 flex items-center justify-between">
          <h3 class="font-semibold">老师风格面板</h3>
          <span class="wf px-2 py-1 text-xs">可扩展列表</span>
        </div>

        <div class="space-y-3 text-sm">
          <div class="wf-strong p-3">
            <div class="flex items-center justify-between">
              <span>耐心型老师</span>
              <span>已选中</span>
            </div>
            <p class="mt-2">步骤详细、语速平稳、适合基础理解。</p>
          </div>
          <div class="wf p-3">严肃型老师：逻辑清晰、节奏正式。</div>
          <div class="wf p-3">幽默型老师：举例轻松、互动感强。</div>
          <div class="wf p-3">高效型老师：快速聚焦重点。</div>
          <div class="wf-dash p-3">未来扩展位：更多老师风格</div>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>

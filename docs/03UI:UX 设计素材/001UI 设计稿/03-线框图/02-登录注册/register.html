<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 注册</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif;
    background-color:#f5ede1;
    color:#3b1701;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:'';
    position:absolute;
    top:-120px;left:50%;
    transform:translateX(-50%);
    width:600px;height:600px;
    background:radial-gradient(circle,rgba(245,197,71,.35) 0%,rgba(245,197,71,.08) 50%,transparent 70%);
    pointer-events:none;z-index:0;
  }
  body::after{
    content:'';
    position:absolute;
    bottom:-200px;right:-100px;
    width:500px;height:500px;
    background:radial-gradient(circle,rgba(245,197,71,.18) 0%,transparent 60%);
    pointer-events:none;z-index:0;
  }

  .card{
    position:relative;z-index:1;
    width:100%;max-width:400px;
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:20px;
    padding:48px 36px 36px;
    box-shadow:0 8px 32px rgba(59,23,1,.08);
  }

  .logo-wrap{text-align:center;margin-bottom:8px}
  .logo{
    display:inline-flex;align-items:center;justify-content:center;
    width:64px;height:64px;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border-radius:16px;
    font-size:32px;color:#fff;
    box-shadow:0 4px 12px rgba(245,197,71,.35);
  }
  .welcome{
    text-align:center;
    font-size:24px;font-weight:700;
    margin:16px 0 4px;color:#3b1701;
  }
  .subtitle{
    text-align:center;
    font-size:14px;color:#6b4421;
    margin-bottom:32px;
  }

  /* 进度指示 */
  .progress{
    display:flex;align-items:center;justify-content:center;
    gap:8px;margin-bottom:28px;
  }
  .progress-step{
    width:32px;height:4px;
    border-radius:2px;
    background:#e6dcc8;
    transition:background .3s;
  }
  .progress-step.active{background:#f5c547}

  .form-group{margin-bottom:20px;position:relative}
  .form-label{
    display:block;
    font-size:13px;font-weight:600;color:#6b4421;
    margin-bottom:6px;
  }

  .input-wrap{
    display:flex;align-items:center;
    border:2px solid #e6dcc8;
    border-radius:8px;
    background:#fff;
    transition:border-color .25s,box-shadow .25s;
    overflow:hidden;
  }
  .input-wrap:focus-within{
    border-color:#f5c547;
    box-shadow:0 0 0 3px rgba(245,197,71,.18);
  }
  .input-wrap.error{
    border-color:#ff4d4f;
    box-shadow:0 0 0 3px rgba(255,77,79,.12);
  }
  .input-wrap.success{border-color:#52c41a}

  .area-code{
    display:flex;align-items:center;
    padding:0 12px;
    font-size:14px;font-weight:600;color:#3b1701;
    border-right:1px solid #e6dcc8;
    height:44px;cursor:pointer;user-select:none;
    white-space:nowrap;gap:4px;
  }
  .area-code .arrow{font-size:10px;color:#6b4421}

  .input-field{
    flex:1;border:none;outline:none;
    padding:0 14px;height:44px;
    font-size:15px;color:#3b1701;
    background:transparent;font-family:inherit;
  }
  .input-field::placeholder{color:#b8a88a}

  .success-icon{
    padding-right:12px;color:#52c41a;font-size:16px;
    display:none;
  }
  .input-wrap.success .success-icon{display:block}

  .error-msg{
    font-size:12px;color:#ff4d4f;
    margin-top:4px;display:none;
  }
  .form-group.has-error .error-msg{display:block}
  .form-group.has-error .input-wrap{
    border-color:#ff4d4f;
    box-shadow:0 0 0 3px rgba(255,77,79,.12);
  }

  .code-row{display:flex;gap:12px}
  .code-row .input-wrap{flex:1}
  .code-btn{
    flex-shrink:0;width:120px;height:48px;
    border:2px solid #f5c547;border-radius:8px;
    background:transparent;
    color:#3b1701;font-weight:600;font-size:13px;
    cursor:pointer;font-family:inherit;
    transition:background .2s,color .2s;
  }
  .code-btn:hover{background:rgba(245,197,71,.12)}
  .code-btn:active{background:rgba(245,197,71,.22)}
  .code-btn.counting{
    border-color:#e6dcc8;color:#b8a88a;cursor:not-allowed;
  }
  .code-btn.resend{border-color:#f5c547;color:#e6b030}

  /* 密码强度条 */
  .pwd-strength{
    display:flex;gap:4px;margin-top:8px;
  }
  .pwd-bar{
    flex:1;height:3px;border-radius:2px;
    background:#e6dcc8;transition:background .3s;
  }
  .pwd-bar.weak{background:#ff4d4f}
  .pwd-bar.medium{background:#faad14}
  .pwd-bar.strong{background:#52c41a}
  .pwd-hint{
    font-size:12px;color:#b8a88a;margin-top:4px;
    transition:color .3s;
  }
  .pwd-hint.weak{color:#ff4d4f}
  .pwd-hint.medium{color:#faad14}
  .pwd-hint.strong{color:#52c41a}

  .submit-btn{
    display:flex;align-items:center;justify-content:center;
    width:100%;height:48px;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border:none;border-radius:8px;
    color:#fff;font-size:16px;font-weight:700;
    cursor:pointer;font-family:inherit;
    margin-top:28px;
    transition:opacity .2s,transform .1s,box-shadow .2s;
    box-shadow:0 4px 14px rgba(245,197,71,.3);
    position:relative;overflow:hidden;
  }
  .submit-btn:hover{opacity:.92;box-shadow:0 6px 20px rgba(245,197,71,.35)}
  .submit-btn:active{transform:scale(.985)}
  .submit-btn:disabled{
    background:#e6dcc8;color:#b8a88a;
    cursor:not-allowed;box-shadow:none;
  }
  .submit-btn.loading .btn-text{visibility:hidden}
  .submit-btn.loading::after{
    content:'';position:absolute;
    width:22px;height:22px;
    border:3px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .agreement{
    display:flex;align-items:flex-start;
    gap:8px;margin-top:20px;
    font-size:13px;color:#6b4421;line-height:1.5;
  }
  .agreement input[type="checkbox"]{
    margin-top:3px;accent-color:#f5c547;
    width:16px;height:16px;cursor:pointer;
  }
  .agreement a{color:#e6b030;text-decoration:none;font-weight:500}
  .agreement a:hover{text-decoration:underline}

  .footer{
    text-align:center;margin-top:24px;
    font-size:14px;color:#6b4421;
  }
  .footer a{
    color:#e6b030;font-weight:600;text-decoration:none;
    transition:color .2s;
  }
  .footer a:hover{color:#d4a020;text-decoration:underline}

  .demo-panel{
    position:fixed;top:16px;right:16px;z-index:99;
    background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
    border-radius:12px;padding:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.1);
    font-size:12px;color:#6b4421;
  }
  .demo-panel h4{margin-bottom:8px;font-size:13px;color:#3b1701}
  .demo-panel button{
    display:block;width:100%;
    margin-bottom:6px;padding:6px 10px;
    border:1px solid #e6dcc8;border-radius:6px;
    background:#fff;font-size:12px;color:#3b1701;
    cursor:pointer;font-family:inherit;text-align:left;
    transition:background .15s;
  }
  .demo-panel button:hover{background:#f5ede1}
  .demo-panel button:last-child{margin-bottom:0}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo">麦</div>
  </div>
  <h1 class="welcome">创建账号</h1>
  <p class="subtitle">注册小麦账号，开启你的 AI 学习之旅</p>

  <!-- 进度指示器 -->
  <div class="progress">
    <div class="progress-step active"></div>
    <div class="progress-step"></div>
  </div>

  <form id="registerForm" onsubmit="return false">
    <!-- 手机号 -->
    <div class="form-group" id="phoneGroup">
      <label class="form-label">手机号</label>
      <div class="input-wrap" id="phoneWrap">
        <div class="area-code">
          <span>+86</span>
          <span class="arrow">&#9662;</span>
        </div>
        <input class="input-field" id="phoneInput" type="tel" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
        <span class="success-icon">&#10003;</span>
      </div>
      <div class="error-msg" id="phoneError">请输入正确的手机号码</div>
    </div>

    <!-- 验证码 -->
    <div class="form-group" id="codeGroup">
      <label class="form-label">验证码</label>
      <div class="code-row">
        <div class="input-wrap" id="codeWrap">
          <input class="input-field" id="codeInput" type="text" placeholder="请输入 6 位验证码" maxlength="6" autocomplete="one-time-code">
        </div>
        <button type="button" class="code-btn" id="codeBtn" onclick="handleSendCode()">获取验证码</button>
      </div>
      <div class="error-msg" id="codeError">验证码不正确</div>
    </div>

    <!-- 设置密码 -->
    <div class="form-group" id="pwdGroup">
      <label class="form-label">设置密码</label>
      <div class="input-wrap" id="pwdWrap">
        <input class="input-field" id="pwdInput" type="password" placeholder="8-20 位，含字母和数字" maxlength="20" autocomplete="new-password">
        <button type="button" style="border:none;background:none;padding:0 12px;cursor:pointer;color:#b8a88a;font-size:14px" onclick="togglePwd('pwdInput',this)">显示</button>
      </div>
      <div class="pwd-strength" id="pwdStrength">
        <div class="pwd-bar" id="bar1"></div>
        <div class="pwd-bar" id="bar2"></div>
        <div class="pwd-bar" id="bar3"></div>
      </div>
      <div class="pwd-hint" id="pwdHint">至少 8 位，包含字母和数字</div>
      <div class="error-msg" id="pwdError">密码格式不正确</div>
    </div>

    <!-- 确认密码 -->
    <div class="form-group" id="pwd2Group">
      <label class="form-label">确认密码</label>
      <div class="input-wrap" id="pwd2Wrap">
        <input class="input-field" id="pwd2Input" type="password" placeholder="请再次输入密码" maxlength="20" autocomplete="new-password">
        <span class="success-icon">&#10003;</span>
      </div>
      <div class="error-msg" id="pwd2Error">两次密码不一致</div>
    </div>

    <!-- 注册按钮 -->
    <button type="submit" class="submit-btn" id="submitBtn" disabled>
      <span class="btn-text">注册</span>
    </button>

    <!-- 用户协议 -->
    <label class="agreement">
      <input type="checkbox" id="agreeCheck" onchange="updateSubmitBtn()">
      <span>我已阅读并同意 <a href="#">《用户服务协议》</a> 和 <a href="#">《隐私政策》</a></span>
    </label>
  </form>

  <div class="footer">
    已有账号？<a href="login.html">登录</a>
  </div>
</div>

<!-- 状态演示面板 -->
<div class="demo-panel">
  <h4>状态演示</h4>
  <button onclick="showState('default')">默认状态</button>
  <button onclick="showState('focus')">聚焦状态</button>
  <button onclick="showState('error')">错误状态</button>
  <button onclick="showState('success')">成功状态</button>
  <button onclick="showState('loading')">加载中</button>
  <button onclick="showState('pwd-weak')">密码弱</button>
  <button onclick="showState('pwd-medium')">密码中</button>
  <button onclick="showState('pwd-strong')">密码强</button>
</div>

<script>
  var countdown = 0, timer = null;

  function handleSendCode() {
    var btn = document.getElementById('codeBtn');
    if (btn.classList.contains('counting')) return;
    countdown = 60;
    btn.classList.add('counting');
    btn.textContent = countdown + 's 后重新获取';
    timer = setInterval(function() {
      countdown--;
      if (countdown <= 0) {
        clearInterval(timer);
        btn.classList.remove('counting');
        btn.classList.add('resend');
        btn.textContent = '重新获取';
      } else {
        btn.textContent = countdown + 's 后重新获取';
      }
    }, 1000);
  }

  function togglePwd(id, btn) {
    var inp = document.getElementById(id);
    if (inp.type === 'password') {
      inp.type = 'text'; btn.textContent = '隐藏';
    } else {
      inp.type = 'password'; btn.textContent = '显示';
    }
  }

  function checkPwdStrength(pwd) {
    var score = 0;
    if (pwd.length >= 8) score++;
    if (/[a-zA-Z]/.test(pwd) && /\d/.test(pwd)) score++;
    if (/[^a-zA-Z0-9]/.test(pwd)) score++;
    return score; // 0-3
  }

  function setPwdStrength(level) {
    var bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
    var hint = document.getElementById('pwdHint');
    bars.forEach(function(b) { b.className = 'pwd-bar'; });
    hint.className = 'pwd-hint';
    if (level >= 1) { bars[0].classList.add('weak'); hint.className = 'pwd-hint weak'; hint.textContent = '密码强度：弱'; }
    if (level >= 2) { bars[1].classList.add('medium'); hint.className = 'pwd-hint medium'; hint.textContent = '密码强度：中'; }
    if (level >= 3) { bars[2].classList.add('strong'); hint.className = 'pwd-hint strong'; hint.textContent = '密码强度：强'; }
    if (level === 0) { hint.textContent = '至少 8 位，包含字母和数字'; }
  }

  document.getElementById('pwdInput').addEventListener('input', function() {
    setPwdStrength(checkPwdStrength(this.value));
    updateSubmitBtn();
  });

  document.getElementById('pwd2Input').addEventListener('input', function() {
    var pwd = document.getElementById('pwdInput').value;
    var wrap = document.getElementById('pwd2Wrap');
    var group = document.getElementById('pwd2Group');
    wrap.classList.remove('success','error');
    group.classList.remove('has-error');
    if (this.value.length > 0 && this.value === pwd) {
      wrap.classList.add('success');
    } else if (this.value.length > 0 && this.value !== pwd) {
      wrap.classList.add('error');
      group.classList.add('has-error');
    }
    updateSubmitBtn();
  });

  document.getElementById('phoneInput').addEventListener('input', function() {
    var g = document.getElementById('phoneGroup');
    var w = document.getElementById('phoneWrap');
    g.classList.remove('has-error'); w.classList.remove('error','success');
    if (this.value.length === 11) {
      if (/^1[3-9]\d{9}$/.test(this.value)) { w.classList.add('success'); }
      else { g.classList.add('has-error'); w.classList.add('error'); }
    }
    updateSubmitBtn();
  });

  document.getElementById('codeInput').addEventListener('input', updateSubmitBtn);

  function updateSubmitBtn() {
    var phone = document.getElementById('phoneInput').value.trim();
    var code = document.getElementById('codeInput').value.trim();
    var pwd = document.getElementById('pwdInput').value;
    var pwd2 = document.getElementById('pwd2Input').value;
    var agreed = document.getElementById('agreeCheck').checked;
    var valid = phone.length === 11 && code.length === 6 && pwd.length >= 8 && pwd === pwd2 && agreed;
    document.getElementById('submitBtn').disabled = !valid;
  }

  function showState(state) {
    var phoneGroup = document.getElementById('phoneGroup');
    var phoneWrap = document.getElementById('phoneWrap');
    var pwdGroup = document.getElementById('pwdGroup');
    var pwdWrap = document.getElementById('pwdWrap');
    var pwd2Group = document.getElementById('pwd2Group');
    var pwd2Wrap = document.getElementById('pwd2Wrap');
    var submitBtn = document.getElementById('submitBtn');

    // reset
    phoneGroup.classList.remove('has-error');
    phoneWrap.classList.remove('error','success');
    pwdGroup.classList.remove('has-error');
    pwdWrap.classList.remove('error','success');
    pwd2Group.classList.remove('has-error');
    pwd2Wrap.classList.remove('error','success');
    submitBtn.classList.remove('loading');
    submitBtn.disabled = false;
    setPwdStrength(0);

    switch(state) {
      case 'default':
        submitBtn.disabled = true;
        break;
      case 'focus':
        document.getElementById('phoneInput').focus();
        break;
      case 'error':
        phoneGroup.classList.add('has-error');
        phoneWrap.classList.add('error');
        pwd2Group.classList.add('has-error');
        pwd2Wrap.classList.add('error');
        break;
      case 'success':
        phoneWrap.classList.add('success');
        pwd2Wrap.classList.add('success');
        setPwdStrength(3);
        break;
      case 'loading':
        submitBtn.classList.add('loading');
        break;
      case 'pwd-weak':
        setPwdStrength(1);
        break;
      case 'pwd-medium':
        setPwdStrength(2);
        break;
      case 'pwd-strong':
        setPwdStrength(3);
        break;
    }
  }
</script>
</body>
</html>

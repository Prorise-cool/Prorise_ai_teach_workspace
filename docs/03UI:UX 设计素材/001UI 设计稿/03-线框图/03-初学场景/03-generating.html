<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 生成课堂</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif;
    background-color:#f5ede1;
    color:#3b1701;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:absolute;
    top:-180px;left:50%;transform:translateX(-50%);
    width:800px;height:800px;
    background:radial-gradient(circle,rgba(245,197,71,.2) 0%,transparent 70%);
    pointer-events:none;z-index:0;
  }

  /* 进度指示器 */
  .progress-bar{
    position:relative;z-index:1;
    max-width:600px;margin:0 auto;
    padding:32px 40px 0;
    display:flex;align-items:center;
  }
  .step{
    display:flex;align-items:center;
    font-size:13px;font-weight:600;
    color:#6b4421;opacity:.4;
    white-space:nowrap;
  }
  .step.active{opacity:1;color:#3b1701}
  .step.done{opacity:.7;color:#52c41a}
  .step-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:50%;
    border:2px solid currentColor;
    font-size:13px;font-weight:700;
    margin-right:8px;flex-shrink:0;
  }
  .step.active .step-num{background:#f5c547;border-color:#f5c547;color:#fff}
  .step.done .step-num{background:#52c41a;border-color:#52c41a;color:#fff}
  .step-line{flex:1;height:2px;background:rgba(59,23,1,.1);margin:0 12px;min-width:40px}
  .step-line.done{background:#52c41a}

  /* 主容器 */
  .main{
    position:relative;z-index:1;
    max-width:700px;margin:0 auto;
    padding:80px 40px 60px;
    display:flex;flex-direction:column;align-items:center;
    min-height:calc(100vh - 80px);
    justify-content:center;
  }

  .title{
    font-size:36px;font-weight:800;
    margin-bottom:48px;text-align:center;
  }

  /* 分阶段进度 */
  .stages{
    width:100%;
    margin-bottom:40px;
  }
  .stage{
    display:flex;align-items:center;
    padding:16px 20px;
    border-radius:14px;
    margin-bottom:8px;
    background:rgba(255,255,255,.4);
    transition:all .4s;
    position:relative;
    overflow:hidden;
  }
  .stage::after{
    content:'';position:absolute;
    left:0;top:0;bottom:0;
    width:0;
    background:rgba(245,197,71,.08);
    transition:width 1.5s ease;
    border-radius:14px;
  }
  .stage.active{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    box-shadow:0 4px 20px rgba(245,197,71,.15);
  }
  .stage.active::after{width:100%}
  .stage.done{background:rgba(82,196,26,.06)}

  .stage-icon{
    width:36px;height:36px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:700;
    margin-right:16px;flex-shrink:0;
    background:rgba(59,23,1,.06);
    color:#6b4421;
    transition:all .3s;
    position:relative;z-index:1;
  }
  .stage.active .stage-icon{
    background:#f5c547;color:#fff;
    box-shadow:0 2px 10px rgba(245,197,71,.4);
  }
  .stage.done .stage-icon{
    background:#52c41a;color:#fff;
  }

  .stage-info{flex:1;position:relative;z-index:1}
  .stage-name{
    font-size:15px;font-weight:600;
    margin-bottom:2px;
    color:#3b1701;
  }
  .stage.done .stage-name{color:#52c41a}
  .stage-range{font-size:12px;color:#6b4421;opacity:.6}

  .stage-status{
    font-size:13px;font-weight:600;
    color:#6b4421;
    position:relative;z-index:1;
  }
  .stage.active .stage-status{color:#f5c547}
  .stage.done .stage-status{color:#52c41a}

  /* 脉动动画 */
  @keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:.5}
  }
  .stage.active .stage-status{
    animation:pulse 1.5s ease-in-out infinite;
  }

  /* 总进度条 */
  .progress-total{
    width:100%;
    height:8px;
    background:rgba(59,23,1,.06);
    border-radius:100px;
    margin-bottom:16px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#f5c547,#e6b030);
    border-radius:100px;
    transition:width .8s ease;
    position:relative;
  }
  @keyframes shimmer{
    0%{transform:translateX(-100%)}
    100%{transform:translateX(100%)}
  }
  .progress-fill::after{
    content:'';position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
    animation:shimmer 2s infinite;
  }

  /* 时间与提示 */
  .time-info{
    font-size:14px;color:#6b4421;
    margin-bottom:32px;
    text-align:center;
  }

  /* 成就提示 */
  .achievement{
    position:fixed;top:80px;right:-320px;
    width:280px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:16px;
    padding:20px;
    box-shadow:0 8px 32px rgba(0,0,0,.1);
    transition:right .5s cubic-bezier(.4,0,.2,1);
    z-index:10;
  }
  .achievement.show{right:24px}
  .achievement-title{
    font-size:13px;font-weight:700;
    color:#f5c547;margin-bottom:4px;
  }
  .achievement-text{font-size:14px;color:#3b1701}

  /* 取消按钮 */
  .btn-cancel{
    display:inline-flex;align-items:center;justify-content:center;
    height:44px;padding:0 28px;
    font-size:14px;font-weight:600;font-family:inherit;
    color:#6b4421;
    background:rgba(255,255,255,.5);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1.5px solid rgba(59,23,1,.1);
    border-radius:12px;
    cursor:pointer;
    transition:all .25s;
  }
  .btn-cancel:hover{
    background:rgba(255,255,255,.8);
    border-color:rgba(59,23,1,.2);
  }
</style>
</head>
<body>

<!-- 进度指示器 -->
<div class="progress-bar">
  <div class="step done"><span class="step-num">&#10003;</span>选择主题</div>
  <div class="step-line done"></div>
  <div class="step done"><span class="step-num">&#10003;</span>选择风格</div>
  <div class="step-line done"></div>
  <div class="step active"><span class="step-num">3</span>生成课堂</div>
</div>

<main class="main">
  <h1 class="title">正在生成课堂...</h1>

  <div class="stages" id="stages">
    <div class="stage done" data-step="0">
      <div class="stage-icon">&#10003;</div>
      <div class="stage-info">
        <div class="stage-name">理解主题</div>
        <div class="stage-range">0% - 20%</div>
      </div>
      <div class="stage-status">已完成</div>
    </div>
    <div class="stage done" data-step="1">
      <div class="stage-icon">&#10003;</div>
      <div class="stage-info">
        <div class="stage-name">生成大纲</div>
        <div class="stage-range">20% - 40%</div>
      </div>
      <div class="stage-status">已完成</div>
    </div>
    <div class="stage active" data-step="2">
      <div class="stage-icon">3</div>
      <div class="stage-info">
        <div class="stage-name">生成幻灯片</div>
        <div class="stage-range">40% - 70%</div>
      </div>
      <div class="stage-status">进行中...</div>
    </div>
    <div class="stage" data-step="3">
      <div class="stage-icon">4</div>
      <div class="stage-info">
        <div class="stage-name">生成测验</div>
        <div class="stage-range">70% - 90%</div>
      </div>
      <div class="stage-status">等待中</div>
    </div>
    <div class="stage" data-step="4">
      <div class="stage-icon">5</div>
      <div class="stage-info">
        <div class="stage-name">准备完成</div>
        <div class="stage-range">90% - 100%</div>
      </div>
      <div class="stage-status">等待中</div>
    </div>
  </div>

  <div class="progress-total">
    <div class="progress-fill" id="progressFill" style="width:52%"></div>
  </div>

  <div class="time-info" id="timeInfo">预计还需 2 分 30 秒</div>

  <button class="btn-cancel" onclick="if(confirm('确定取消生成吗？')) window.location.href='02-style.html'">取消生成</button>
</main>

<!-- 成就提示 -->
<div class="achievement" id="achievement">
  <div class="achievement-title">小成就解锁!</div>
  <div class="achievement-text" id="achievementText">大纲已就绪，正在生成精美幻灯片</div>
</div>

<script>
  const stages = [
    {name:'理解主题', range:[0,20]},
    {name:'生成大纲', range:[20,40]},
    {name:'生成幻灯片', range:[40,70]},
    {name:'生成测验', range:[70,90]},
    {name:'准备完成', range:[90,100]}
  ];

  const achievements = [
    '主题分析完成，AI 已理解你的学习需求',
    '大纲已就绪，正在生成精美幻灯片',
    '幻灯片制作中，每一页都精心设计',
    '测验题目生成中，帮你巩固知识',
    '课堂准备就绪，马上开始学习！'
  ];

  let currentStep = 2;
  let progress = 52;
  const progressFill = document.getElementById('progressFill');
  const timeInfo = document.getElementById('timeInfo');
  const achievementEl = document.getElementById('achievement');
  const achievementText = document.getElementById('achievementText');

  // 模拟进度推进
  function advanceProgress() {
    if (progress >= 100) {
      timeInfo.textContent = '生成完成！正在跳转...';
      setTimeout(() => {
        window.location.href = '04-classroom.html';
      }, 1500);
      return;
    }

    progress += Math.random() * 3 + 1;
    if (progress > 100) progress = 100;
    progressFill.style.width = progress + '%';

    // 更新时间
    const remaining = Math.max(0, Math.round((100 - progress) / 100 * 150));
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    timeInfo.textContent = remaining > 0
      ? '预计还需 ' + mins + ' 分 ' + secs.toString().padStart(2, '0') + ' 秒'
      : '即将完成...';

    // 更新阶段状态
    const stageEls = document.querySelectorAll('.stage');
    for (let i = 0; i < stages.length; i++) {
      if (progress >= stages[i].range[1]) {
        if (!stageEls[i].classList.contains('done')) {
          stageEls[i].classList.remove('active');
          stageEls[i].classList.add('done');
          stageEls[i].querySelector('.stage-icon').innerHTML = '&#10003;';
          stageEls[i].querySelector('.stage-status').textContent = '已完成';
          // 触发成就提示
          showAchievement(achievements[i]);
        }
      } else if (progress >= stages[i].range[0]) {
        if (!stageEls[i].classList.contains('active') && !stageEls[i].classList.contains('done')) {
          stageEls[i].classList.add('active');
          stageEls[i].querySelector('.stage-status').textContent = '进行中...';
        }
      }
    }

    setTimeout(advanceProgress, 800 + Math.random() * 1200);
  }

  function showAchievement(text) {
    achievementText.textContent = text;
    achievementEl.classList.add('show');
    setTimeout(() => achievementEl.classList.remove('show'), 3000);
  }

  // 启动进度模拟
  setTimeout(advanceProgress, 1500);

  // 初始成就提示
  setTimeout(() => showAchievement(achievements[2]), 2000);
</script>

</body>
</html>

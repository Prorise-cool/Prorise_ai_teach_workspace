<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 课堂测验</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif;
    background-color:#f5ede1;
    color:#3b1701;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:'';position:absolute;
    top:-180px;left:50%;transform:translateX(-50%);
    width:800px;height:800px;
    background:radial-gradient(circle,rgba(245,197,71,.2) 0%,transparent 70%);
    pointer-events:none;z-index:0;
  }

  /* 进度指示器 */
  .quiz-progress{
    position:relative;z-index:1;
    max-width:700px;margin:0 auto;
    padding:32px 40px 0;
  }
  .quiz-progress-header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:12px;
  }
  .quiz-progress-label{
    font-size:14px;font-weight:600;color:#6b4421;
  }
  .quiz-progress-count{
    font-size:14px;font-weight:700;color:#3b1701;
  }
  .quiz-progress-bar{
    height:6px;background:rgba(59,23,1,.06);
    border-radius:100px;overflow:hidden;
  }
  .quiz-progress-fill{
    height:100%;width:40%;
    background:linear-gradient(90deg,#f5c547,#e6b030);
    border-radius:100px;
    transition:width .5s ease;
  }

  /* 主容器 */
  .main{
    position:relative;z-index:1;
    max-width:700px;margin:0 auto;
    padding:48px 40px 60px;
  }

  /* 题目 */
  .question-card{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:20px;
    padding:40px 36px;
    box-shadow:0 4px 24px rgba(59,23,1,.06);
    margin-bottom:32px;
  }
  .question-number{
    display:inline-block;
    padding:4px 14px;
    font-size:12px;font-weight:700;
    color:#f5c547;
    background:rgba(245,197,71,.1);
    border-radius:100px;
    margin-bottom:16px;
  }
  .question-text{
    font-size:22px;font-weight:700;
    line-height:1.5;
    margin-bottom:32px;
  }

  /* 选项 */
  .options{
    display:flex;flex-direction:column;
    gap:12px;
  }
  .option{
    display:flex;align-items:center;
    padding:18px 20px;
    background:#fff;
    border:2px solid rgba(59,23,1,.08);
    border-radius:14px;
    cursor:pointer;
    transition:all .25s;
    position:relative;
  }
  .option:hover{
    border-color:rgba(245,197,71,.4);
    background:rgba(245,197,71,.03);
    transform:translateX(4px);
  }
  .option.selected{
    border-color:#f5c547;
    background:rgba(245,197,71,.06);
  }
  .option.correct{
    border-color:#52c41a;
    background:rgba(82,196,26,.06);
  }
  .option.wrong{
    border-color:#ff4d4f;
    background:rgba(255,77,79,.04);
  }

  .option-letter{
    width:36px;height:36px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:700;
    color:#6b4421;
    background:rgba(59,23,1,.04);
    margin-right:16px;
    flex-shrink:0;
    transition:all .25s;
  }
  .option.selected .option-letter{
    background:#f5c547;color:#fff;
  }
  .option.correct .option-letter{
    background:#52c41a;color:#fff;
  }
  .option.wrong .option-letter{
    background:#ff4d4f;color:#fff;
  }

  .option-text{
    font-size:16px;flex:1;
    line-height:1.4;
  }

  .option-icon{
    font-size:18px;font-weight:700;
    opacity:0;transition:opacity .25s;
    margin-left:12px;
  }
  .option.correct .option-icon{opacity:1;color:#52c41a}
  .option.wrong .option-icon{opacity:1;color:#ff4d4f}
  .option.selected .option-icon{opacity:1;color:#f5c547}

  /* 提交按钮 */
  .btn-submit{
    display:block;
    width:100%;height:56px;
    font-size:18px;font-weight:700;font-family:inherit;
    color:#fff;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border:none;border-radius:14px;
    cursor:pointer;
    transition:all .3s;
    box-shadow:0 4px 16px rgba(245,197,71,.35);
    margin-bottom:20px;
  }
  .btn-submit:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(245,197,71,.45);
  }
  .btn-submit:disabled{
    opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;
  }

  /* 反馈区 */
  .feedback{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:16px;
    padding:24px 28px;
    display:none;
    animation:slideUp .4s ease;
  }
  @keyframes slideUp{
    from{opacity:0;transform:translateY(12px)}
    to{opacity:1;transform:translateY(0)}
  }
  .feedback.show{display:block}
  .feedback.correct{border-left:4px solid #52c41a}
  .feedback.wrong{border-left:4px solid #ff4d4f}

  .feedback-title{
    font-size:16px;font-weight:700;
    margin-bottom:8px;
  }
  .feedback.correct .feedback-title{color:#52c41a}
  .feedback.wrong .feedback-title{color:#ff4d4f}

  .feedback-text{
    font-size:14px;color:#6b4421;
    line-height:1.7;
  }

  /* 完成状态 */
  .score-card{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:20px;
    padding:40px;
    text-align:center;
    display:none;
  }
  .score-card.show{display:block}
  .score-emoji{font-size:48px;margin-bottom:16px}
  .score-text{
    font-size:28px;font-weight:800;
    margin-bottom:8px;
  }
  .score-detail{
    font-size:16px;color:#6b4421;
    margin-bottom:24px;
  }
  .btn-continue{
    display:inline-flex;align-items:center;justify-content:center;
    height:48px;padding:0 32px;
    font-size:16px;font-weight:700;font-family:inherit;
    color:#fff;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border:none;border-radius:12px;
    cursor:pointer;
    transition:all .3s;
    box-shadow:0 4px 16px rgba(245,197,71,.35);
  }
  .btn-continue:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(245,197,71,.45);
  }
</style>
</head>
<body>

<!-- 进度指示器 -->
<div class="quiz-progress">
  <div class="quiz-progress-header">
    <span class="quiz-progress-label">课堂测验</span>
    <span class="quiz-progress-count" id="progressCount">第 2 / 5 题</span>
  </div>
  <div class="quiz-progress-bar">
    <div class="quiz-progress-fill" id="progressFill" style="width:40%"></div>
  </div>
</div>

<main class="main">
  <!-- 题目卡片 -->
  <div class="question-card" id="questionCard">
    <span class="question-number">第 2 题</span>
    <div class="question-text">递归函数必须包含以下哪个要素？</div>

    <div class="options" id="optionsArea">
      <div class="option" data-idx="0">
        <div class="option-letter">A</div>
        <div class="option-text">全局变量</div>
        <div class="option-icon">&#10003;</div>
      </div>
      <div class="option" data-idx="1">
        <div class="option-letter">B</div>
        <div class="option-text">基准条件（Base Case）</div>
        <div class="option-icon">&#10003;</div>
      </div>
      <div class="option" data-idx="2">
        <div class="option-letter">C</div>
        <div class="option-text">多线程支持</div>
        <div class="option-icon">&#10003;</div>
      </div>
      <div class="option" data-idx="3">
        <div class="option-letter">D</div>
        <div class="option-text">try-catch 异常处理</div>
        <div class="option-icon">&#10003;</div>
      </div>
    </div>
  </div>

  <!-- 提交按钮 -->
  <button class="btn-submit" id="btnSubmit" disabled>提交答案</button>

  <!-- 答题反馈 -->
  <div class="feedback" id="feedback">
    <div class="feedback-title" id="feedbackTitle"></div>
    <div class="feedback-text" id="feedbackText"></div>
  </div>

  <!-- 测验完成得分 -->
  <div class="score-card" id="scoreCard">
    <div class="score-emoji">&#127942;</div>
    <div class="score-text">你答对了 4/5 题！</div>
    <div class="score-detail">正确率 80%，表现优秀！</div>
    <button class="btn-continue" onclick="window.location.href='06-complete.html'">完成课堂</button>
  </div>
</main>

<script>
  const correctAnswer = 1; // B 是正确答案
  const options = document.querySelectorAll('.option');
  const btnSubmit = document.getElementById('btnSubmit');
  const feedback = document.getElementById('feedback');
  const feedbackTitle = document.getElementById('feedbackTitle');
  const feedbackText = document.getElementById('feedbackText');
  let selectedIdx = null;
  let submitted = false;

  // 选择选项
  options.forEach(opt => {
    opt.addEventListener('click', function() {
      if (submitted) return;
      selectedIdx = parseInt(this.getAttribute('data-idx'));
      options.forEach(o => {
        o.classList.remove('selected');
        o.querySelector('.option-icon').innerHTML = '&#10003;';
      });
      this.classList.add('selected');
      btnSubmit.disabled = false;
    });
  });

  // 提交答案
  btnSubmit.addEventListener('click', function() {
    if (selectedIdx === null || submitted) return;
    submitted = true;
    this.disabled = true;

    // 标记正确/错误
    options.forEach((opt, i) => {
      opt.style.pointerEvents = 'none';
      if (i === correctAnswer) {
        opt.classList.add('correct');
        opt.querySelector('.option-icon').innerHTML = '&#10003;';
      }
      if (i === selectedIdx && i !== correctAnswer) {
        opt.classList.add('wrong');
        opt.querySelector('.option-icon').innerHTML = '&#10007;';
      }
    });

    // 显示反馈
    const isCorrect = selectedIdx === correctAnswer;
    feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
    feedbackTitle.textContent = isCorrect ? '回答正确！' : '回答有误';
    feedbackText.textContent = isCorrect
      ? '没错！基准条件是递归函数的必要组成部分。没有基准条件，递归将无限循环下去，最终导致栈溢出（Stack Overflow）。'
      : '正确答案是 B。基准条件（Base Case）是递归函数停止调用自身的条件。没有它，递归会无限进行下去，最终导致栈溢出。';

    // 5秒后显示分数卡片（模拟答完最后一题）
    this.textContent = '下一题';
    this.disabled = false;
    this.onclick = function() {
      document.getElementById('questionCard').style.display = 'none';
      this.style.display = 'none';
      feedback.style.display = 'none';
      document.getElementById('scoreCard').classList.add('show');
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressCount').textContent = '完成！';
    };
  });
</script>

</body>
</html>

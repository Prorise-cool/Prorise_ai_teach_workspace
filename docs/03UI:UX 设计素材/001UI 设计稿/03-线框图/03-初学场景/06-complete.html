<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 课堂完成</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    font-family:-apple-system,'SF Pro','PingFang SC','Helvetica Neue',sans-serif;
    background-color:#f5ede1;
    color:#3b1701;
    min-height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  body::before{
    content:'';position:absolute;
    top:-200px;left:50%;transform:translateX(-50%);
    width:900px;height:900px;
    background:radial-gradient(circle,rgba(245,197,71,.3) 0%,rgba(245,197,71,.06) 50%,transparent 70%);
    pointer-events:none;z-index:0;
  }

  /* 纸屑动画 */
  .confetti-container{
    position:fixed;top:0;left:0;right:0;bottom:0;
    pointer-events:none;z-index:0;
    overflow:hidden;
  }
  .confetti{
    position:absolute;
    width:10px;height:10px;
    top:-20px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1}
    80%{opacity:1}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0}
  }
  @keyframes confettiSway{
    0%,100%{transform:translateX(0)}
    50%{transform:translateX(30px)}
  }

  /* 主容器 */
  .main{
    position:relative;z-index:1;
    max-width:600px;
    width:100%;
    padding:40px;
    text-align:center;
  }

  /* 庆祝图标 */
  .celebration{
    width:100px;height:100px;
    margin:0 auto 24px;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border-radius:28px;
    display:flex;align-items:center;justify-content:center;
    font-size:48px;
    box-shadow:0 8px 32px rgba(245,197,71,.4);
    animation:celebrationPop .6s cubic-bezier(.4,0,.2,1);
  }
  @keyframes celebrationPop{
    0%{transform:scale(0) rotate(-15deg);opacity:0}
    60%{transform:scale(1.15) rotate(5deg)}
    100%{transform:scale(1) rotate(0);opacity:1}
  }

  .title{
    font-size:40px;font-weight:800;
    margin-bottom:8px;
    animation:fadeInUp .6s ease .2s both;
  }
  .subtitle{
    font-size:16px;color:#6b4421;
    margin-bottom:48px;
    animation:fadeInUp .6s ease .35s both;
  }
  @keyframes fadeInUp{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* 统计卡片 */
  .stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:16px;
    margin-bottom:48px;
    animation:fadeInUp .6s ease .5s both;
  }
  .stat-card{
    background:rgba(255,255,255,.78);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border-radius:16px;
    padding:24px 16px;
    box-shadow:0 4px 20px rgba(59,23,1,.05);
    transition:transform .3s;
  }
  .stat-card:hover{transform:translateY(-4px)}
  .stat-icon{
    font-size:28px;margin-bottom:8px;
  }
  .stat-value{
    font-size:28px;font-weight:800;
    color:#3b1701;
    margin-bottom:4px;
  }
  .stat-label{
    font-size:13px;color:#6b4421;
  }

  /* 操作按钮 */
  .actions{
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
    animation:fadeInUp .6s ease .65s both;
  }
  .btn-primary{
    display:inline-flex;align-items:center;justify-content:center;
    height:56px;width:100%;max-width:360px;
    font-size:18px;font-weight:700;font-family:inherit;
    color:#fff;
    background:linear-gradient(135deg,#f5c547,#e6b030);
    border:none;border-radius:14px;
    cursor:pointer;
    transition:all .3s;
    box-shadow:0 4px 16px rgba(245,197,71,.35);
  }
  .btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(245,197,71,.45);
  }
  .btn-row{
    display:flex;gap:12px;width:100%;max-width:360px;
  }
  .btn-secondary{
    flex:1;
    display:inline-flex;align-items:center;justify-content:center;
    height:48px;
    font-size:15px;font-weight:600;font-family:inherit;
    color:#6b4421;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1.5px solid rgba(59,23,1,.1);
    border-radius:12px;
    cursor:pointer;
    transition:all .25s;
  }
  .btn-secondary:hover{
    background:rgba(255,255,255,.85);
    border-color:rgba(59,23,1,.2);
    transform:translateY(-2px);
  }
</style>
</head>
<body>

<!-- 纸屑动画容器 -->
<div class="confetti-container" id="confettiContainer"></div>

<main class="main">
  <div class="celebration">&#127881;</div>

  <h1 class="title">课堂完成！</h1>
  <p class="subtitle">恭喜你完成了「递归算法入门」的学习</p>

  <!-- 学习统计 -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-icon">&#9201;</div>
      <div class="stat-value">15</div>
      <div class="stat-label">学习时长（分钟）</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">&#128196;</div>
      <div class="stat-value">5</div>
      <div class="stat-label">幻灯片</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">&#127942;</div>
      <div class="stat-value">4/5</div>
      <div class="stat-label">测验得分</div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="actions">
    <button class="btn-primary" onclick="alert('查看课堂回放')">查看回放</button>
    <div class="btn-row">
      <button class="btn-secondary" onclick="alert('分享功能')">分享给同学</button>
      <button class="btn-secondary" onclick="window.location.href='01-input.html'">返回首页</button>
    </div>
  </div>
</main>

<script>
  // 纸屑动画
  const container = document.getElementById('confettiContainer');
  const colors = ['#f5c547','#e6b030','#ff9500','#52c41a','#4a6fa5','#722ed1','#ff4d4f'];

  function createConfetti() {
    const count = 60;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti';
        const size = Math.random() * 8 + 6;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.left = Math.random() * 100 + '%';
        el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (Math.random() * 2 + 2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        el.style.opacity = Math.random() * 0.5 + 0.5;

        container.appendChild(el);

        // 清理
        el.addEventListener('animationend', () => el.remove());
      }, i * 50);
    }
  }

  // 页面加载时触发纸屑
  createConfetti();

  // 再来一波
  setTimeout(createConfetti, 2000);
</script>

</body>
</html>

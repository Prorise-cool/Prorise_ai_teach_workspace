<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 加载中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif;
    background: #f5ede1;
    color: #3b1701;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Brand ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(245, 197, 71, 0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    z-index: 1;
  }

  /* Logo */
  .logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #f5c547;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 8px 32px rgba(245, 197, 71, 0.35);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  /* Loading text */
  .loading-text {
    font-size: 18px;
    color: #6b4421;
    letter-spacing: 2px;
    animation: fadeText 2s ease-in-out infinite;
  }

  @keyframes fadeText {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Bouncing dots */
  .dots {
    display: flex;
    gap: 12px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #f5c547;
    animation: bounce 1.4s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
    40% { transform: translateY(-18px); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="loading-container">
    <div class="logo">&#127806;</div>
    <div class="loading-text">加载中...</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>

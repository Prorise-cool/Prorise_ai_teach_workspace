<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 500 服务器错误</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif;
    background: #f5ede1;
    color: #3b1701;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .error-container {
    text-align: center;
    max-width: 520px;
    padding: 40px;
  }

  .error-code {
    font-size: 120px;
    font-weight: 800;
    color: #f5c547;
    opacity: 0.35;
    line-height: 1;
    letter-spacing: -4px;
    margin-bottom: 8px;
    user-select: none;
  }

  .error-icon {
    font-size: 64px;
    margin-bottom: 24px;
    animation: shake 4s ease-in-out infinite;
  }

  @keyframes shake {
    0%, 90%, 100% { transform: rotate(0deg); }
    92% { transform: rotate(-5deg); }
    94% { transform: rotate(5deg); }
    96% { transform: rotate(-3deg); }
    98% { transform: rotate(3deg); }
  }

  .error-title {
    font-size: 36px;
    font-weight: 700;
    color: #3b1701;
    margin-bottom: 12px;
  }

  .error-desc {
    font-size: 16px;
    color: #6b4421;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .error-id {
    font-size: 12px;
    color: #999;
    margin-bottom: 40px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .btn-group {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s ease;
    border: none;
    outline: none;
  }

  .btn-primary {
    background: #f5c547;
    color: #3b1701;
    box-shadow: 0 4px 16px rgba(245, 197, 71, 0.3);
  }

  .btn-primary:hover {
    background: #e6b53e;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(245, 197, 71, 0.4);
  }

  .btn-outline {
    background: transparent;
    color: #3b1701;
    border: 2px solid #3b1701;
  }

  .btn-outline:hover {
    background: #3b1701;
    color: #f5ede1;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">500</div>
    <div class="error-icon">&#9888;&#65039;</div>
    <h1 class="error-title">服务器开小差了</h1>
    <p class="error-desc">我们正在修复中，请稍后再试</p>
    <p class="error-id">Error ID: ERR-20260324-XXXX</p>
    <div class="btn-group">
      <a href="javascript:location.reload()" class="btn btn-primary">刷新页面</a>
      <a href="#" class="btn btn-outline">返回首页</a>
    </div>
  </div>
</body>
</html>

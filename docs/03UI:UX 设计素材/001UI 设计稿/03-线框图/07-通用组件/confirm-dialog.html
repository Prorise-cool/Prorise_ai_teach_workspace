<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 确认对话框</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif;
    background: #f5ede1;
    color: #3b1701;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 60px 20px;
  }

  .section-label {
    font-size: 14px;
    font-weight: 600;
    color: #6b4421;
    background: rgba(245, 197, 71, 0.2);
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: -20px;
  }

  /* Trigger buttons */
  .trigger-group {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .trigger-btn {
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    border: none;
    transition: all 0.25s ease;
  }

  .trigger-danger {
    background: #ff4d4f;
    color: #fff;
    box-shadow: 0 4px 16px rgba(255, 77, 79, 0.3);
  }

  .trigger-danger:hover {
    background: #e8444a;
    transform: translateY(-2px);
  }

  .trigger-normal {
    background: #f5c547;
    color: #3b1701;
    box-shadow: 0 4px 16px rgba(245, 197, 71, 0.3);
  }

  .trigger-normal:hover {
    background: #e6b53e;
    transform: translateY(-2px);
  }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Dialog */
  .dialog {
    background: #ffffff;
    border-radius: 16px;
    max-width: 420px;
    width: 90%;
    padding: 32px;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
    animation: slideUp 0.3s ease;
    text-align: center;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .dialog-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .dialog-title {
    font-size: 24px;
    font-weight: 700;
    color: #3b1701;
    margin-bottom: 8px;
  }

  .dialog-desc {
    font-size: 16px;
    color: #6b4421;
    line-height: 1.5;
    margin-bottom: 32px;
  }

  .dialog-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .dialog-btn {
    flex: 1;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    border: none;
    outline: none;
  }

  .dialog-btn:hover {
    transform: translateY(-2px);
  }

  .btn-cancel {
    background: transparent;
    color: #6b4421;
    border: 2px solid #d9d0c5;
  }

  .btn-cancel:hover {
    background: #f5ede1;
    border-color: #6b4421;
  }

  .btn-confirm-danger {
    background: #ff4d4f;
    color: #fff;
    box-shadow: 0 4px 16px rgba(255, 77, 79, 0.3);
  }

  .btn-confirm-danger:hover {
    background: #e8444a;
    box-shadow: 0 6px 20px rgba(255, 77, 79, 0.4);
  }

  .btn-confirm-primary {
    background: #f5c547;
    color: #3b1701;
    box-shadow: 0 4px 16px rgba(245, 197, 71, 0.3);
  }

  .btn-confirm-primary:hover {
    background: #e6b53e;
    box-shadow: 0 6px 20px rgba(245, 197, 71, 0.4);
  }

  /* Static variants display */
  .variants {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
  }

  .variant-card {
    background: #ffffff;
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
    padding: 32px;
    box-shadow: 0 2px 12px rgba(59, 23, 1, 0.06);
    text-align: center;
  }

  .variant-label {
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 20px;
  }

  .label-danger { background: #ff4d4f; }
  .label-normal { background: #f5c547; color: #3b1701; }
</style>
</head>
<body>

  <span class="section-label">Interactive Demo</span>

  <div class="trigger-group">
    <button class="trigger-btn trigger-danger" onclick="openModal('danger')">
      点击删除（危险操作）
    </button>
    <button class="trigger-btn trigger-normal" onclick="openModal('normal')">
      点击确认（普通操作）
    </button>
  </div>

  <!-- Danger Modal -->
  <div class="modal-overlay" id="modal-danger" onclick="closeModal('danger', event)">
    <div class="dialog" onclick="event.stopPropagation()">
      <div class="dialog-icon">&#9888;&#65039;</div>
      <h2 class="dialog-title">确认删除？</h2>
      <p class="dialog-desc">删除后将无法恢复，确认继续？</p>
      <div class="dialog-actions">
        <button class="dialog-btn btn-cancel" onclick="closeModal('danger')">取消</button>
        <button class="dialog-btn btn-confirm-danger" onclick="closeModal('danger')">确认删除</button>
      </div>
    </div>
  </div>

  <!-- Normal Modal -->
  <div class="modal-overlay" id="modal-normal" onclick="closeModal('normal', event)">
    <div class="dialog" onclick="event.stopPropagation()">
      <div class="dialog-icon">&#128172;</div>
      <h2 class="dialog-title">确认提交？</h2>
      <p class="dialog-desc">提交后内容将对老师可见，确认继续？</p>
      <div class="dialog-actions">
        <button class="dialog-btn btn-cancel" onclick="closeModal('normal')">取消</button>
        <button class="dialog-btn btn-confirm-primary" onclick="closeModal('normal')">确认提交</button>
      </div>
    </div>
  </div>

  <span class="section-label">Static Variants</span>

  <div class="variants">
    <!-- Danger variant static -->
    <div class="variant-card">
      <span class="variant-label label-danger">危险操作</span>
      <div class="dialog-icon">&#9888;&#65039;</div>
      <h2 class="dialog-title">确认删除？</h2>
      <p class="dialog-desc">删除后将无法恢复，确认继续？</p>
      <div class="dialog-actions">
        <button class="dialog-btn btn-cancel">取消</button>
        <button class="dialog-btn btn-confirm-danger">确认删除</button>
      </div>
    </div>

    <!-- Normal variant static -->
    <div class="variant-card">
      <span class="variant-label label-normal">普通操作</span>
      <div class="dialog-icon">&#128172;</div>
      <h2 class="dialog-title">确认提交？</h2>
      <p class="dialog-desc">提交后内容将对老师可见，确认继续？</p>
      <div class="dialog-actions">
        <button class="dialog-btn btn-cancel">取消</button>
        <button class="dialog-btn btn-confirm-primary">确认提交</button>
      </div>
    </div>
  </div>

  <script>
    function openModal(type) {
      document.getElementById('modal-' + type).classList.add('active');
    }
    function closeModal(type, event) {
      if (event && event.target !== event.currentTarget) return;
      document.getElementById('modal-' + type).classList.remove('active');
    }
  </script>
</body>
</html>

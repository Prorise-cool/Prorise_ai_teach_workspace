<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 空状态</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif;
    background: #f5ede1;
    color: #3b1701;
    min-height: 100vh;
    padding: 60px 20px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .page-header h1 {
    font-size: 36px;
    font-weight: 700;
    color: #3b1701;
    margin-bottom: 8px;
  }

  .page-header p {
    font-size: 16px;
    color: #6b4421;
  }

  .cards-container {
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .empty-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(59, 23, 1, 0.06);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .empty-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(59, 23, 1, 0.1);
  }

  .empty-icon {
    font-size: 56px;
    margin-bottom: 20px;
    display: block;
    animation: gentleBounce 3s ease-in-out infinite;
  }

  .empty-card:nth-child(2) .empty-icon {
    animation-delay: 0.5s;
  }

  .empty-card:nth-child(3) .empty-icon {
    animation-delay: 1s;
  }

  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .empty-title {
    font-size: 24px;
    font-weight: 600;
    color: #3b1701;
    margin-bottom: 8px;
  }

  .empty-desc {
    font-size: 16px;
    color: #6b4421;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s ease;
    border: none;
    outline: none;
  }

  .btn-primary {
    background: #f5c547;
    color: #3b1701;
    box-shadow: 0 4px 16px rgba(245, 197, 71, 0.3);
  }

  .btn-primary:hover {
    background: #e6b53e;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(245, 197, 71, 0.4);
  }

  .text-link {
    color: #f5c547;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .text-link:hover {
    border-bottom-color: #f5c547;
  }

  .card-label {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: #6b4421;
    background: #f5ede1;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <header class="page-header">
    <h1>空状态展示</h1>
    <p>三种常见空状态场景</p>
  </header>

  <div class="cards-container">
    <!-- Empty: History -->
    <div class="empty-card">
      <span class="card-label">历史记录</span>
      <span class="empty-icon">&#128218;</span>
      <h2 class="empty-title">还没有学习记录</h2>
      <p class="empty-desc">开始你的第一堂课，学习记录将在这里显示</p>
      <a href="#" class="btn btn-primary">开始学习</a>
    </div>

    <!-- Empty: Favorites -->
    <div class="empty-card">
      <span class="card-label">收藏夹</span>
      <span class="empty-icon">&#11088;</span>
      <h2 class="empty-title">还没有收藏内容</h2>
      <p class="empty-desc">遇到喜欢的内容，点击收藏随时回顾</p>
      <a href="#" class="btn btn-primary">去收藏</a>
    </div>

    <!-- Empty: Search Results -->
    <div class="empty-card">
      <span class="card-label">搜索结果</span>
      <span class="empty-icon">&#128270;</span>
      <h2 class="empty-title">没有找到相关内容</h2>
      <p class="empty-desc">当前关键词未匹配到结果</p>
      <a href="#" class="text-link">试试其他关键词</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小麦 - 网络错误</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif;
    background: #f5ede1;
    color: #3b1701;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .error-container {
    text-align: center;
    max-width: 520px;
    padding: 40px;
  }

  /* CSS WiFi disconnected icon */
  .wifi-icon {
    position: relative;
    width: 100px;
    height: 80px;
    margin: 0 auto 32px;
  }

  .wifi-arc {
    position: absolute;
    border: 4px solid #f5c547;
    border-color: #f5c547 transparent transparent transparent;
    border-radius: 50%;
    left: 50%;
    bottom: 10px;
  }

  .wifi-arc-1 {
    width: 90px;
    height: 90px;
    margin-left: -45px;
    opacity: 0.3;
    animation: wifiPulse 2s ease-in-out infinite;
  }

  .wifi-arc-2 {
    width: 60px;
    height: 60px;
    margin-left: -30px;
    opacity: 0.3;
    animation: wifiPulse 2s ease-in-out 0.3s infinite;
  }

  .wifi-arc-3 {
    width: 30px;
    height: 30px;
    margin-left: -15px;
    opacity: 0.3;
    animation: wifiPulse 2s ease-in-out 0.6s infinite;
  }

  .wifi-dot {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #f5c547;
    border-radius: 50%;
    bottom: 6px;
    left: 50%;
    margin-left: -5px;
    opacity: 0.5;
  }

  /* Disconnected slash */
  .wifi-slash {
    position: absolute;
    width: 4px;
    height: 100px;
    background: #ff4d4f;
    left: 50%;
    margin-left: -2px;
    bottom: 0;
    transform: rotate(-45deg);
    transform-origin: bottom center;
    border-radius: 2px;
  }

  @keyframes wifiPulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  .signal-icon {
    font-size: 64px;
    margin-bottom: 24px;
  }

  .error-title {
    font-size: 36px;
    font-weight: 700;
    color: #3b1701;
    margin-bottom: 12px;
  }

  .error-desc {
    font-size: 16px;
    color: #6b4421;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .btn-group {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s ease;
    border: none;
    outline: none;
  }

  .btn-primary {
    background: #f5c547;
    color: #3b1701;
    box-shadow: 0 4px 16px rgba(245, 197, 71, 0.3);
  }

  .btn-primary:hover {
    background: #e6b53e;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(245, 197, 71, 0.4);
  }

  .btn-primary:hover .retry-icon {
    animation: spin 0.6s ease;
  }

  .retry-icon {
    display: inline-block;
    font-size: 18px;
    transition: transform 0.3s;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .btn-outline {
    background: transparent;
    color: #3b1701;
    border: 2px solid #3b1701;
  }

  .btn-outline:hover {
    background: #3b1701;
    color: #f5ede1;
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="error-container">
    <div class="wifi-icon">
      <div class="wifi-arc wifi-arc-1"></div>
      <div class="wifi-arc wifi-arc-2"></div>
      <div class="wifi-arc wifi-arc-3"></div>
      <div class="wifi-dot"></div>
      <div class="wifi-slash"></div>
    </div>
    <h1 class="error-title">网络连接失败</h1>
    <p class="error-desc">请检查你的网络连接后重试</p>
    <div class="btn-group">
      <a href="javascript:location.reload()" class="btn btn-primary">
        <span class="retry-icon">&#8635;</span>
        重试
      </a>
      <a href="#" class="btn btn-outline">离线模式</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh" class="light">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>小麦 XiaoMai - 视频生成 (异形微调版)</title>

	<!-- 引入 Google Fonts 提升字体质感 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
		rel="stylesheet">

	<!-- 引入 Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>
	<!-- 引入 Lucide 图标库 -->
	<script src="https://unpkg.com/lucide@latest"></script>

	<!-- 严格配置 Tailwind 以使用小麦设计系统 Tokens -->
	<script>
		tailwind.config = {
			darkMode: "class",
			theme: {
				extend: {
					colors: {
						brand: { DEFAULT: '#f5c547', dark: '#e6b841' },
						secondary: { DEFAULT: '#f5ede1', dark: '#2a2420' },
						decorative: '#3b1701',
						bg: { light: '#f5ede1', dark: '#110e0d' },
						surface: { light: '#ffffff', dark: '#1f1a18' },
						text: {
							primary: '#3b1701', 'primary-dark': '#f5ede1',
							secondary: '#6b4421', 'secondary-dark': '#a89f91'
						},
						bordercolor: { light: '#e6dcc8', dark: '#302824' },
					},
					fontFamily: {
						sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
					},
					boxShadow: {
						'sm': '0 2px 8px rgba(0, 0, 0, 0.04)',
						'md': '0 8px 24px rgba(0, 0, 0, 0.08)',
						'lg': '0 20px 40px -8px rgba(0, 0, 0, 0.12)',
						'xl': '0 32px 64px -12px rgba(0, 0, 0, 0.16)',
					}
				}
			}
		}
	</script>

	<style>
		/* ================= 基础主题与平滑过渡 ================= */
		html.light {
			background-color: #f5ede1;
			color: #3b1701;
		}

		html.dark {
			background-color: #110e0d;
			color: #f5ede1;
		}

		body {
			transition: background-color 0.4s ease, color 0.4s ease;
			-webkit-font-smoothing: antialiased;
		}

		/* 高级背景修饰 */
		.bg-grid-pattern {
			background-image:
				linear-gradient(to right, rgba(59, 23, 1, 0.03) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(59, 23, 1, 0.03) 1px, transparent 1px);
			background-size: 40px 40px;
			mask-image: radial-gradient(ellipse at top, black 40%, transparent 90%);
			-webkit-mask-image: radial-gradient(ellipse at top, black 40%, transparent 90%);
		}

		html.dark .bg-grid-pattern {
			background-image:
				linear-gradient(to right, rgba(245, 237, 225, 0.02) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(245, 237, 225, 0.02) 1px, transparent 1px);
		}

		.no-scrollbar::-webkit-scrollbar {
			display: none;
		}

		.no-scrollbar {
			-ms-overflow-style: none;
			scrollbar-width: none;
		}

		/* ================= 核心动画体系 ================= */
		.jelly-transition {
			transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
		}

		.fade-transition {
			transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

		/* 弹窗面板 */
		.dynamic-panel-hidden {
			opacity: 0;
			transform: scale(0.95) translateY(10px);
			pointer-events: none;
			position: absolute;
			z-index: 50;
		}

		.dynamic-panel-visible {
			opacity: 1;
			transform: scale(1) translateY(0);
			pointer-events: auto;
			position: absolute;
			z-index: 50;
		}

		@keyframes fadeSlideUp {
			from {
				opacity: 0;
				transform: translateY(15px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.card-enter {
			animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
			opacity: 0;
		}

		.hover-card-soft {
			transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
		}

		.hover-card-soft:hover {
			border-color: var(--tw-border-opacity);
			box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
			transform: translateY(-2px);
		}

		/* 语音波形动画 */
		@keyframes audio-bounce {

			0%,
			100% {
				transform: scaleY(0.3);
			}

			50% {
				transform: scaleY(1);
			}
		}

		.animate-audio-bar-1 {
			animation: audio-bounce 1s ease-in-out infinite;
			animation-delay: 0s;
		}

		.animate-audio-bar-2 {
			animation: audio-bounce 1s ease-in-out infinite;
			animation-delay: 0.2s;
		}

		.animate-audio-bar-3 {
			animation: audio-bounce 1s ease-in-out infinite;
			animation-delay: 0.4s;
		}

		/* Modal 层样式 */
		.modal-backdrop {
			backdrop-filter: blur(4px);
			-webkit-backdrop-filter: blur(4px);
		}

		/* 瀑布流 */
		.waterfall-container {
			column-count: 1;
			column-gap: 1.5rem;
		}

		@media (min-width: 640px) {
			.waterfall-container {
				column-count: 2;
			}
		}

		@media (min-width: 1024px) {
			.waterfall-container {
				column-count: 3;
			}
		}

		.waterfall-item {
			break-inside: avoid;
			margin-bottom: 1.5rem;
			display: inline-block;
			width: 100%;
		}
	</style>
</head>

<body
	class="min-h-screen flex flex-col relative overflow-y-auto selection:bg-brand/30 selection:text-text-primary overflow-x-hidden">

	<!-- 背景层 -->
	<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
		<div class="absolute inset-0 bg-grid-pattern opacity-100"></div>
		<div
			class="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[80vw] max-w-[1200px] h-[400px] rounded-[100%] bg-brand/15 dark:bg-brand/5 blur-[120px] mix-blend-multiply dark:mix-blend-screen transition-colors duration-500">
		</div>
	</div>

	<!-- 顶部导航 -->
	<header
		class="w-[94%] max-w-7xl mx-auto mt-6 sticky top-6 z-40 rounded-full flex justify-between items-center p-3 px-4 bg-surface-light/80 dark:bg-surface-dark/80 backdrop-blur-xl border border-bordercolor-light dark:border-bordercolor-dark shadow-sm">
		<a href="#" class="font-bold text-lg flex items-center gap-3">
			<div
				class="w-8 h-8 bg-text-primary dark:bg-text-primary-dark rounded-md flex items-center justify-center shadow-sm">
				<i data-lucide="leaf" class="w-4 h-4 text-bg-light dark:text-bg-dark"></i>
			</div>
			<span class="tracking-tight text-text-primary dark:text-text-primary-dark hidden sm:block">XiaoMai</span>
		</a>
		<button id="themeToggle"
			class="p-2 rounded-full border border-bordercolor-light dark:border-bordercolor-dark text-text-secondary dark:text-text-secondary-dark hover:bg-surface-light dark:hover:bg-surface-dark fade-transition">
			<i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
			<i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
		</button>
	</header>

	<main
		class="flex-1 w-full max-w-4xl mx-auto flex flex-col items-center justify-start px-4 pt-[8vh] pb-12 relative z-20">

		<!-- 标题区域 -->
		<div class="text-center mb-8 card-enter">
			<span
				class="inline-flex items-center gap-1.5 px-3 py-1 text-[11px] font-black rounded-full border border-bordercolor-light dark:border-bordercolor-dark bg-surface-light dark:bg-surface-dark text-text-secondary dark:text-text-secondary-dark shadow-sm uppercase tracking-widest mb-3">
				<i data-lucide="sparkles" class="w-3.5 h-3.5 text-brand-dark dark:text-brand"></i> 视频讲解引擎
			</span>
			<h1
				class="text-[32px] md:text-[42px] font-black tracking-tight leading-tight text-text-primary dark:text-text-primary-dark">
				输入知识点，即刻生成<br class="md:hidden" />
				<span class="bg-gradient-to-r from-[#e6b841] to-[#ff8c00] bg-clip-text text-transparent">全编排解说视频</span>
			</h1>
		</div>

		<!-- ================= 核心输入结构 ================= -->
		<div class="w-full max-w-[800px] flex flex-col card-enter" style="animation-delay: 0.1s;">

			<!-- 异形耳朵 (天然 Flex 布局，精确对齐卡片内部 p-6 的 24px 左边距) -->
			<div class="flex ml-6 w-full relative z-30">
				<button onclick="openParamModal()"
					class="group flex items-center gap-2 px-5 pt-3 pb-2.5 bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark border-b-0 rounded-t-2xl fade-transition -mb-[1px]">
					<i data-lucide="sliders-horizontal"
						class="w-3.5 h-3.5 text-brand-dark dark:text-brand transition-transform duration-300 group-hover:rotate-90"></i>
					<span
						class="text-[12px] font-bold text-text-primary dark:text-text-primary-dark group-hover:opacity-80 fade-transition"
						id="paramSummaryText">均衡 · 3分钟 · 1080P</span>
					<i data-lucide="chevron-down"
						class="w-3.5 h-3.5 text-text-secondary/60 transition-transform duration-300 group-hover:translate-y-[2px]"></i>
				</button>
			</div>

			<!-- 主卡片 -->
			<div
				class="relative w-full rounded-3xl border border-bordercolor-light dark:border-bordercolor-dark bg-surface-light dark:bg-surface-dark shadow-lg transition-shadow duration-300 flex flex-col z-20">

				<!-- 顶栏：系统状态提示 -->
				<div
					class="flex items-center justify-between px-5 py-3 border-b border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] rounded-t-3xl">
					<div class="flex items-center gap-2.5">
						<div
							class="w-6 h-6 rounded-full bg-brand/20 dark:bg-brand/10 flex items-center justify-center border border-brand/30">
							<i data-lucide="wand-2" class="w-3.5 h-3.5 text-[#b07d00] dark:text-brand"></i>
						</div>
						<span
							class="text-[12px] font-bold text-text-primary dark:text-text-primary-dark">智能多智能体编导就绪</span>
					</div>
					<span
						class="text-[11px] font-bold text-text-secondary dark:text-text-secondary-dark flex items-center gap-1">
						<i data-lucide="layers" class="w-3 h-3"></i> 自动关联视觉素材
					</span>
				</div>

				<!-- 极度纯粹的文本输入区 -->
				<div class="p-6 pb-2 flex-1 relative flex flex-col gap-2">
					<textarea id="mainInput"
						placeholder="你想将什么内容转化为视频？&#10;&#10;例如：&#10;「结合动画，生动解释一下量子纠缠的原理」&#10;「用3分钟梳理第二次工业革命的标志性发明与影响」"
						class="w-full resize-none border-0 bg-transparent text-[14px] leading-relaxed placeholder:text-text-secondary/40 dark:placeholder:text-text-secondary-dark/40 text-text-primary dark:text-text-primary-dark font-medium focus:ring-0 focus:outline-none min-h-[110px]"
						rows="4"></textarea>

					<!-- 字数统计 (归位至最不起眼的右下角) -->
					<div class="flex justify-end mt-1">
						<span
							class="text-[11px] font-bold text-text-secondary/40 dark:text-text-secondary-dark/40 tabular-nums"
							id="charCount">0/2000</span>
					</div>
				</div>

				<!-- 底部：工具栏 & 提交按钮 -->
				<div
					class="px-4 md:px-5 py-4 border-t border-bordercolor-light dark:border-bordercolor-dark flex items-center justify-between bg-surface-light dark:bg-surface-dark rounded-b-3xl relative z-20">
					<div class="flex items-center gap-1.5 md:gap-2 relative">

						<!-- 图片上传 -->
						<button
							class="w-9 h-9 md:w-10 md:h-10 rounded-xl border border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] flex items-center justify-center text-text-secondary hover:text-text-primary dark:text-text-secondary-dark dark:hover:text-text-primary-dark fade-transition shadow-sm shrink-0"
							title="上传参考图">
							<i data-lucide="image" class="w-4 md:w-4.5 h-4 md:h-4.5"></i>
						</button>

						<!-- 语音输入：果冻展开动画 -->
						<button id="btnVoice"
							class="h-9 w-9 md:h-10 md:w-10 rounded-xl border border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] flex items-center justify-center text-text-secondary hover:text-text-primary dark:text-text-secondary-dark dark:hover:text-text-primary-dark jelly-transition shadow-sm relative overflow-hidden shrink-0"
							onclick="toggleVoice()">
							<i data-lucide="mic" class="w-4 md:w-4.5 h-4 md:h-4.5 absolute transition-all duration-300"
								id="iconMic"></i>
							<!-- 录音波形 (默认透明/隐藏) -->
							<div id="animMic"
								class="absolute flex items-center justify-center gap-1 opacity-0 scale-50 transition-all duration-300">
								<span
									class="h-2 w-[2px] md:w-[3px] rounded-full bg-brand-dark animate-audio-bar-1"></span>
								<span
									class="h-3 md:h-4 w-[2px] md:w-[3px] rounded-full bg-brand-dark animate-audio-bar-2"></span>
								<span
									class="h-2 md:h-3 w-[2px] md:w-[3px] rounded-full bg-brand-dark animate-audio-bar-3"></span>
								<span
									class="text-[11px] md:text-[12px] font-bold text-brand-dark ml-1 whitespace-nowrap">聆听中...</span>
							</div>
						</button>

						<!-- 去除了原本底部多余的预设按钮、高级参数按钮及其弹出的菜单，全部收归至顶部异形标签 -->
					</div>

					<!-- 生成视频大按钮：缩减体积，修改为精致的胶囊型，替换 Icon 为单纯的向右箭头 -->
					<button
						class="flex items-center gap-2 px-5 h-9 rounded-full bg-text-primary dark:bg-text-primary-dark text-bg-light dark:text-bg-dark font-bold shadow-[0_4px_12px_rgba(59,23,1,0.15)] fade-transition hover:scale-105 active:scale-95 text-[13px] shrink-0">
						<span>生成视频</span>
						<i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
					</button>
				</div>
			</div>
		</div>

		<!-- 灵感快捷指令 -->
		<div class="flex flex-wrap justify-center items-center gap-3 mt-8 card-enter" style="animation-delay: 0.2s;">
			<span
				class="text-[11px] font-black uppercase tracking-widest text-text-secondary dark:text-text-secondary-dark mr-1">Try
				These</span>
			<button
				class="px-4 py-2 rounded-full border border-bordercolor-light dark:border-bordercolor-dark bg-surface-light dark:bg-surface-dark text-[12px] font-bold text-text-primary dark:text-text-primary-dark hover:border-brand hover:bg-secondary dark:hover:bg-[#1a1614] fade-transition shadow-sm flex items-center gap-1.5"
				onclick="fillInput('用动画图解形式，生动解释二分查找算法的原理和时间复杂度。')">
				<i data-lucide="lightbulb" class="w-3.5 h-3.5 text-brand-dark dark:text-brand"></i> 二分查找算法
			</button>
			<button
				class="px-4 py-2 rounded-full border border-bordercolor-light dark:border-bordercolor-dark bg-surface-light dark:bg-surface-dark text-[12px] font-bold text-text-primary dark:text-text-primary-dark hover:border-brand hover:bg-secondary dark:hover:bg-[#1a1614] fade-transition shadow-sm flex items-center gap-1.5"
				onclick="fillInput('结合历史背景，用3分钟评述第二次工业革命的核心突破。')">
				<i data-lucide="history" class="w-3.5 h-3.5 text-brand-dark dark:text-brand"></i> 工业革命评述
			</button>
		</div>
	</main>

	<!-- ================= 独立的高级参数 Modal 弹窗 (整合所有配置) ================= -->
	<div id="paramModal"
		class="fixed inset-0 z-50 bg-black/20 dark:bg-black/40 modal-backdrop flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
		<div id="paramModalContent"
			class="w-full max-w-[420px] bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark rounded-3xl shadow-[0_32px_64px_-12px_rgba(0,0,0,0.2)] transform scale-95 translate-y-4 transition-all duration-400 cubic-bezier(0.34, 1.56, 0.64, 1) overflow-hidden flex flex-col">
			<!-- Modal 头部 -->
			<div
				class="flex items-center justify-between px-6 py-4 border-b border-bordercolor-light/50 dark:border-bordercolor-dark/50 bg-secondary/30 dark:bg-[#1a1614]/30">
				<h3 class="text-[14px] font-bold text-text-primary dark:text-text-primary-dark flex items-center gap-2">
					<i data-lucide="sliders-horizontal" class="w-4 h-4 text-brand-dark dark:text-brand"></i> 生成参数配置
				</h3>
				<button onclick="closeParamModal()"
					class="w-7 h-7 rounded-full bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark shadow-sm flex items-center justify-center text-text-secondary hover:text-text-primary hover:scale-105 active:scale-95 fade-transition">
					<i data-lucide="x" class="w-3.5 h-3.5"></i>
				</button>
			</div>

			<!-- Modal 内容 -->
			<div class="p-6 flex flex-col gap-5">
				<!-- 快捷预设区域 -->
				<div class="flex flex-col gap-2">
					<label
						class="text-[11px] font-black text-text-secondary dark:text-text-secondary-dark uppercase tracking-widest mb-1">快捷预设</label>
					<div
						class="grid grid-cols-3 gap-2 bg-secondary dark:bg-[#1a1614] p-1 rounded-xl border border-bordercolor-light dark:border-bordercolor-dark">
						<button
							class="py-2 rounded-lg text-[12px] font-bold text-text-secondary hover:text-text-primary fade-transition"
							onclick="applyPresetToModal(this, '急速', 1, 3, '720P')">急速</button>
						<button
							class="py-2 rounded-lg bg-surface-light dark:bg-surface-dark text-[12px] font-bold text-text-primary dark:text-text-primary-dark shadow-sm border border-bordercolor-light/50 dark:border-bordercolor-dark/50"
							onclick="applyPresetToModal(this, '均衡', 3, 6, '1080P')">均衡</button>
						<button
							class="py-2 rounded-lg text-[12px] font-bold text-text-secondary hover:text-text-primary fade-transition"
							onclick="applyPresetToModal(this, '电影级', 5, 10, '4K')">电影级</button>
					</div>
				</div>

				<div class="w-full h-px bg-bordercolor-light/50 dark:bg-bordercolor-dark/50"></div>

				<!-- 手动参数区域 -->
				<div class="grid grid-cols-2 gap-4">
					<div class="flex flex-col gap-1.5">
						<label
							class="text-[11px] font-bold text-text-secondary dark:text-text-secondary-dark uppercase tracking-widest">目标时长
							(分钟)</label>
						<input type="number" id="modalTime" value="3"
							class="w-full bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark rounded-lg px-3 py-2 text-sm font-bold text-text-primary dark:text-text-primary-dark focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 fade-transition">
					</div>
					<div class="flex flex-col gap-1.5">
						<label
							class="text-[11px] font-bold text-text-secondary dark:text-text-secondary-dark uppercase tracking-widest">分镜章节数</label>
						<input type="number" id="modalSection" value="6"
							class="w-full bg-surface-light dark:bg-surface-dark border border-bordercolor-light dark:border-bordercolor-dark rounded-lg px-3 py-2 text-sm font-bold text-text-primary dark:text-text-primary-dark focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 fade-transition">
					</div>
					<div class="col-span-2 flex flex-col gap-1.5">
						<label
							class="text-[11px] font-bold text-text-secondary dark:text-text-secondary-dark uppercase tracking-widest">渲染质量</label>
						<div class="flex gap-2">
							<button
								class="flex-1 py-1.5 rounded-lg border border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] text-[12px] font-bold text-text-secondary hover:text-text-primary fade-transition"
								onclick="selectModalQuality(this, '720P')">720P</button>
							<button
								class="flex-1 py-1.5 rounded-lg border border-brand/50 bg-brand/10 text-[12px] font-bold text-text-primary dark:text-text-primary-dark shadow-sm"
								onclick="selectModalQuality(this, '1080P')">1080P</button>
							<button
								class="flex-1 py-1.5 rounded-lg border border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] text-[12px] font-bold text-text-secondary hover:text-text-primary fade-transition"
								onclick="selectModalQuality(this, '4K')">4K</button>
						</div>
					</div>
				</div>
			</div>

			<!-- Modal 底部 -->
			<div
				class="px-6 py-4 bg-secondary/30 dark:bg-[#1a1614]/30 border-t border-bordercolor-light/50 dark:border-bordercolor-dark/50 flex justify-end">
				<button onclick="saveModalParams()"
					class="px-6 py-2 bg-text-primary dark:bg-text-primary-dark text-bg-light dark:text-bg-dark text-[13px] font-bold rounded-full hover:scale-105 active:scale-95 fade-transition shadow-[0_4px_12px_rgba(59,23,1,0.15)]">
					完成配置
				</button>
			</div>
		</div>
	</div>

	<!-- 瀑布流社区案例 -->
	<section class="w-full max-w-6xl mx-auto px-6 pb-24 relative z-10 card-enter" style="animation-delay: 0.3s;">
		<div
			class="flex flex-col md:flex-row justify-between items-end mb-8 border-b border-bordercolor-light dark:border-bordercolor-dark pb-4">
			<div>
				<h2 class="text-[24px] font-black mb-1 text-text-primary dark:text-text-primary-dark tracking-tight">
					发现优质创作</h2>
				<p class="text-[13px] font-medium text-text-secondary dark:text-text-secondary-dark">复用参数，一键生成同款排版风格</p>
			</div>
			<div class="flex gap-4 text-sm font-bold mt-4 md:mt-0">
				<button
					class="border-b-[3px] border-text-primary dark:border-text-primary-dark text-text-primary dark:text-text-primary-dark pb-1">推荐精选</button>
				<button
					class="text-text-secondary dark:text-text-secondary-dark hover:text-text-primary dark:hover:text-text-primary-dark pb-1 fade-transition">知识科普</button>
			</div>
		</div>
		<div id="feedContainer" class="waterfall-container">
			<!-- 卡片由 JS 注入 -->
		</div>
	</section>

	<script>
		lucide.createIcons();

		// ================= 主题切换 =================
		const themeToggle = document.getElementById('themeToggle');
		const html = document.documentElement;
		themeToggle.addEventListener('click', () => {
			html.classList.toggle('dark');
			html.classList.toggle('light');
		});

		// ================= 灵动岛：麦克风动效 =================
		let isRecording = false;
		const btnVoice = document.getElementById('btnVoice');
		const iconMic = document.getElementById('iconMic');
		const animMic = document.getElementById('animMic');

		function toggleVoice() {
			isRecording = !isRecording;
			// 响应式判断宽度
			const isMobile = window.innerWidth < 640;
			const expandedWidth = isMobile ? 'w-24' : 'w-[104px]'; // 展开时稍微长一点点给文字留空间
			const baseWidth = isMobile ? 'w-9' : 'w-10';

			if (isRecording) {
				btnVoice.classList.remove(baseWidth, 'bg-secondary', 'dark:bg-[#1a1614]');
				btnVoice.classList.add(expandedWidth, 'bg-brand/10', 'border-brand/30', 'ring-2', 'ring-brand/20', 'shadow-[0_0_12px_rgba(245,197,71,0.3)]');
				iconMic.classList.add('opacity-0', 'scale-50');

				setTimeout(() => {
					iconMic.classList.add('hidden');
					animMic.classList.remove('opacity-0', 'scale-50');
					animMic.classList.add('opacity-100', 'scale-100');
				}, 150);
			} else {
				btnVoice.classList.add(baseWidth, 'bg-secondary', 'dark:bg-[#1a1614]');
				btnVoice.classList.remove(expandedWidth, 'bg-brand/10', 'border-brand/30', 'ring-2', 'ring-brand/20', 'shadow-[0_0_12px_rgba(245,197,71,0.3)]');

				animMic.classList.remove('opacity-100', 'scale-100');
				animMic.classList.add('opacity-0', 'scale-50');

				setTimeout(() => {
					iconMic.classList.remove('hidden');
					void iconMic.offsetWidth;
					iconMic.classList.remove('opacity-0', 'scale-50');
				}, 150);
			}
		}

		// 移除了多余的浮层预设 (Preset Panel) 相关逻辑

		// ================= 弹窗：一体化参数 Modal (果冻展开) =================
		const paramModal = document.getElementById('paramModal');
		const paramModalContent = document.getElementById('paramModalContent');
		let currentModalQuality = '1080P';
		let currentPresetName = '均衡';

		function openParamModal() {
			paramModal.classList.remove('opacity-0', 'pointer-events-none');
			// 给弹窗内容应用优雅的恢复缩放
			paramModalContent.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
			paramModalContent.classList.remove('scale-95', 'translate-y-4');
		}

		function closeParamModal() {
			paramModal.classList.add('opacity-0', 'pointer-events-none');
			paramModalContent.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
			paramModalContent.classList.add('scale-95', 'translate-y-4');
		}

		paramModal.addEventListener('click', (e) => {
			if (e.target === paramModal) closeParamModal();
		});

		// 联动更新数值
		function applyPresetToModal(btn, name, time, section, quality) {
			currentPresetName = name;
			document.getElementById('modalTime').value = time;
			document.getElementById('modalSection').value = section;

			// 切换预设按钮样式
			const siblings = btn.parentElement.querySelectorAll('button');
			siblings.forEach(b => {
				b.className = 'py-2 rounded-lg text-[12px] font-bold text-text-secondary hover:text-text-primary fade-transition';
			});
			btn.className = 'py-2 rounded-lg bg-surface-light dark:bg-surface-dark text-[12px] font-bold text-text-primary dark:text-text-primary-dark shadow-sm border border-bordercolor-light/50 dark:border-bordercolor-dark/50';

			// 联动切换质量按钮样式
			const qualityContainer = document.querySelectorAll('.col-span-2 .flex.gap-2 button');
			qualityContainer.forEach(b => {
				if (b.innerText === quality) {
					selectModalQuality(b, quality);
				}
			});
		}

		function selectModalQuality(btn, quality) {
			currentModalQuality = quality;
			currentPresetName = '自定义'; // 一旦手动改了质量，预设名变为自定义
			const siblings = btn.parentElement.querySelectorAll('button');
			siblings.forEach(b => {
				b.className = 'flex-1 py-1.5 rounded-lg border border-bordercolor-light dark:border-bordercolor-dark bg-secondary dark:bg-[#1a1614] text-[12px] font-bold text-text-secondary hover:text-text-primary fade-transition';
			});
			btn.className = 'flex-1 py-1.5 rounded-lg border border-brand/50 bg-brand/10 text-[12px] font-bold text-text-primary dark:text-text-primary-dark shadow-sm';
		}

		function saveModalParams() {
			const time = document.getElementById('modalTime').value;
			document.getElementById('paramSummaryText').innerText = `${currentPresetName} · ${time}分钟 · ${currentModalQuality}`;
			closeParamModal();
		}

		// ================= 字数与快捷填入 =================
		const mainInput = document.getElementById('mainInput');
		const charCount = document.getElementById('charCount');

		mainInput.addEventListener('input', () => {
			charCount.innerText = `${mainInput.value.length}/2000`;
		});

		function fillInput(text) {
			mainInput.value = text;
			charCount.innerText = `${text.length}/2000`;
			mainInput.parentElement.classList.add('bg-brand/5');
			setTimeout(() => { mainInput.parentElement.classList.remove('bg-brand/5'); }, 300);
		}

		// ================= 瀑布流渲染 =================
		const feedContainer = document.getElementById('feedContainer');
		const mockTemplates = [
			{ title: "三分钟带你理解黑洞视界", tag: "天体物理", likes: "1.2k 看过", aspect: "aspect-video" },
			{ title: "React Hooks 底层实现原理图解", tag: "前端开发", likes: "856 看过", aspect: "aspect-[3/4]" },
			{ title: "通货膨胀对个人资产的真实影响", tag: "经济学", likes: "2.3k 看过", aspect: "aspect-[4/3]" },
			{ title: "达芬奇密码中的艺术史彩蛋", tag: "人文艺术", likes: "3.1k 看过", aspect: "aspect-[21/9]" }
		];

		function generateCardHTML(index) {
			const tpl = mockTemplates[index % mockTemplates.length];
			const imgUrl = `https://picsum.photos/seed/${Math.random()}/600/400`;
			const delay = (index % 4) * 100;

			return `
                <div class="waterfall-item card-enter" style="animation-delay: ${delay}ms">
                    <div class="bg-surface-light dark:bg-surface-dark rounded-2xl border border-bordercolor-light dark:border-bordercolor-dark overflow-hidden hover-card-soft shadow-sm flex flex-col group">
                        <div class="w-full ${tpl.aspect} bg-secondary dark:bg-[#1a1614] relative flex flex-col items-center justify-center overflow-hidden border-b border-bordercolor-light dark:border-bordercolor-dark">
                            <img src="${imgUrl}" alt="Cover" class="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-luminosity transition-transform duration-500 group-hover:scale-105">
                            
                            <div class="absolute top-2 right-2 px-2 py-1 rounded bg-black/60 text-white text-[10px] font-bold backdrop-blur-sm">03:45</div>
                            
                            <div class="w-12 h-12 bg-text-primary dark:bg-surface-dark border border-transparent dark:border-bordercolor-dark rounded-full flex items-center justify-center text-surface-light dark:text-text-primary-dark shadow-md z-10 transition-transform duration-300 group-hover:scale-110">
                                <i data-lucide="play" class="w-5 h-5 fill-current ml-0.5"></i>
                            </div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-black text-[15px] tracking-tight leading-snug mb-4 text-text-primary dark:text-text-primary-dark line-clamp-2">${tpl.title}</h3>
                            <div class="flex justify-between items-center pt-3 border-t border-bordercolor-light dark:border-bordercolor-dark">
                                <span class="text-[11px] font-bold bg-secondary dark:bg-[#1a1614] text-text-primary dark:text-text-primary-dark px-2 py-1 rounded-md">${tpl.tag}</span>
                                <button class="text-[11px] font-bold text-brand-dark dark:text-brand hover:underline flex items-center gap-1"><i data-lucide="copy" class="w-3 h-3"></i> 同款配置</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
		}

		let cardsHTML = '';
		for (let i = 0; i < 4; i++) { cardsHTML += generateCardHTML(i); }
		feedContainer.insertAdjacentHTML('beforeend', cardsHTML);
		lucide.createIcons();
	</script>
</body>

</html>

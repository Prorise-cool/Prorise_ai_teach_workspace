# student-fe 容器内 nginx 配置（挂根路径 /，反向代理由 1panel openresty 处理）
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 历史路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # mockServiceWorker.js 不缓存（防止旧 worker 残留）
    location = /mockServiceWorker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 静态资源缓存（带 hash 文件名）
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;
}

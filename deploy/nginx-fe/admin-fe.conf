# admin-fe 容器内 nginx 配置（仅做静态文件 server，反向代理由 1panel openresty 处理）
# dist 烘焙时 base = /admin/，浏览器请求带 /admin/ 前缀进入容器
server {
    listen 80 default_server;
    server_name _;

    # 容器内根路径 redirect 到 /admin/，方便健康检查 + 直接调试
    location = / {
        return 302 /admin/;
    }

    # 用 root + rewrite 剥 /admin/ 前缀，避免 alias 在嵌套正则 location 中失效的坑
    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（hash 文件名可长期缓存）
    location ~* ^/admin/.+\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        rewrite ^/admin/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;
}

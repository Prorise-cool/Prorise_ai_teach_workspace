# admin-fe 容器内 nginx 配置（仅做静态文件 server，反向代理由 1panel openresty 处理）
# dist 烘焙时 base = /admin/，浏览器请求带 /admin/ 前缀进入容器
server {
    listen 80 default_server;
    server_name _;

    # 容器内根路径 redirect 到 /admin/，方便健康检查 + 直接调试
    location = / {
        return 302 /admin/;
    }

    # /admin/* 映射到 dist；SPA 历史路由统一回 /admin/index.html
    # 注意：alias 与嵌套正则 location 配合时会失效（nginx 已知坑），
    # 因此不再写内层缓存 location；dist 文件名带 hash，浏览器默认缓存即可
    location /admin/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /admin/index.html;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    server_tokens off;
}

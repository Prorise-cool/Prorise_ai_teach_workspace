# ============================================================================
# Prorise AI Teach — 生产部署 docker-compose
# 用法（在仓库根目录执行）：
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env.prod up -d
# 公网入口由宿主 1panel 反代到下方暴露的 HOST_*_PORT
# ============================================================================

name: xm-prod

# ---- 网络 -------------------------------------------------------------------
# backend  : 仅内网，存储类不暴露公网（mysql / redis / edge-tts / monitor）
# edge     : bridge，含需对外暴露端口的应用层（fastapi / ruoyi-java / 前端）
# 两网相交的服务（fastapi/ruoyi）同时加入两网，作为唯一桥接
networks:
  backend:
    driver: bridge
    internal: true
  edge:
    driver: bridge
  # 复用服务器已有网络：edge-tts / prorise-llm-chat 都在这里
  # 新部署机若无此网络，先 docker network create prorise-internal
  prorise-internal:
    external: true

# ---- 卷 ---------------------------------------------------------------------
volumes:
  mysql-data:        # /var/lib/mysql
  redis-data:        # /data，AOF 持久化
  minio-data:        # /data，对象存储
  video-assets:      # FastAPI .runtime/video-assets/{assets,json_files}
  video-uploads:     # FastAPI /data/uploads/video（用户上传原图）
  fastapi-secrets:   # /app/.runtime/secrets
  ruoyi-admin-logs:
  ruoyi-monitor-logs:
  ruoyi-snailjob-logs:

# ---- 服务 -------------------------------------------------------------------
services:

  # === 基础设施层 ===========================================================

  mysql:
    image: mysql:8.0
    container_name: xm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: ${TZ}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_allowed_packet=128M
      - --innodb_buffer_pool_size=512M
    volumes:
      - mysql-data:/var/lib/mysql
      # 注意：不挂 entrypoint-initdb；首次部署由 deploy.sh 走 mysqldump 导入
      # 历史数据 + 06-data-fixup.sql 串行执行，避免空 schema
    networks: [backend]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: xm-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: xm-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "${HOST_MINIO_API_PORT}:9000"
      - "${HOST_MINIO_CONSOLE_PORT}:9001"
    networks: [backend, edge]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 首次启动建空 bucket，幂等（一次性工具容器，跑完即退出）
  minio-init:
    image: minio/mc:latest
    container_name: xm-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks: [backend]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_DEFAULT_BUCKET} &&
      mc anonymous set download local/${MINIO_DEFAULT_BUCKET} &&
      echo 'minio bucket ready'
      "
    restart: "no"

  # 注：edge-tts 不在本 compose 中部署，复用宿主已存在的 edge-tts 容器
  # （位于外部网络 prorise-internal，被 napcat/astrbot 等共用）
  # fastapi-worker 通过加入 prorise-internal 即可用 hostname `edge-tts` 访问

  # === RuoYi 后端层 =========================================================

  ruoyi-snailjob:
    build:
      context: ../packages/RuoYi-Vue-Plus-5.X
      dockerfile: ../../deploy/Dockerfile.ruoyi
      args:
        JAR_PATH: ruoyi-extend/ruoyi-snailjob-server/target/ruoyi-snailjob-server.jar
        WORK_SUBDIR: snailjob
        MAIN_PORT: 8800
    image: xm/ruoyi-snailjob:prod
    container_name: xm-ruoyi-snailjob
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${RUOYI_SNAILJOB_JAVA_OPTS}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SNAILJOB_TOKEN: ${RUOYI_SNAILJOB_TOKEN}
      TZ: ${TZ}
    volumes:
      - ruoyi-snailjob-logs:/ruoyi/server/logs
    networks: [backend]

  ruoyi-monitor:
    build:
      context: ../packages/RuoYi-Vue-Plus-5.X
      dockerfile: ../../deploy/Dockerfile.ruoyi
      args:
        JAR_PATH: ruoyi-extend/ruoyi-monitor-admin/target/ruoyi-monitor-admin.jar
        WORK_SUBDIR: monitor
        MAIN_PORT: 9090
    image: xm/ruoyi-monitor:prod
    container_name: xm-ruoyi-monitor
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${RUOYI_MONITOR_JAVA_OPTS}
      MONITOR_USERNAME: ${RUOYI_MONITOR_USERNAME}
      MONITOR_PASSWORD: ${RUOYI_MONITOR_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ruoyi-monitor-logs:/ruoyi/server/logs
    networks: [backend]

  ruoyi-java:
    build:
      context: ../packages/RuoYi-Vue-Plus-5.X
      dockerfile: ../../deploy/Dockerfile.ruoyi
      args:
        JAR_PATH: ruoyi-admin/target/ruoyi-admin.jar
        WORK_SUBDIR: server
        MAIN_PORT: 8080
    image: xm/ruoyi-admin:prod
    container_name: xm-ruoyi-java
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      ruoyi-snailjob: { condition: service_started }
      ruoyi-monitor: { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: ${RUOYI_ADMIN_JAVA_OPTS}
      SERVER_PORT: 8080
      # MySQL（应用走 root，简化运维）
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # 集群组件
      MONITOR_URL: http://ruoyi-monitor:9090/admin
      MONITOR_USERNAME: ${RUOYI_MONITOR_USERNAME}
      MONITOR_PASSWORD: ${RUOYI_MONITOR_PASSWORD}
      SNAILJOB_HOST: ruoyi-snailjob
      SNAILJOB_PORT: 17888
      SNAILJOB_TOKEN: ${RUOYI_SNAILJOB_TOKEN}
      # 加密
      RUOYI_JWT_SECRET: ${RUOYI_JWT_SECRET}
      RUOYI_API_DECRYPT_PUBLIC_KEY: ${RUOYI_API_DECRYPT_PUBLIC_KEY}
      RUOYI_API_DECRYPT_PRIVATE_KEY: ${RUOYI_API_DECRYPT_PRIVATE_KEY}
      TZ: ${TZ}
    volumes:
      - ruoyi-admin-logs:/ruoyi/server/logs
    ports:
      - "${HOST_RUOYI_PORT}:8080"
    networks: [backend, edge]
    # healthcheck 由 Dockerfile.ruoyi 提供（curl GET /，避开 actuator 401）

  # === FastAPI 应用层 =======================================================

  fastapi:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.fastapi
    image: xm/fastapi:prod
    container_name: xm-fastapi
    restart: unless-stopped
    command: api  # 由 Dockerfile entrypoint 分流到 uvicorn
    depends_on:
      redis: { condition: service_healthy }
      ruoyi-java: { condition: service_healthy }
    environment:
      FASTAPI_ENV: production
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: 8090
      FASTAPI_RELOAD: "false"
      FASTAPI_LOG_LEVEL: ${FASTAPI_LOG_LEVEL}
      FASTAPI_API_V1_PREFIX: /api/v1
      FASTAPI_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FASTAPI_RUOYI_BASE_URL: http://ruoyi-java:8080
      FASTAPI_RUOYI_ENCRYPT_ENABLED: "true"
      FASTAPI_RUOYI_ENCRYPT_HEADER_FLAG: encrypt-key
      FASTAPI_RUOYI_ENCRYPT_PUBLIC_KEY: ${RUOYI_API_DECRYPT_PUBLIC_KEY}
      FASTAPI_RUOYI_ENCRYPT_PRIVATE_KEY: ${RUOYI_API_DECRYPT_PRIVATE_KEY}
      FASTAPI_PROVIDER_RUNTIME_SOURCE: ruoyi
      FASTAPI_COS_BASE_URL: ${FASTAPI_COS_BASE_URL}
      FASTAPI_VIDEO_ASSET_ROOT: /app/.runtime/video-assets
      FASTAPI_VIDEO_IMAGE_STORAGE_ROOT: /data/uploads/video
      FASTAPI_VIDEO_RENDER_QUALITY: ${FASTAPI_VIDEO_RENDER_QUALITY}
      FASTAPI_VIDEO_SECTION_CODEGEN_CONCURRENCY: ${FASTAPI_VIDEO_SECTION_CODEGEN_CONCURRENCY}
      FASTAPI_VIDEO_SANDBOX_ALLOW_LOCAL_FALLBACK: "false"
      FASTAPI_DIAGNOSTICS_ALLOWLIST: ${FASTAPI_DIAGNOSTICS_ALLOWLIST}
      TZ: ${TZ}
    volumes:
      - video-assets:/app/.runtime/video-assets
      - video-uploads:/data/uploads/video
      - fastapi-secrets:/app/.runtime/secrets
    ports:
      - "${HOST_FASTAPI_PORT}:8090"
    networks: [backend, edge, prorise-internal]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  fastapi-worker:
    image: xm/fastapi:prod          # 复用 fastapi 镜像
    container_name: xm-fastapi-worker
    restart: unless-stopped
    command: worker  # entrypoint 分流到 dramatiq
    depends_on:
      fastapi: { condition: service_started }
    environment:
      FASTAPI_ENV: production
      FASTAPI_LOG_LEVEL: ${FASTAPI_LOG_LEVEL}
      FASTAPI_API_V1_PREFIX: /api/v1
      FASTAPI_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FASTAPI_RUOYI_BASE_URL: http://ruoyi-java:8080
      FASTAPI_RUOYI_ENCRYPT_ENABLED: "true"
      FASTAPI_RUOYI_ENCRYPT_PUBLIC_KEY: ${RUOYI_API_DECRYPT_PUBLIC_KEY}
      FASTAPI_RUOYI_ENCRYPT_PRIVATE_KEY: ${RUOYI_API_DECRYPT_PRIVATE_KEY}
      FASTAPI_PROVIDER_RUNTIME_SOURCE: ruoyi
      FASTAPI_COS_BASE_URL: ${FASTAPI_COS_BASE_URL}
      FASTAPI_VIDEO_ASSET_ROOT: /app/.runtime/video-assets
      FASTAPI_VIDEO_IMAGE_STORAGE_ROOT: /data/uploads/video
      FASTAPI_VIDEO_RENDER_QUALITY: ${FASTAPI_VIDEO_RENDER_QUALITY}
      FASTAPI_VIDEO_SECTION_CODEGEN_CONCURRENCY: ${FASTAPI_VIDEO_SECTION_CODEGEN_CONCURRENCY}
      FASTAPI_VIDEO_SANDBOX_ALLOW_LOCAL_FALLBACK: "false"
      FASTAPI_DRAMATIQ_WORKER_PROCESSES: ${FASTAPI_DRAMATIQ_WORKER_PROCESSES}
      FASTAPI_DRAMATIQ_WORKER_THREADS: ${FASTAPI_DRAMATIQ_WORKER_THREADS}
      FASTAPI_DRAMATIQ_TASK_TIME_LIMIT_MS: ${FASTAPI_DRAMATIQ_TASK_TIME_LIMIT_MS}
      FASTAPI_DRAMATIQ_PROMETHEUS_ENABLED: "false"
      TZ: ${TZ}
    volumes:
      - video-assets:/app/.runtime/video-assets   # 与 fastapi 共享
      - video-uploads:/data/uploads/video         # 与 fastapi 共享
      - fastapi-secrets:/app/.runtime/secrets
    networks: [backend, prorise-internal]   # prorise-internal 用于访问宿主已有的 edge-tts

  # === 前端层（本地 pnpm build → 镜像 COPY dist）===========================

  admin-fe:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin-fe
    image: xm/admin-fe:prod
    container_name: xm-admin-fe
    restart: unless-stopped
    ports:
      - "${HOST_ADMIN_FE_PORT}:80"
    networks: [edge]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  student-fe:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.student-fe
    image: xm/student-fe:prod
    container_name: xm-student-fe
    restart: unless-stopped
    ports:
      - "${HOST_STUDENT_FE_PORT}:80"
    networks: [edge]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
